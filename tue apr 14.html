
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tempo</title>
  <!-- Firebase (must load before Babel) -->
  
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000; --bg1: #0c0c0c; --bg2: #111; --bg3: #161616;
  --border: #1e1e1e; --text: #f0eff4; --text2: #a0a0b4; --text3: #707080;
  --coral: #ff5f57; --coral2: #ff8a82; --coralg: rgba(255,95,87,0.12);
  --green: #00e5a0; --red: #ff3b5c; --blue: #4cc9f0; --purple: #c77dff;
  --font: 'Cormorant Garamond', Georgia, serif;
  --heading: 'Playfair Display', 'Libre Baskerville', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --shadow: 0 4px 32px rgba(0,0,0,0.6);
  --done-bg: #050f08; --done-line: #0d2015; --btn-text: #000;
  --t-xs:17px; --t-sm:21px; --t-md:25px; --t-lg:31px; --t-xl:42px; --t-2xl:60px;
}
[data-theme="claude2"] {
  --bg:#faf9f7; --bg1:#f2ede8; --bg2:#e8e2db; --bg3:#ddd6cc; --border:#d0c7bb;
  --text:#1a1008; --text2:#6b5744; --text3:#9c8572;
  --coral:#c96442; --coral2:#da8060; --coralg:rgba(201,100,66,0.1);
  --green:#c96442; --red:#c0392b; --blue:#3d6fa8; --purple:#7b5ea7;
  --done-bg:rgba(201,100,66,0.06); --done-line:rgba(201,100,66,0.2); --btn-text:#faf9f7;
}
html:has([data-theme="claude2"]),body:has([data-theme="claude2"]) { background:#faf9f7; }
html[data-theme="claude2"] .shell { background:#faf9f7; }
html,body,#root { height:100%; width:100%; background:var(--bg,#000); overflow:hidden; }
body { font-family:var(--font); font-size:26px; color:var(--text); -webkit-font-smoothing:antialiased; }
.shell { display:grid; grid-template-rows:auto 1fr auto; height:100%; width:100%; position:relative; overflow:hidden; }
.topbar { background:var(--bg1); padding:8px 22px; padding-top:max(8px,env(safe-area-inset-top)); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.logo { font-size:38px; font-weight:900; color:var(--coral); letter-spacing:-0.5px; font-family:var(--heading); line-height:1; }
.scroll { overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:28px 22px calc(80px + env(safe-area-inset-bottom)); }
.bottom-nav { display:none !important; }
.nav-trigger { display:none !important; }
.nav-radial-item { display:none !important; }
.iframe-tabnav { display:flex !important; }
.nav-overlay { display:none !important; }
.nav-tooltip { display:none !important; }
.bottom-nav > * { pointer-events:all; }
.nav-trigger { width:72px; height:72px; border-radius:50%; background:radial-gradient(circle at 35% 35%,var(--coral2),var(--coral) 60%,#c43d35); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 32px rgba(255,95,87,0.6); transition:transform 0.2s,box-shadow 0.2s; -webkit-tap-highlight-color:transparent; position:absolute; bottom:10px; left:50%; transform:translateX(-50%); z-index:20; }
.nav-trigger:active { transform:translateX(-50%) scale(0.91); }
@keyframes navPulse { 0%,100%{box-shadow:0 0 32px rgba(255,95,87,0.6)} 50%{box-shadow:0 0 52px rgba(255,95,87,0.9),0 0 80px rgba(255,95,87,0.3)} }
.nav-trigger.pulse { animation:navPulse 1.8s ease-in-out 3; }
.nav-trigger-icon { width:34px; height:26px; display:flex; flex-direction:column; justify-content:space-between; align-items:center; }
.nav-trigger-icon span { display:block; width:30px; height:3px; background:#fff; transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); border-radius:2px; transform-origin:center; }
.nav-trigger.open .nav-trigger-icon span:nth-child(1){transform:translateY(11.5px) rotate(45deg)}
.nav-trigger.open .nav-trigger-icon span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-trigger.open .nav-trigger-icon span:nth-child(3){transform:translateY(-11.5px) rotate(-45deg)}
.nav-radial-item { position:fixed; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity 0.2s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1); opacity:0; pointer-events:none; transform:translate(0,0) scale(0.6); z-index:99; }
.nav-radial-item.visible { opacity:1; pointer-events:all; transform:var(--tx); }
.nav-radial-dot { width:54px; height:54px; border-radius:50%; background:var(--bg2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:20px; color:var(--text2); transition:background 0.15s,border-color 0.15s,color 0.15s; }
.nav-radial-dot.active { background:var(--coral); border-color:var(--coral); color:#fff; box-shadow:0 0 14px rgba(255,95,87,0.5); }
.nav-radial-label { font-family:var(--font); font-size:13px; font-weight:800; color:#fff; letter-spacing:0.3px; white-space:nowrap; text-shadow:0 1px 8px rgba(0,0,0,0.9),0 0 3px rgba(0,0,0,1); }
.nav-radial-label.active { color:var(--coral); }
.nav-overlay { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.6); opacity:0; pointer-events:none; transition:opacity 0.2s; }
.nav-overlay.visible { opacity:1; pointer-events:all; }
.nav-tooltip { position:fixed; bottom:calc(88px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:8px 16px; font-size:var(--t-xs); font-weight:700; color:var(--text3); white-space:nowrap; pointer-events:none; z-index:4; animation:tooltipFade 4s ease forwards; }
@keyframes tooltipFade { 0%,60%{opacity:1} 100%{opacity:0} }
.card { background:transparent; border:none; padding:0; margin-bottom:28px; }
.section-title { font-size:var(--t-sm); font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:18px; padding-bottom:10px; font-family:var(--heading); }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.stat-box { background:transparent; border:none; padding:14px 0; text-align:center; }
.stat-box-val { font-size:var(--t-2xl); font-weight:900; line-height:1; font-family:var(--heading); }
.stat-box-lbl { font-size:var(--t-sm); color:var(--text2); font-weight:700; margin-top:5px; }
.prog { height:8px; background:var(--bg3); border-radius:99px; overflow:hidden; margin-top:10px; }
.prog-fill { height:100%; border-radius:99px; transition:width 0.4s ease; }
.sec-head { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.sec-head-line { flex:1; height:0; }
.sec-head-label { font-size:var(--t-sm); font-weight:800; color:var(--text2); letter-spacing:0.8px; text-transform:uppercase; font-family:var(--heading); }
.sec-head-count { font-size:var(--t-sm); font-weight:700; color:var(--text3); }
.backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; display:flex; align-items:flex-end; justify-content:center; padding:0; }
.sheet { background:var(--bg1); border-radius:26px 26px 0 0; width:100%; max-width:580px; padding:0 22px 22px; padding-bottom:max(22px,env(safe-area-inset-bottom)); max-height:92dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; animation:slideUp 0.26s cubic-bezier(0.34,1.4,0.64,1); }
.sheet-centered { animation:fadeScale 0.2s cubic-bezier(0.34,1.4,0.64,1); }
@keyframes slideUp  { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadeScale { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
.sheet-handle { width:44px; height:4px; background:var(--bg3); border-radius:99px; margin:14px auto 24px; }
.sheet-title { font-size:var(--t-lg); font-weight:900; margin-bottom:22px; font-family:var(--heading); }
label.field-label { display:block; font-size:var(--t-xs); font-weight:800; color:var(--text2); margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
input.field,select.field,textarea.field { width:100%; background:var(--bg2); border:1.5px solid var(--border); border-radius:12px; color:var(--text); font-family:var(--font); font-size:var(--t-md); font-weight:600; padding:14px 16px; outline:none; transition:border-color 0.15s; margin-bottom:18px; -webkit-appearance:none; }
input.field:focus,select.field:focus { border-color:var(--coral); }
input.field::placeholder { color:var(--text3); }
textarea.field.tw-placeholder::placeholder { color:transparent; }
.day-picker { display:flex; gap:7px; margin-bottom:18px; }
.day-pill { flex:1; padding:11px 0; border-radius:10px; border:1.5px solid var(--border); background:var(--bg2); color:var(--text3); font-family:var(--font); font-size:var(--t-xs); font-weight:800; cursor:pointer; transition:all 0.12s; -webkit-tap-highlight-color:transparent; text-align:center; }
.day-pill.on { background:var(--coral); border-color:var(--coral); color:var(--btn-text); }
.sym-btn { font-size:20px; font-family:var(--mono); background:var(--bg2); border:1.5px solid var(--border); border-radius:10px; width:50px; height:50px; cursor:pointer; color:var(--text2); display:flex; align-items:center; justify-content:center; transition:all 0.12s; }
.sym-btn.on { background:var(--coral); border-color:var(--coral); color:#fff; }
.btn { border-radius:14px; border:none; font-family:var(--font); font-weight:800; cursor:pointer; transition:all 0.12s; -webkit-tap-highlight-color:transparent; }
.btn:active { transform:scale(0.96); }
.btn-full { width:100%; padding:18px; font-size:var(--t-md); }
.btn-primary { background:var(--coral); color:var(--btn-text); }
.btn-danger  { background:var(--red); color:#fff; }
.btn-ghost   { background:var(--bg3); color:var(--text2); }
.btn-secondary { background:var(--blue); color:var(--btn-text); }
.btn-sm      { padding:10px 18px; font-size:var(--t-sm); }
.mt8{margin-top:8px} .mt16{margin-top:16px} .mb12{margin-bottom:12px}
.tab-strip { display:flex; background:var(--bg2); border-radius:12px; padding:4px; gap:4px; margin-bottom:22px; }
.tab-pill { flex:1; padding:12px 0; border-radius:9px; border:none; cursor:pointer; background:transparent; color:var(--text3); font-family:var(--font); font-size:var(--t-sm); font-weight:800; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.tab-pill.active { background:var(--coral); color:var(--btn-text); }
.task-card { border-left:5px solid transparent; border-top:none; border-right:none; border-bottom:none; background:transparent; padding:18px 16px 18px 20px; margin-bottom:0; display:flex; align-items:center; gap:18px; transition:transform 0.15s,opacity 0.18s,background 0.2s; -webkit-tap-highlight-color:transparent; cursor:default; position:relative; overflow:hidden; user-select:none; touch-action:pan-y; }
.task-card.can { cursor:pointer; }
.task-card.pending-wash { background:var(--coralg); }
.task-card.swiping { transition:none; }
@keyframes checkPop { 0%{transform:scale(1) rotate(0)} 25%{transform:scale(1.4) rotate(-10deg)} 55%{transform:scale(1.2) rotate(7deg)} 75%{transform:scale(1.1) rotate(-3deg)} 100%{transform:scale(1) rotate(0)} }
@keyframes cardComplete { 0%{background:transparent} 25%{background:rgba(0,229,160,0.05)} 100%{background:transparent} }
@keyframes slideIn { 0%{opacity:0;transform:translateY(-10px)} 100%{opacity:1;transform:translateY(0)} }
.task-card.completing { animation:cardComplete 0.5s ease forwards; }
.task-card.sliding-in { animation:slideIn 0.32s cubic-bezier(0.34,1.4,0.64,1) forwards; }
.swipe-track { position:absolute; right:0; top:0; bottom:0; width:80px; display:flex; align-items:center; justify-content:center; background:var(--green); opacity:0; transition:opacity 0.15s; pointer-events:none; }
.swipe-track span { font-size:28px; color:#000; font-weight:900; }
.check-circle { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; font-family:var(--mono); flex-shrink:0; transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); border:2.5px solid var(--border); background:transparent; color:var(--text3); -webkit-tap-highlight-color:transparent; }
.check-circle.can    { border-color:var(--coral); background:var(--coralg); color:var(--coral); }
.check-circle.done-c { border-color:var(--green); background:rgba(0,229,160,0.1); color:var(--green); }
.check-circle.popping { animation:checkPop 0.52s cubic-bezier(0.34,1.56,0.64,1); }
.task-streak-badge { display:inline-flex; align-items:center; gap:3px; font-size:var(--t-xs); font-family:var(--mono); font-weight:700; color:var(--purple); background:rgba(199,125,255,0.12); border-radius:99px; padding:2px 8px; }
@keyframes burst { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }
.burst-particle { position:fixed; width:8px; height:8px; border-radius:50%; pointer-events:none; z-index:500; animation:burst 0.55s ease-out forwards; }
@keyframes logoShimmer { 0%,100%{opacity:1;filter:none} 50%{opacity:0.82;filter:drop-shadow(0 0 10px rgba(255,95,87,0.8))} }
.logo-shimmer { animation:logoShimmer 2s ease-in-out 1; }
@keyframes ringPulse { 0%,100%{filter:drop-shadow(0 0 3px rgba(0,229,160,0.3))} 50%{filter:drop-shadow(0 0 14px rgba(0,229,160,0.85))} }
.ring-done { animation:ringPulse 1s ease-in-out 3; }
@keyframes cardStagger { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }
.stagger-wrap { animation:cardStagger 0.36s cubic-bezier(0.34,1.4,0.64,1) both; }
.swipe-left-track { position:absolute; left:0; top:0; bottom:0; width:80px; display:flex; align-items:center; justify-content:center; background:var(--red); opacity:0; transition:opacity 0.15s; pointer-events:none; }
.swipe-left-track span { font-size:22px; }
.task-row { background:transparent; border-left:4px solid var(--border); padding:16px 0 16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:14px; transition:border-color 0.15s,opacity 0.15s; }
.task-row.drag-over { border-left-color:var(--coral); border-top:2px solid var(--coral); }
.task-row.dragging  { opacity:0.4; border-left-color:var(--coral); }
.drag-handle { color:var(--text3); font-size:21px; cursor:grab; padding:0 4px; flex-shrink:0; touch-action:none; line-height:1; }
.icon-btn { padding:8px 14px; border-radius:10px; border:1px solid var(--border); background:var(--bg2); cursor:pointer; font-size:var(--t-xs); font-family:var(--font); font-weight:800; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; color:var(--text2); white-space:nowrap; line-height:1; }
.icon-btn:active { transform:scale(0.9); }
.paused-badge { font-size:var(--t-xs); font-weight:800; color:var(--text3); background:var(--bg3); padding:3px 10px; border-radius:99px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:22px 0; }
.setting-label { font-size:26px; font-weight:700; font-family:var(--heading); }
.setting-sub   { font-size:var(--t-md); color:var(--text2); margin-top:3px; }
.num-input-row { display:flex; align-items:center; gap:14px; }
.num-btn { width:46px; height:46px; border-radius:10px; border:1px solid var(--border); background:var(--bg2); color:var(--text); font-size:24px; font-weight:700; cursor:pointer; font-family:var(--font); -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; }
.num-val { font-size:24px; font-weight:800; min-width:44px; text-align:center; }
.reward-card { background:transparent; border-left:4px solid var(--border); padding:14px 0 14px 20px; margin-bottom:18px; display:flex; align-items:center; gap:18px; }
.redeem-btn { font-size:var(--t-sm); font-weight:800; padding:12px 20px; border-radius:12px; border:none; cursor:pointer; font-family:var(--font); -webkit-tap-highlight-color:transparent; }
.redeem-btn.can  { background:var(--coral); color:var(--btn-text); }
.redeem-btn.cant { background:var(--bg3); color:var(--text3); cursor:default; }
.hist-row { display:flex; justify-content:space-between; align-items:center; padding:18px 0; }
.empty { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-emoji { font-size:60px; margin-bottom:18px; }
.empty-msg { font-size:var(--t-lg); font-weight:700; font-family:var(--heading); }
.empty-sub { font-size:var(--t-md); margin-top:8px; }
.empty-tagline { font-size:var(--t-sm); font-style:italic; color:var(--text3); margin-top:14px; font-family:var(--heading); }
.toast { position:fixed; bottom:calc(80px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:12px 16px; font-size:var(--t-sm); font-weight:700; z-index:400; animation:toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:normal; box-shadow:var(--shadow); max-width:calc(100vw - 40px); width:max-content; }
@keyframes toastIn { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
.time-ribbon { display:flex; align-items:center; gap:8px; }
.time-track { flex:1; height:4px; background:var(--bg3); border-radius:99px; position:relative; overflow:visible; }
.time-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,rgba(255,95,87,0.3) 0%,var(--coral) 100%); transition:width 0.5s; }
.time-dot { position:absolute; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%; background:var(--coral); box-shadow:0 0 8px rgba(255,95,87,0.8); }
.time-lbl { font-size:16px; font-weight:700; color:var(--text3); white-space:nowrap; font-family:var(--mono); }
.cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; background:transparent; transition:all 0.12s; -webkit-tap-highlight-color:transparent; border-radius:8px; }
.cal-day:active { background:rgba(255,95,87,0.08); }
.cal-day.is-today    { background:rgba(255,95,87,0.1); outline:2px solid var(--coral); outline-offset:-2px; }
.cal-day.is-selected { background:var(--coral); }
.cal-day.is-selected * { color:#000 !important; }
.cal-day.is-past     { opacity:0.4; }
.heatmap-cell { aspect-ratio:1; border-radius:3px; transition:transform 0.1s; }
.heatmap-cell:hover { transform:scale(1.2); z-index:1; position:relative; }
.score-big { font-size:96px; font-weight:900; line-height:1; font-family:var(--heading); }
.score-sub { font-size:26px; font-weight:700; color:var(--text2); margin-top:6px; letter-spacing:0.5px; text-transform:uppercase; font-family:var(--heading); }
.freeze-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(76,201,240,0.12); border:1px solid rgba(76,201,240,0.3); border-radius:99px; padding:4px 12px; font-size:var(--t-xs); font-weight:800; color:var(--blue); font-family:var(--mono); }
.day-browser { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.day-browser-btn { background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--text2); font-family:var(--mono); font-size:18px; width:38px; height:38px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.day-browser-label { flex:1; text-align:center; font-size:var(--t-sm); font-weight:800; font-family:var(--heading); }
.day-browser-today-btn { background:var(--coralg); border:1px solid var(--coral); border-radius:8px; color:var(--coral); font-family:var(--mono); font-size:var(--t-xs); font-weight:800; padding:5px 10px; cursor:pointer; }
::-webkit-scrollbar { width:4px; }

/* ── New: XP bar ─────────────────────────────────────────── */
.xp-bar-wrap { height:3px; background:var(--bg3); border-radius:99px; overflow:hidden; margin-top:5px; }
.xp-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--coral),var(--purple)); transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }

/* ── New: Quick-add FAB ──────────────────────────────────── */
@keyframes fabPop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fabShake { 0%,100%{transform:rotate(0deg)} 20%{transform:rotate(-12deg)} 40%{transform:rotate(12deg)} 60%{transform:rotate(-8deg)} 80%{transform:rotate(6deg)} }
.quick-add-fab { position:fixed; bottom:calc(82px + env(safe-area-inset-bottom)); right:18px; z-index:30; width:62px; height:62px; border-radius:50%; background:var(--coral); border:none; display:flex; align-items:center; justify-content:center; font-size:32px; color:#fff; cursor:pointer; box-shadow:0 4px 24px rgba(255,95,87,0.5); transition:all 0.18s; -webkit-tap-highlight-color:transparent; font-weight:300; line-height:1; }
.quick-add-fab:active { transform:scale(0.9); }
.quick-add-fab.shake-anim { animation:fabShake 0.45s ease; }

/* ── New: Reward card ────────────────────────────────────── */
@keyframes rewardSlideIn { 0%{transform:translateY(-12px) scale(0.97);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }
.motivational-card { border-radius:16px; padding:20px 22px; margin-bottom:18px; animation:rewardSlideIn 0.38s cubic-bezier(0.34,1.4,0.64,1); position:relative; overflow:hidden; }
.motivational-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%); pointer-events:none; }

/* ── New: End-of-day banner ──────────────────────────────── */
@keyframes bannerPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,0)} 50%{box-shadow:0 0 0 6px rgba(255,59,92,0.15)} }
.eod-banner { border-radius:14px; padding:16px 18px; margin-bottom:20px; border-left:4px solid var(--red); background:rgba(255,59,92,0.06); animation:bannerPulse 2.5s ease-in-out infinite; }
.streak-risk-banner { border-radius:14px; padding:16px 18px; margin-bottom:20px; border-left:4px solid #ff9500; background:rgba(255,149,0,0.06); }

/* ── New: Weekly summary modal ───────────────────────────── */
.weekly-modal-stat { text-align:center; padding:16px 8px; }
.weekly-modal-val { font-size:52px; font-weight:900; line-height:1; font-family:var(--heading); }
.weekly-modal-lbl { font-size:15px; color:var(--text3); font-weight:700; margin-top:4px; font-family:var(--mono); letter-spacing:1px; text-transform:uppercase; }

/* ── New: tab transition ─────────────────────────────────── */
@keyframes tabFadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.tab-view-enter { animation:tabFadeIn 0.22s ease forwards; }

/* ── Iframe / embedded mode ─────────────────────────────── */
.iframe-mode html, .iframe-mode body { overflow:auto !important; height:auto !important; }
html.iframe-mode, html.iframe-mode body, html.iframe-mode #root {
  height:auto !important; overflow:visible !important;
}
html.iframe-mode .shell {
  height:auto !important; min-height:100vh; overflow:visible !important;
  display:flex; flex-direction:column;
}
html.iframe-mode .topbar { position:sticky; top:0; z-index:30; }
html.iframe-mode .scroll { overflow:visible !important; padding-bottom:80px; flex:1; }
html.iframe-mode .bottom-nav { display:none !important; }
html.iframe-mode .nav-radial-item,
html.iframe-mode .nav-overlay,
html.iframe-mode .nav-tooltip { display:none !important; }
html.iframe-mode .iframe-tabnav {
  display:flex !important; position:sticky; bottom:0; left:0; right:0; z-index:30;
  background:var(--bg1); border-top:1px solid var(--border);
  padding:0 0 env(safe-area-inset-bottom,0px);
}
html.iframe-mode .backdrop { position:fixed; }
html.iframe-mode .toast    { position:fixed; }
html.iframe-mode .quick-add-fab { display:none !important; }
.iframe-tabnav { display:flex !important; position:fixed; bottom:0; left:0; right:0; z-index:30;
  background:var(--bg1); border-top:1px solid var(--border);
  padding:0 0 env(safe-area-inset-bottom,0px); }
.iframe-tabnav-btn {
  flex:1; padding:12px 4px 10px; min-height:56px; border:none; background:transparent; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  color:var(--text3); font-family:var(--mono); font-size:22px;
  -webkit-tap-highlight-color:transparent; transition:color 0.15s, transform 0.1s;
}
.iframe-tabnav-btn:active { transform:scale(0.9); }
.iframe-tabnav-btn.active { color:var(--coral); }
.iframe-tabnav-btn span { font-family:var(--font); font-size:13px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

/* ── Homework Inbox ──────────────────────────────────────── */
.hw-inbox { margin-bottom:16px; }
.hw-inbox-header {
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
}
.hw-inbox-title {
  font-size:12px; font-weight:900; letter-spacing:1.2px; text-transform:uppercase;
  font-family:var(--mono); color:var(--coral);
}
.hw-inbox-count {
  font-size:11px; font-weight:700; font-family:var(--mono);
  background:var(--coral); color:#000; border-radius:99px;
  padding:1px 7px;
}
.hw-inbox-card {
  background:var(--bg1); border-radius:12px;
  border:1.5px solid var(--coral); padding:10px 12px;
  margin-bottom:8px; animation:hwCardIn 0.2s ease forwards;
}
.hw-inbox-title-text {
  font-size:14px; font-weight:700; color:var(--text); margin-bottom:3px;
  line-height:1.25;
}
.hw-inbox-due { font-size:11px; font-family:var(--mono); font-weight:700; margin-bottom:10px; }
.hw-inbox-due.urgent { color:var(--red); }
.hw-inbox-due.soon   { color:#ff9500; }
.hw-inbox-due.ok     { color:var(--green); }
.hw-inbox-due.nodate { color:var(--text3); }
.hw-inbox-cats {
  display:grid; grid-template-columns:1fr 1fr; gap:5px;
}
.hw-inbox-cat-btn {
  padding:7px 0; border-radius:8px; border:1.5px solid transparent;
  font-size:11px; font-weight:900; font-family:var(--mono);
  letter-spacing:0.5px; cursor:pointer; text-align:center;
  -webkit-tap-highlight-color:transparent; transition:all 0.1s;
}
.hw-inbox-cat-btn:active { transform:scale(0.94); }
@keyframes hwCardIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

.hw-board {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto;
  gap: 10px;
  align-items: start;
}
/* Left column: Assignments spans full height */
.hw-col-left  { grid-column: 1; grid-row: 1 / span 3; display:flex; flex-direction:column; }
/* Right column: 3 sections stacked */
.hw-col-right { grid-column: 2; display:flex; flex-direction:column; gap:10px; }

.hw-panel {
  background: var(--bg1);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.hw-panel-left { min-height: 320px; }

.hw-panel-header {
  display: flex; align-items: center; gap:8px;
  padding: 11px 12px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; flex-shrink: 0;
}
.hw-panel-dot   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.hw-panel-title { font-size:11px; font-weight:900; letter-spacing:1px; text-transform:uppercase; font-family:var(--mono); flex:1; }
.hw-panel-count { font-size:11px; font-weight:700; color:var(--text3); font-family:var(--mono); }
.hw-panel-chev  { font-size:9px; color:var(--text3); transition:transform 0.15s; }
.hw-panel-chev.open { transform:rotate(90deg); }

.hw-panel-body  { padding: 6px 8px 8px; overflow:visible; flex:1; }

.hw-card {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 8px 8px 8px 0;
  border-bottom: 1px solid var(--border);
  position: relative; cursor: default;
  animation: hwCardIn 0.18s ease forwards;
}
.hw-card:last-child { border-bottom: none; }
.hw-card.fading { animation: hwFadeOut 0.4s ease forwards; pointer-events:none; }

/* urgency left stripe */
.hw-card-stripe {
  width: 3px; border-radius: 99px; flex-shrink: 0;
  align-self: stretch; min-height: 28px;
}
.hw-card-check {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer; transition: all 0.13s;
  -webkit-tap-highlight-color: transparent; color: transparent;
  margin-top: 2px;
}
.hw-card-check.done  { border-color:var(--green); background:rgba(0,229,160,0.12); color:var(--green); }
.hw-card-check:active { transform: scale(0.88); }

.hw-card-body  { flex:1; min-width:0; }
.hw-card-title {
  font-size: 13px; font-weight: 700; line-height: 1.3;
  color: var(--text); word-break: break-word;
}
.hw-card-title.done { text-decoration: line-through; color: var(--text3); }
.hw-card-due   { font-size: 11px; font-family: var(--mono); font-weight:700; margin-top:2px; }
.hw-card-due.urgent { color: var(--red); }
.hw-card-due.soon   { color: #ff9500; }
.hw-card-due.ok     { color: var(--green); }
.hw-card-due.nodate { color: var(--text3); }

.hw-card-move {
  flex-shrink: 0; background: none; border: none;
  color: var(--text3); font-size: 13px; cursor: pointer;
  padding: 2px 1px; opacity: 0.5; margin-top:1px;
  -webkit-tap-highlight-color: transparent;
}
.hw-card-move:active { opacity: 1; }

/* drop zone highlight */
.hw-panel.drop-active { border-color: var(--coral); background: var(--coralg); }

/* move sheet */
.hw-move-sheet {
  position: fixed; bottom:0; left:0; right:0; z-index:500;
  background: var(--bg1); border-radius:22px 22px 0 0;
  padding: 14px 20px max(28px,env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  animation: slideUp 0.24s cubic-bezier(0.34,1.4,0.64,1);
}
.hw-move-row {
  display:flex; align-items:center; gap:12px;
  padding: 13px 0; border-bottom:1px solid var(--border);
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.hw-move-row:last-child { border-bottom:none; }
.hw-move-dot   { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.hw-move-label { font-size:17px; font-weight:700; font-family:var(--heading); }
.hw-upload-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg1);
  position: relative;
  overflow: hidden;
}
.hw-upload-zone:hover, .hw-upload-zone.drag-active {
  border-color: var(--coral);
  background: var(--coralg);
}
.hw-assignment-card {
  background: var(--bg1);
  border-radius: 14px;
  border-left: 5px solid var(--coral);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  transition: opacity 0.15s;
  position: relative;
}
.hw-assignment-card.completed {
  opacity: 0.5;
  border-left-color: var(--green);
}
@keyframes hwFadeOut {
  0%   { opacity:0.5; transform:translateX(0) scaleY(1); max-height:200px; }
  50%  { opacity:0;   transform:translateX(22px) scaleY(0.8); }
  100% { opacity:0;   transform:translateX(22px) scaleY(0); max-height:0; margin-bottom:0; padding:0; }
}
.hw-assignment-card.fading-out {
  animation: hwFadeOut 0.4s ease forwards;
  pointer-events: none;
  overflow: hidden;
}
.hw-priority-bar {
  height: 4px;
  border-radius: 99px;
  background: var(--bg3);
  overflow: hidden;
  margin-top: 4px;
}
.hw-priority-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.hw-course-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 800;
  font-family: var(--mono);
  letter-spacing: 0.5px;
  background: rgba(76,201,240,0.12);
  color: var(--blue);
  border: 1px solid rgba(76,201,240,0.25);
  white-space: nowrap;
}
.hw-diff-dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
}
.hw-countdown {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.5px;
}
.hw-countdown.urgent { color: var(--red); }
.hw-countdown.soon   { color: var(--coral); }
.hw-countdown.ok     { color: var(--green); }
.hw-countdown.nodate { color: var(--text3); }
.hw-processing-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 800; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
@keyframes hwSpin { to { transform: rotate(360deg); } }
.hw-spinner {
  width: 48px; height: 48px; border-radius: 50%;
  border: 3px solid var(--bg3);
  border-top-color: var(--coral);
  animation: hwSpin 0.8s linear infinite;
}
.hw-diff-stepper {
  display: flex; gap: 4px; align-items: center;
}
.hw-diff-pip {
  width: 14px; height: 14px; border-radius: 3px;
  cursor: pointer; transition: all 0.12s;
  border: 1.5px solid var(--border);
  background: var(--bg3);
}
.hw-diff-pip.filled { background: var(--coral); border-color: var(--coral); }
.hw-section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; margin-top: 4px;
}
.hw-section-line { flex: 1; height: 0; border: none; border-top: 1px solid var(--border); }

/* ── Homework Sort Survey ────────────────────────────────── */
.hw-survey-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  z-index: 300; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.hw-survey-modal {
  background: var(--bg1); border-radius: 22px; width: 100%; max-width: 480px;
  max-height: 88dvh; overflow-y: auto; padding: 28px 24px;
  animation: fadeScale 0.22s cubic-bezier(0.34,1.4,0.64,1);
  border: 1px solid var(--border);
}
.hw-survey-q { margin-bottom: 26px; }
.hw-survey-q-label {
  font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 12px;
  font-family: var(--heading); line-height: 1.3;
}
.hw-survey-q-sub {
  font-size: 13px; color: var(--text3); font-family: var(--mono);
  font-weight: 700; margin-bottom: 10px; letter-spacing: 0.3px;
}
/* drag-rank list */
.hw-rank-list { display: flex; flex-direction: column; gap: 7px; }
.hw-rank-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 11px; padding: 11px 14px; cursor: grab;
  transition: border-color 0.12s, background 0.12s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.hw-rank-item.dragging-item { opacity: 0.4; }
.hw-rank-item.drag-over-item { border-color: var(--coral); background: var(--coralg); }
.hw-rank-handle { color: var(--text3); font-size: 15px; flex-shrink: 0; }
.hw-rank-num {
  width: 22px; height: 22px; border-radius: 50%; background: var(--bg3);
  border: 1px solid var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 900;
  color: var(--text3); font-family: var(--mono); flex-shrink: 0;
}
.hw-rank-name { flex: 1; font-size: 16px; font-weight: 700; color: var(--text); }
/* radio/chip options */
.hw-chip-row { display: flex; gap: 7px; flex-wrap: wrap; }
.hw-chip {
  padding: 8px 16px; border-radius: 99px; border: 1.5px solid var(--border);
  background: var(--bg2); color: var(--text3); font-family: var(--mono);
  font-size: 13px; font-weight: 800; cursor: pointer;
  transition: all 0.12s; -webkit-tap-highlight-color: transparent;
}
.hw-chip.selected { background: var(--coral); border-color: var(--coral); color: var(--btn-text); }
/* toggle chips for multi-select */
.hw-toggle-chip {
  padding: 7px 13px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--bg2); color: var(--text3); font-family: var(--mono);
  font-size: 12px; font-weight: 800; cursor: pointer;
  transition: all 0.12s; -webkit-tap-highlight-color: transparent;
}
.hw-toggle-chip.selected { background: var(--coralg); border-color: var(--coral); color: var(--coral); }

[data-theme="claude2"] .nav-trigger { background:radial-gradient(circle at 35% 35%,#da8060,#c96442 60%,#a04e30); box-shadow:none; }
[data-theme="claude2"] .nav-trigger-icon span { background:#faf9f7; }
[data-theme="claude2"] .btn-primary { color:#faf9f7; }
[data-theme="claude2"] .btn-danger  { color:#faf9f7; }
[data-theme="claude2"] .btn-ghost   { color:#1a1008; }
[data-theme="claude2"] .sym-btn.on  { color:#faf9f7; }
[data-theme="claude2"] .check-circle.done-c { color:#faf9f7; }
[data-theme="claude2"] .nav-radial-label { color:#1a1008; text-shadow:0 1px 6px rgba(250,249,247,0.9); }
[data-theme="claude2"] .nav-radial-label.active { color:#c96442; }
[data-theme="claude2"] .nav-radial-dot { background:#faf9f7; border-color:#d0c7bb; color:#1a1008; }
[data-theme="claude2"] .nav-radial-dot.active { background:#c96442; border-color:#c96442; color:#faf9f7; }
[data-theme="claude2"] .tab-pill { color:#6b5744; }
[data-theme="claude2"] .tab-pill.active { color:#faf9f7; }
[data-theme="claude2"] .task-streak-badge { color:#7b5ea7; background:rgba(123,94,167,0.1); }
[data-theme="claude2"] .field { color:#1a1008; background:var(--bg1); border-color:#d0c7bb; }
[data-theme="claude2"] .day-pill { color:#6b5744; background:var(--bg2); border-color:#d0c7bb; }
[data-theme="claude2"] .day-pill.on { background:#c96442; color:#faf9f7; border-color:#c96442; }
[data-theme="claude2"] .sec-head-label { color:#1a1008; }
[data-theme="claude2"] .section-title { color:#9c8572; }
[data-theme="claude2"] .logo { color:#c96442; }
[data-theme="claude2"] .empty-msg { color:#1a1008; }
[data-theme="claude2"] .task-card { color:#1a1008; }
[data-theme="claude2"] .topbar { background:#f2ede8; border-bottom:1px solid #d0c7bb; }
/* ── Responsive ──────────────────────────────────────────── */
@media (min-width: 600px) {
  .shell { max-width: 100%; box-shadow: none; }
}
@media (max-width: 400px) {
  :root {
    --t-xs: 15px; --t-sm: 19px; --t-md: 22px;
    --t-lg: 27px; --t-xl: 36px; --t-2xl: 50px;
  }
  body { font-size: 22px; }
  .scroll { padding: 18px 14px 100px; }
  .topbar { padding: 8px 14px; padding-top: max(8px, env(safe-area-inset-top)); }
  .logo { font-size: 30px; }
  .task-card { padding: 14px 12px 14px 16px !important; }
  .score-big { font-size: 72px; }
  .score-sub { font-size: 20px; }
  .day-browser-btn { width: 32px; height: 32px; font-size: 16px; }
  .nav-trigger { width: 62px; height: 62px; }
  .iframe-tabnav-btn { padding: 8px 2px 6px; font-size: 16px; }
  .iframe-tabnav-btn span { font-size: 11px; letter-spacing: 0.2px; }
}
@media (max-width: 340px) {
  :root { --t-xs: 14px; --t-sm: 17px; --t-md: 20px; }
  .scroll { padding: 14px 10px 90px; }
  .logo { font-size: 26px; }
}
@media (max-height: 500px) and (max-width: 900px) {
  .scroll { padding-top: 12px; padding-bottom: 80px; }
  .topbar { padding-top: max(8px, env(safe-area-inset-top)); padding-bottom: 8px; }
}

/* ── Streak Flame ─────────────────────────────────── */
.streak-flame { font-size:28px; line-height:1; filter:drop-shadow(0 0 6px rgba(255,95,87,0.7)); transition:filter 0.3s; }
.streak-flame.hot { filter:drop-shadow(0 0 12px rgba(255,150,0,0.9)); animation:flamePulse 2s ease-in-out infinite; }
@keyframes flamePulse { 0%,100%{filter:drop-shadow(0 0 8px rgba(255,150,0,0.7))} 50%{filter:drop-shadow(0 0 20px rgba(255,200,0,1))} }

/* ── Perfect Day overlay ──────────────────────────── */
.perfect-day-overlay { position:fixed; inset:0; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.92); animation:pdFadeIn 0.4s ease; }
@keyframes pdFadeIn { from{opacity:0} to{opacity:1} }
.perfect-day-title { font-family:var(--heading); font-size:52px; font-weight:900; font-style:italic; color:var(--green); text-align:center; line-height:1.1; }
.perfect-day-sub { font-family:var(--mono); font-size:16px; color:var(--text2); margin-top:14px; text-align:center; letter-spacing:0.5px; }

/* ── Discipline Score ─────────────────────────────── */
.discipline-score { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px 8px; gap:4; border-left:1px solid var(--border); }
.discipline-score-val { font-family:var(--heading); font-size:52px; font-weight:900; line-height:1; }

const DAILY_QUOTES = [

// ── Completion sound ─────────────────────────────────────
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = "sine";
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.12 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.38);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.4);
    });
  } catch(e) {}
}

// ── Greeting ────────────────────────────────────────────
function getGreeting() {
  const h = new Date().getHours();
  if (h < 5)  return "Late night grind";
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  if (h < 21) return "Good evening";
  return "Good evening";
}

function getDashboardTagline({ streak, pendingCount, completedCount, userName }) {
  const h = new Date().getHours();
  const dow = new Date().getDay(); // 0=Sun, 6=Sat
  const s = streak?.cur || 0;
  const total = pendingCount + completedCount;

  // All done for the day
  if (total > 0 && pendingCount === 0) {
    if (s >= 30) return "Elite consistency. Day complete.";
    if (s >= 14) return "Another one. Keep stacking.";
    if (s >= 7)  return "Week strong. Day done.";
    return "All done. Rest up.";
  }
  // Streak-based
  if (s >= 30) return "30+ days. You're built different.";
  if (s >= 14) return `${s} days straight. Don't break it now.`;
  if (s >= 7)  return "One week in. Stay locked.";
  if (s >= 3)  return `${s} days in a row. Momentum building.`;
  // Time-based
  if (h >= 20 && pendingCount > 0) return "Late but not too late. Finish strong.";
  if (h < 9)   return "Early mover. Set the tone.";
  if (dow === 1) return "Monday sets the week. Make it count.";
  if (dow === 5) return "Friday push. Finish the week right.";
  if (dow === 0 || dow === 6) return "Weekend discipline hits different.";
  // Default
  return "Show up. That's the whole game.";

// ── Utilities ───────────────────────────────────────────
function todayStr(date = new Date()) { const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,"0"),d=String(date.getDate()).padStart(2,"0"); return `${y}-${m}-${d}`; }
function getLast84Days() {
  return Array.from({ length: 84 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - 83 + i); return todayStr(d);
  });
}
function merge(base, overrides) { return Object.assign({}, base, overrides); }

function calcTaskStreak(taskId, instances) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const key = todayStr(d);
    const dayInst = instances[key];
    if (!dayInst) break;
    const inst = dayInst.find(x => x.taskId === taskId);
    if (!inst || inst.status !== "completed") break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ── Persistence ─────────────────────────────────────────
async function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return DEFAULT_STATE;
    const p = JSON.parse(raw);
    return { ...DEFAULT_STATE, ...p,
      streak: { ...DEFAULT_STATE.streak, ...(p.streak || {}) },
      cfg:    { ...DEFAULT_STATE.cfg,    ...(p.cfg    || {}) },
      homework: { assignments: [], uploads: [], ...(p.homework || {}) },
    };
  } catch(e) { return DEFAULT_STATE; }
}
async function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

// ── Reducer ─────────────────────────────────────────────
function appReducer(state, action) {
  switch (action.type) {

    case "LOAD": return action.data;
    case "SET_USER_INFO": return merge(state, { userName: action.userName, userIdentity: action.userIdentity });

    case "SET_INST":
      return merge(state, { instances: merge(state.instances, { [action.date]: action.list }) });

    case "COMPLETE": {
      const baseList    = action.list || state.instances[action.date] || [];
      const instance    = baseList.find(i => i.id === action.id);
      const taskId      = instance?.taskId;
      const task        = state.tasks.find(t => t.id === taskId)
                       || (state.tomorrowTasks || []).find(t => t.id === taskId)
                       || (taskId === JOURNAL_TASK_ID ? JOURNAL_TASK : null);
      const updated     = baseList.map(i =>
        i.id === action.id ? merge(i, { status: "completed", completedAt: new Date().toISOString() }) : i
      );
      const allDone     = updated.every(i => i.status === "completed");

      let { cur, best, lastDay, freezes } = state.streak;
      if (allDone) {
        const today = todayStr();
        const yest  = new Date(); yest.setDate(yest.getDate() - 1);
        cur     = lastDay === todayStr(yest) ? cur + 1 : 1;
        best    = Math.max(best, cur);
        lastDay = today;
        // Award freeze token at every 7-day milestone
        if (cur % 7 === 0) freezes = (freezes || 0) + 1;
      }
      return merge(state, {
        instances: merge(state.instances, { [action.date]: updated }),
        streak: { cur, best, lastDay, freezes: freezes ?? 0 },
      });
    }

    case "UNDO_COMPLETE": {
      const baseList = state.instances[action.date] || [];
      const updated  = baseList.map(i => i.id === action.id ? { ...i, status: "pending", completedAt: null } : i);
      return merge(state, { instances: merge(state.instances, { [action.date]: updated }) });
    }
    case "ADD_TASK": {
      const newTasks = [...state.tasks, action.task];
      const order    = [...(state.taskOrder || []), action.task.id];
      return merge(state, { tasks: newTasks, taskOrder: order });
    }

    case "UPD_TASK":
      return merge(state, { tasks: state.tasks.map(t => t.id === action.task.id ? action.task : t) });

    case "DEL_TASK":
      return merge(state, {
        tasks:     state.tasks.filter(t => t.id !== action.id),
        taskOrder: (state.taskOrder || []).filter(id => id !== action.id),
      });

    case "REORDER_TASKS":
      return merge(state, { taskOrder: action.order });

    case "PIN_TASK": {
      const order = state.taskOrder || [];
      const without = order.filter(id => id !== action.id);
      return merge(state, { taskOrder: [action.id, ...without] });
    }

    case "GRANT_FREEZE": {
      const s = state.streak;
      return merge(state, { streak: { ...s, freezes: (s.freezes||0) + 1 } });
    }

    case "USE_FREEZE": {
      const { cur, best, lastDay, freezes } = state.streak;
      if (!freezes || freezes < 1) return state;
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      return merge(state, { streak: { cur, best, lastDay: todayStr(yest), freezes: freezes - 1 } });
    }

    case "UPD_CFG":
      return merge(state, { cfg: merge(state.cfg, action.cfg) });

    case "SAVE_JOURNAL":
      return merge(state, {
        journals: merge(state.journals, {
          [action.date]: { reflection: action.reflection, mood: action.mood, savedAt: new Date().toISOString() }
        })
      });

    case "ADD_TOMORROW_TASK":
      return merge(state, { tomorrowTasks: [...(state.tomorrowTasks || []), action.task] });

    case "DEL_TOMORROW_TASK":
      return merge(state, { tomorrowTasks: (state.tomorrowTasks || []).filter(t => t.id !== action.id) });

    case "ADD_CAL_ITEM": {
      const existing = state.calendarItems?.[action.date] || [];
      return merge(state, { calendarItems: merge(state.calendarItems, { [action.date]: [...existing, action.item] }) });
    }
    case "DEL_CAL_ITEM": {
      const existing = state.calendarItems?.[action.date] || [];
      return merge(state, { calendarItems: merge(state.calendarItems, { [action.date]: existing.filter(i => i.id !== action.id) }) });
    }

    case "IMPORT": return merge(merge({}, DEFAULT_STATE), action.data);

    case "ADD_WEEKLY_TASK":
      return merge(state, { weeklyTasks: [...(state.weeklyTasks || []), action.task] });

    case "COMPLETE_WEEKLY_TASK": {
      const now  = new Date();
      const task = (state.weeklyTasks || []).find(t => t.id === action.id);
      let pts = 50;
      if (task?.completedBy !== "" && task?.completedBy !== undefined) {
        const mon     = d => (d + 6) % 7;
        const daysLeft = Math.max(0, Math.min(1, 1 - (mon(now.getDay()) + 7) % 7 / 7));
        pts = Math.round(30 + daysLeft * 70);
      }
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - (now.getDay() + 6) % 7);
      weekStart.setHours(0,0,0,0);
      const weekKey = todayStr(weekStart);
      return merge(state, {

        weeklyTasks: (state.weeklyTasks || []).map(t =>
          t.id === action.id
            ? merge(t, { completions: [...(t.completions || []), { weekKey, completedAt: now.toISOString(), pointsEarned: pts }] })
            : t
        )
      });
    }

    case "UPD_WEEKLY_TASK":
      return merge(state, { weeklyTasks: (state.weeklyTasks || []).map(t => t.id === action.id ? merge(t, action.patch) : t) });

    case "DEL_WEEKLY_TASK":
      return merge(state, { weeklyTasks: (state.weeklyTasks || []).filter(t => t.id !== action.id) });

    case "RESET_DAY": {
      const today = todayStr();
      return merge(state, {
        instances: merge(state.instances, { [today]: [] }),
        cfg: merge(state.cfg, { lastDailySpin: null }),
      });
    }

    case "PRUNE": {
      const today = todayStr();
      // Also prune skippedDays older than today
      const skipped = state.skippedDays || {};
      const prunedSkipped = {};
      Object.keys(skipped).forEach(date => { if (date >= today) prunedSkipped[date] = skipped[date]; });
      return merge(state, {
        tomorrowTasks: (state.tomorrowTasks || []).filter(t => t.forDate >= today),
        skippedDays: prunedSkipped,
      });
    }

    case "SKIP_TODAY": {
      // Mark a task as skipped for a specific date (durable move-to-tomorrow for recurring tasks)
      const { date, taskId } = action;
      const existing = (state.skippedDays || {})[date] || [];
      if (existing.includes(taskId)) return state;
      return merge(state, {
        skippedDays: merge(state.skippedDays || {}, { [date]: [...existing, taskId] })
      });
    }

    case "UPD_HOMEWORK":
      return merge(state, { homework: action.homework });

    default: return state;
  }
}

// ── Export helpers ───────────────────────────────────────
function buildExportData(state) {
  const all       = Object.values(state.instances).flat();
  const finalized = all.filter(i => i.status !== "pending");
  const completed = finalized.filter(i => i.status === "completed");
  return {
    _meta: { app:"Sched", exportVersion:EXPORT_VERSION, exportedAt:new Date().toISOString(), exportedAtReadable:new Date().toLocaleString() },
    tasks: state.tasks, instances: state.instances, cfg: state.cfg, streak: state.streak,

    _summary: {
      totalTasks: state.tasks.length, activeTasks: state.tasks.filter(t=>t.active).length,
      totalDaysTracked: Object.keys(state.instances).length,
      totalCompleted: completed.length, totalFinalized: finalized.length,
      completionRate: finalized.length > 0 ? Math.round(completed.length/finalized.length*100) : 0,
      currentStreak: state.streak.cur, bestStreak: state.streak.best,


    }
  };
}

function mergeImport(imported, current) {
  return merge(merge({}, current), {
    tasks:       imported.tasks       ?? current.tasks,
    instances:   imported.instances   ?? current.instances,
    cfg:         merge(current.cfg, imported.cfg ?? {}),
    streak:      imported.streak      ?? current.streak,
  });
}

function Toast({ msg, onDone }) {
  const [clicked, setClicked] = React.useState(false);
  const timerRef = React.useRef(null);
  useEffect(() => {
    timerRef.current = setTimeout(onDone, 2500);
    return () => clearTimeout(timerRef.current);
  }, []);
  const handleClick = () => {
    if (!clicked) {
      clearTimeout(timerRef.current);
      setClicked(true);
    }
  };
  return (
    <div className="toast" onClick={handleClick} style={{cursor:"pointer",display:"flex",alignItems:"flex-start",gap:10,whiteSpace:"normal",maxWidth:"calc(100vw - 40px)",textAlign:"left",borderRadius:16,padding:"12px 16px"}}>
      <span style={{flex:1,wordBreak:"break-word"}}>{msg}</span>
      {clicked && (
        <button
          onClick={e=>{e.stopPropagation();onDone();}}
          style={{flexShrink:0,background:"#e03040",border:"none",borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",fontSize:14,fontWeight:700,lineHeight:1,marginTop:1}}

  );
}

function TimeRibbon() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 60_000); return () => clearInterval(t); }, []);
  const pct     = (now.getHours()*60 + now.getMinutes()) / 1440 * 100;
  const timeStr = now.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  return (
    <div className="time-ribbon">
      <div className="time-track">
        <div className="time-fill" style={{ width:`${pct}%` }} />
        <div className="time-dot"  style={{ left:`${pct}%` }} />
      </div>
      <div className="time-lbl" style={{ color:"var(--coral)", fontWeight:800 }}>{timeStr}</div>
    </div>
  );
}

function RingChart({ pct, label, color, size = 72 }) {
  const r    = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg3)" strokeWidth={5} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
          strokeLinecap="round" strokeDasharray={circ}
          strokeDashoffset={circ * (1 - pct/100)}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition:"stroke-dashoffset 1s ease" }} />
        <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
          style={{ fontSize:size*0.22, fontWeight:900, fontFamily:"'DM Mono',monospace", fill:color }}>
          {pct.toFixed(1)}%
        </text>
      </svg>
      <div style={{ fontFamily:"var(--mono)", fontSize:12, fontWeight:700, color:"var(--text3)", letterSpacing:1.5, textTransform:"uppercase" }}>{label}</div>
    </div>
  );
}

function ConfettiBurst({ x, y, onDone }) {
  const COLORS = ["#ff5f57","#00e5a0","#ff8a82","#c77dff","#4cc9f0","#ffd166"];
  const particles = Array.from({ length: 10 }, (_, i) => {
    const angle = i/10 * Math.PI * 2;
    const dist  = 38 + Math.random()*22;
    return { dx: Math.cos(angle)*dist+"px", dy: Math.sin(angle)*dist+"px", color: COLORS[i%COLORS.length] };
  });
  useEffect(() => { const t = setTimeout(onDone, 600); return () => clearTimeout(t); }, []);
  return (
    <>
      {particles.map((p, i) => (
        <div key={i} className="burst-particle"
          style={{ left:x, top:y, background:p.color, "--dx":p.dx, "--dy":p.dy, animationDelay:`${i*18}ms` }} />
      ))}
    </>
  );
}

const QUICK_TASKS = [
  "Morning run", "Workout", "Read", "Journal", "Meditate",
  "Study", "Practice", "Review notes", "Clean up", "Stretch",
];

function QuickAddSheet({ onAdd, onClose, recentTasks, todayTaskCount }) {
  const [name, setName] = React.useState('');
  const inputRef        = React.useRef(null);
  const MAX_TASKS = 5;
  const isAtLimit = todayTaskCount >= MAX_TASKS;

  React.useEffect(() => { setTimeout(() => inputRef.current?.focus(), 100); }, []);

  const submit = (taskName, toTomorrow) => {
    const n = (taskName || name).trim();
    if (!n) return;
    onAdd({ name: n, category: "morning", toTomorrow: !!toTomorrow });
    onClose();
  };

  // Filter common tasks not already in recents
  const recentNames = new Set((recentTasks||[]).map(t => t.name.toLowerCase()));
  const suggestions = QUICK_TASKS.filter(t => !recentNames.has(t.toLowerCase()));

  return (
    <div className="backdrop" style={{ alignItems:"center", padding:"0 16px" }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet sheet-centered" style={{ maxWidth:460, borderRadius:20, width:"100%" }}>
        <div className="sheet-handle" />
        <div style={{ fontSize:22, fontWeight:900, fontFamily:'var(--heading)', marginBottom:14 }}>Quick Add</div>

        {/* Over-limit warning */}
        {isAtLimit && (
          <div style={{ background:"rgba(255,59,92,0.1)", border:"1.5px solid var(--red)", borderRadius:12, padding:"12px 14px", marginBottom:14, animation:"bannerPulse 1.5s ease-in-out infinite" }}>
            <div style={{ fontSize:16, fontWeight:900, color:"var(--red)", marginBottom:2 }}>5 tasks today — that's the limit</div>
            <div style={{ fontSize:14, color:"var(--text2)" }}>Adding more hurts consistency. Move it to tomorrow instead.</div>
          </div>
        )}

        <input ref={inputRef} className="field"
          value={name} onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !isAtLimit && submit()}
          placeholder="Task name…" />

        {/* Recent tasks */}
        {recentTasks && recentTasks.length > 0 && (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:13, fontFamily:'var(--mono)', fontWeight:800, color:'var(--text3)', letterSpacing:1, textTransform:'uppercase', marginBottom:8 }}>Recent</div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              {recentTasks.slice(0, 6).map((t, i) => (
                <button key={i} className="quick-recent-chip" onClick={() => isAtLimit ? submit(t.name, true) : submit(t.name)}>
                  {t.name}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Common suggestions */}
        {suggestions.length > 0 && (
          <div style={{ marginBottom:18 }}>
            <div style={{ fontSize:13, fontFamily:'var(--mono)', fontWeight:800, color:'var(--text3)', letterSpacing:1, textTransform:'uppercase', marginBottom:8 }}>Common</div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              {suggestions.slice(0, 8).map((t, i) => (
                <button key={i} className="quick-recent-chip" onClick={() => isAtLimit ? submit(t, true) : submit(t)}>
                  {t}
                </button>
              ))}
            </div>
          </div>
        )}

        {isAtLimit ? (
          <>
            <button className="btn btn-full btn-primary" onClick={() => submit(name, true)} style={{ marginBottom:8, fontSize:19, padding:20 }}>
              Add to Tomorrow
            </button>
            <button className="btn btn-full" onClick={() => submit(name, false)}
              style={{ marginBottom:8, background:"var(--bg3)", color:"var(--text3)", fontSize:15, opacity:0.6 }}>
              Add Today Anyway
            </button>
          </>
        ) : (
          <button className="btn btn-full btn-primary" onClick={() => submit()} style={{ marginBottom:8 }}>Add Task</button>
        )}
        <button className="btn btn-full btn-secondary" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}


function WeeklySummaryModal({ state, onClose }) {
  const now = new Date();
  const DAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const days7 = Array.from({ length:7 }, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-6+i); return todayStr(d);
  });

  // Per-day stats
  const dayStats = days7.map(ds => {
    const insts = (state.instances?.[ds] || []).filter(i => i.taskId !== JOURNAL_TASK_ID);
    const done = insts.filter(i => i.status === "completed").length;
    const total = insts.length;
    const hasJournal = !!(state.journals?.[ds]?.reflection || state.journals?.[ds]?.text);
    const d = new Date(ds + "T12:00:00");
    return { ds, done, total, hasJournal, pct: total > 0 ? done/total : 0, label: DAY_SHORT[d.getDay()] };
  });

  const totalCompleted = dayStats.reduce((a,d) => a+d.done, 0);
  const totalTasks     = dayStats.reduce((a,d) => a+d.total, 0);
  const journalDays    = dayStats.filter(d => d.hasJournal).length;
  const activeDays     = dayStats.filter(d => d.total > 0).length;
  const perfectDays    = dayStats.filter(d => d.total > 0 && d.done === d.total).length;
  const bestDay        = dayStats.reduce((best, d) => d.done > (best?.done||0) ? d : best, null);
  const rate           = totalTasks > 0 ? Math.round(totalCompleted/totalTasks*100) : 0;
  const grade          = rate >= 90 ? "S" : rate >= 75 ? "A" : rate >= 60 ? "B" : rate >= 45 ? "C" : "D";
  const gradeColor     = rate >= 90 ? "var(--green)" : rate >= 75 ? "var(--blue)" : rate >= 60 ? "var(--coral)" : rate > 0 ? "var(--coral)" : "var(--text3)";

  // Written reflection sentence
  const reflection = (() => {
    if (totalTasks === 0) return "No tasks were scheduled this week.";
    if (rate === 100) return `Perfect week — every task done, ${journalDays} journal ${journalDays===1?"entry":"entries"}. You showed up every day.`;
    if (rate >= 80) return `Strong week. ${perfectDays} perfect day${perfectDays!==1?"s":""} and ${journalDays} journal ${journalDays===1?"entry":"entries"}. Keep the momentum.`;
    if (rate >= 60) return `Solid effort. You completed ${totalCompleted} of ${totalTasks} tasks across ${activeDays} active days.`;
    if (rate >= 40) return `Inconsistent week — ${totalCompleted} tasks done. ${journalDays > 0 ? "The journal habit is holding." : "Try adding a journal entry each night."}`;
    return `Tough week. Only ${totalCompleted} task${totalCompleted!==1?"s":""} completed. Tomorrow is a fresh start.`;
  })();

  const maxBar = Math.max(...dayStats.map(d => d.total), 1);

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:600, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 16px" }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"var(--bg1)", borderRadius:20, width:"100%", maxWidth:480, maxHeight:"90dvh", overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"24px 20px 28px" }} onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:22 }}>
          <div style={{ fontSize:12, fontWeight:800, color:"var(--text3)", fontFamily:"var(--mono)", letterSpacing:2, textTransform:"uppercase", marginBottom:6 }}>Weekly Reflection</div>
          <div style={{ fontSize:32, fontWeight:900, fontFamily:"var(--heading)", fontStyle:"italic", color:"var(--coral)", lineHeight:1.1 }}>
            {now.toLocaleDateString("en-US",{month:"long",day:"numeric"})}
          </div>
        </div>

        {/* Grade + rate */}
        <div style={{ display:"flex", alignItems:"center", gap:16, padding:"16px 18px", background:"var(--bg2)", borderRadius:14, marginBottom:16 }}>
          <div style={{ fontSize:72, fontWeight:900, fontFamily:"var(--heading)", color:gradeColor, lineHeight:1, filter:`drop-shadow(0 0 20px ${gradeColor}55)`, flexShrink:0 }}>{grade}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:22, fontWeight:800, color:"var(--text)" }}>{rate}% completion</div>
            <div style={{ fontSize:14, color:"var(--text3)", fontFamily:"var(--mono)", marginTop:3 }}>{totalCompleted}/{totalTasks} tasks · {activeDays} active days</div>
            <div style={{ marginTop:8, height:5, background:"var(--bg3)", borderRadius:99, overflow:"hidden" }}>
              <div style={{ height:"100%", width:rate+"%", background:gradeColor, borderRadius:99, transition:"width 1s ease" }} />
            </div>
          </div>
        </div>

        {/* Stat row */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:16 }}>
          {[
            [perfectDays, "Perfect Days", "var(--green)"],
            [journalDays, "Journal Days", "var(--coral2)"],
            [state.streak?.cur||0, "Streak", "var(--coral)"],
            [activeDays, "Active Days", "var(--blue)"],
          ].map(([val,lbl,col]) => (
            <div key={lbl} style={{ background:"var(--bg2)", borderRadius:12, padding:"12px 8px", textAlign:"center", border:"1px solid var(--border)" }}>
              <div style={{ fontSize:26, fontWeight:900, color:col, fontFamily:"var(--heading)" }}>{val}</div>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--text3)", fontFamily:"var(--mono)", letterSpacing:0.5, textTransform:"uppercase", marginTop:2, lineHeight:1.3 }}>{lbl}</div>
            </div>
          ))}
        </div>

        {/* Day-by-day bar chart */}
        <div style={{ marginBottom:16, padding:"14px 14px 10px", background:"var(--bg2)", borderRadius:14, border:"1px solid var(--border)" }}>
          <div style={{ fontSize:13, fontWeight:800, color:"var(--text3)", fontFamily:"var(--mono)", letterSpacing:1.5, textTransform:"uppercase", marginBottom:10 }}>Daily breakdown</div>
          <div style={{ display:"flex", gap:6, alignItems:"flex-end", height:52 }}>
            {dayStats.map(d => {
              const barH = d.total > 0 ? Math.max(6, Math.round((d.done/maxBar)*48)) : 4;
              const col = d.total===0 ? "var(--bg3)" : d.pct===1 ? "var(--green)" : d.pct>=0.5 ? "var(--coral)" : "var(--red)";
              return (
                <div key={d.ds} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <div style={{ width:"100%", height:barH, background:col, borderRadius:4, transition:"height 0.6s ease", position:"relative" }}>
                    {d.hasJournal && <div style={{ position:"absolute", top:-6, left:"50%", transform:"translateX(-50%)", fontSize:13, color:"var(--coral2)" }}>✶</div>}
                  </div>
                  <div style={{ fontSize:13, fontWeight:700, color: d.ds===todayStr()?"var(--coral)":"var(--text3)", fontFamily:"var(--mono)" }}>{d.label}</div>

                </div>
              );
            })}
          </div>
        </div>

        {/* Best day */}
        {bestDay && bestDay.done > 0 && (
          <div style={{ marginBottom:16, padding:"12px 16px", background:"var(--bg2)", borderRadius:12, border:"1px solid var(--border)", display:"flex", alignItems:"center", gap:12 }}>

            <div>
              <div style={{ fontSize:15, fontWeight:800, color:"var(--text)" }}>Best day: {bestDay.label}</div>
              <div style={{ fontSize:13, color:"var(--text3)", fontFamily:"var(--mono)" }}>{bestDay.done} task{bestDay.done!==1?"s":""} completed</div>
            </div>
          </div>
        )}

        {/* Written reflection */}
        <div style={{ marginBottom:20, padding:"14px 16px", background:"rgba(255,138,130,0.06)", border:"1px solid rgba(255,138,130,0.2)", borderRadius:12 }}>
          <div style={{ fontSize:13, fontWeight:800, color:"var(--coral2)", fontFamily:"var(--mono)", letterSpacing:1.5, textTransform:"uppercase", marginBottom:6 }}>Reflection</div>
          <div style={{ fontSize:17, fontWeight:600, color:"var(--text)", lineHeight:1.55, fontStyle:"italic" }}>{reflection}</div>
        </div>

        {/* Share button */}
        {(() => {
          const shareText = `📊 My Tempo Week\n\n` +
            `${grade} — ${rate}% completion\n` +
            `✅ ${totalCompleted}/${totalTasks} tasks\n` +
            `🔥 ${state.streak?.cur||0} day streak\n` +
            `📓 ${journalDays} journal ${journalDays===1?"entry":"entries"}\n` +
            `⭐ ${perfectDays} perfect ${perfectDays===1?"day":"days"}\n\n` +
            `${reflection}\n\n` +
            `Built with Tempo.`;
          const canShare = typeof navigator !== "undefined" && !!navigator.share;
          return (
            <button
              className="btn btn-full"
              style={{ marginBottom:10, background:"var(--bg2)", border:"1px solid var(--border)", color:"var(--text)", fontSize:16, fontWeight:800 }}
              onClick={() => {
                if (canShare) {
                  navigator.share({ title:"My Tempo Week", text: shareText }).catch(()=>{});
                } else {
                  navigator.clipboard?.writeText(shareText);
                }
              }}>
              {canShare ? "↑ Share my week" : "⎘ Copy recap"}
            </button>
          );
        })()}
        <button className="btn btn-full btn-primary" onClick={onClose}>Start the new week →</button>
      </div>
    </div>
  );
}

// ── Auto-assign points silently ──────────────────────────
function inferPoints(task) {
  // Recurring daily tasks = 10pt, one-time tasks = 25pt
  return task.repeat === false ? 25 : 10;
}

// ── Smart day suggestions ─────────────────────────────────
const DAY_SUGGESTIONS = [
  { label:"Every day",   days:[0,1,2,3,4,5,6] },
  { label:"Weekdays",    days:[1,2,3,4,5] },
  { label:"Weekends",    days:[0,6] },
  { label:"MWF",         days:[1,3,5] },
  { label:"T/Th",        days:[2,4] },
];

// ── TaskForm ─────────────────────────────────────────────
function TaskForm({ init, mode, onSave, onCancel }) {
  // mode: "daily" | "onetime"
  const todayDow = new Date().getDay(); // 0=Sun..6=Sat
  const isDaily  = mode === "daily";

  const [form, setForm] = useState(init || {
    name: "",
    category: "morning", // kept in data for compatibility, not shown
    days: isDaily ? [todayDow] : [todayDow],
    points: isDaily ? 10 : 25,
    active: true,

    journal: false,
    notes: "",
    repeat: false,
  });

  const set = (key, val) => setForm(f => merge(f, { [key]: val }));
  const toggleDay = day => set("days",
    form.days.includes(day) ? form.days.filter(d => d !== day) : [...form.days, day].sort()
  );

  // Auto-update points when repeat changes
  const setRepeat = (val) => {
    setForm(f => merge(f, { repeat: val, points: val ? 10 : 25 }));
  };

  const handleSave = () => {
    if (!form.name.trim() || !form.days.length) return;
    const pts = inferPoints(form);
    onSave({ ...form, points: pts });
  };

  return (
    <div>
      {/* Task name */}
      <input className="field" value={form.name}
        onChange={e => set("name", e.target.value)}
        placeholder={isDaily ? "e.g. Morning run" : "e.g. Clean room"}
        autoFocus style={{ marginBottom:16 }} />

      {/* Days — hidden for one-time tasks (they're always for today) */}
      {isDaily && (
        <>
          <label className="field-label">Days</label>
          <div className="day-picker" style={{ marginBottom:10 }}>
            {DAYS_SHORT.map((label, i) => (
              <button key={i} className={`day-pill ${form.days.includes(i) ? "on" : ""}`}
                onClick={() => toggleDay(i)}>{label}</button>
            ))}
          </div>
        </>
      )}



      {/* Repeat toggle — shown for daily tasks */}
      {isDaily && (
        <div onClick={() => setRepeat(!form.repeat)} style={{
          display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"13px 16px", borderRadius:12, marginBottom:16,
          background: form.repeat ? "rgba(255,95,87,0.08)" : "var(--bg2)",
          border: `1.5px solid ${form.repeat ? "var(--coral)" : "var(--border)"}`,
          cursor:"pointer", transition:"all 0.15s"
        }}>
          <div>
            <div style={{ fontSize:18, fontWeight:800 }}>Repeats weekly</div>
            <div style={{ fontSize:15, color:"var(--text3)", marginTop:2 }}>
              {form.repeat ? "Shows up every week" : "One week only"}
            </div>
          </div>
          <div style={{ width:40, height:24, borderRadius:99, padding:2,
            background: form.repeat ? "var(--coral)" : "var(--bg3)",
            display:"flex", alignItems:"center",
            justifyContent: form.repeat ? "flex-end" : "flex-start",
            transition:"all 0.2s", flexShrink:0 }}>
            <div style={{ width:18, height:18, borderRadius:"50%", background:"#fff" }} />
          </div>
        </div>
      )}

      {/* Time of day — daily tasks only */}
      {isDaily && (
        <div style={{ marginBottom:16 }}>
          <label className="field-label">Time of Day</label>
          <div style={{ display:"flex", gap:8 }}>
            {[["morning","Morning"],["afternoon","Afternoon"],["night","Night"]].map(([val,label]) => (
              <button key={val}
                onClick={() => set("category", val)}
                style={{ flex:1, padding:"11px 0", borderRadius:10, fontSize:15, fontFamily:"var(--font)", fontWeight:800, cursor:"pointer",
                  border:`1.5px solid ${form.category===val?"var(--coral)":"var(--border)"}`,

      <button className="btn btn-full btn-primary" onClick={handleSave}
        style={{ marginBottom:10 }}>
        {init ? "Save Changes" : isDaily ? "Add Daily Task" : "Add Task"}
      </button>
      <button className="btn btn-full btn-secondary" onClick={onCancel}>Cancel</button>
    </div>
  );
}

const JOURNAL_PROMPTS = [
  "What's one win from today, however small?",
  "What drained your energy today?",
  "What's one thing you'd do differently?",
  "Who or what are you grateful for right now?",
  "What's been on your mind lately?",
  "Describe today in three words.",
  "What did you learn today?",
  "What are you looking forward to tomorrow?",
  "What's something you're proud of this week?",
  "Where did you spend most of your focus?",
  "What would make tomorrow better?",
  "What emotion showed up most today?",
];

function TypewriterPrompt({ active }) {
  const [displayed, setDisplayed] = React.useState("");
  const [promptIdx, setPromptIdx] = React.useState(() => Math.floor(Math.random() * JOURNAL_PROMPTS.length));
  const [phase, setPhase] = React.useState("typing"); // typing | waiting | erasing
  const timerRef = React.useRef(null);

  React.useEffect(() => {
    if (!active) { setDisplayed(""); setPhase("typing"); return; }
    const prompt = JOURNAL_PROMPTS[promptIdx];

    if (phase === "typing") {
      if (displayed.length < prompt.length) {
        timerRef.current = setTimeout(() => setDisplayed(prompt.slice(0, displayed.length + 1)), 45);
      } else {
        timerRef.current = setTimeout(() => setPhase("waiting"), 5000);
      }
    } else if (phase === "waiting") {
      timerRef.current = setTimeout(() => setPhase("erasing"), 100);
    } else if (phase === "erasing") {
      if (displayed.length > 0) {
        timerRef.current = setTimeout(() => setDisplayed(d => d.slice(0, -1)), 18);
      } else {
        setPromptIdx(i => (i + 1) % JOURNAL_PROMPTS.length);
        setPhase("typing");
      }
    }
    return () => clearTimeout(timerRef.current);
  }, [active, phase, displayed, promptIdx]);

  if (!active) return null;
  return (
    <div style={{ position:"absolute", inset:0, padding:"12px 14px", pointerEvents:"none",
      fontSize:15, lineHeight:1.7, color:"var(--text3)", fontFamily:"var(--font)", opacity:0.6 }}>
      {displayed}<span style={{ borderRight:"1.5px solid var(--text3)", marginLeft:1, animation:"cursorBlink 1s step-end infinite" }} />
    </div>
  );
}
