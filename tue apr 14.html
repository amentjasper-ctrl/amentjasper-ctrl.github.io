// ── SwipeableTaskCard ────────────────────────────────────
function SwipeableTaskCard({ inst, task, cfg, completingIds, onTap, onSwipeComplete, isPending, isDone, isJournal, onDelete, onUndo, onEdit, isPinned }) {
  const cardRef    = useRef(null);
  const startX     = useRef(null);
  const currentX   = useRef(0);
  const [swipeState, setSwipeState] = useState("idle");

  const canSwipe = isPending && !isDone && !completingIds[inst.id];
  const canSwipeLeft = isDone && !!onDelete;

  const handleTouchStart = (e) => {
    if (!canSwipe && !canSwipeLeft) return;
    startX.current = e.touches[0].clientX;
    currentX.current = 0;
  };

  const handleTouchMove = (e) => {
    if (startX.current === null) return;
    const dx = e.touches[0].clientX - startX.current;
    const el = cardRef.current;
    if (canSwipe && dx > 0) {
      // Swipe right — complete
      currentX.current = dx;
      if (el) { el.style.transform = `translateX(${Math.min(dx, 120)}px)`; el.style.transition = "none"; }
      const track = el?.querySelector(".swipe-track");
      if (track) track.style.opacity = Math.min(dx / 80, 1);
      setSwipeState(dx > 80 ? "confirmed" : "swiping");
    } else if (canSwipeLeft && dx < 0) {
      // Swipe left — delete
      currentX.current = dx;
      if (el) { el.style.transform = `translateX(${Math.max(dx, -120)}px)`; el.style.transition = "none"; }
      const ltrack = el?.querySelector(".swipe-left-track");
      if (ltrack) ltrack.style.opacity = Math.min(Math.abs(dx) / 80, 1);
      setSwipeState(dx < -80 ? "left-confirmed" : "left-swiping");
    }
  };

  const handleTouchEnd = () => {
    if (startX.current === null) return;
    const el = cardRef.current;
    startX.current = null;
    if (el) { el.style.transform = ""; el.style.transition = ""; }
    const track = el?.querySelector(".swipe-track");
    if (track) track.style.opacity = "";
    const ltrack = el?.querySelector(".swipe-left-track");
    if (ltrack) ltrack.style.opacity = "";

    if (currentX.current > 80 && canSwipe) {
      onSwipeComplete();
    } else if (currentX.current < -80 && canSwipeLeft) {
      onDelete(inst, task);
    }
    currentX.current = 0;
    setSwipeState("idle");
  };

  const canTap    = isJournal ? true : (isPending && !isDone);
  const isAnim    = completingIds[inst.id];
  const borderCol = isJournal && isDone ? "var(--purple)" : isDone ? "var(--green)" : canTap ? "var(--coral)" : "var(--border)";

  return (
    <div ref={cardRef}
      className={`task-card ${canTap && !isDone ? "can" : ""} ${isAnim ? "completing" : ""} ${isDone ? "sliding-in" : ""} ${canTap && !isDone ? "pending-wash" : ""} ${swipeState}`}
      style={{ borderLeft:`5px solid ${borderCol}`, background: isDone ? "var(--done-bg)" : undefined, opacity: isAnim ? 0.6 : 1 }}
      onClick={e => canTap && onTap(inst, e)}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      <div className="swipe-track"><span>✓</span></div>
      <div className="swipe-left-track"><span>🗑</span></div>

      <div className={`check-circle ${isDone ? "done-c" : canTap ? "can" : ""} ${isAnim ? "popping" : ""}`}>
        {isDone ? "✓" : ""}
      </div>

      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:22, fontWeight:800, textDecoration: isDone ? "line-through" : "none",
          color: isDone ? "var(--text2)" : "var(--text)", display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
          {task.name}
          {isPinned && !isDone && (
            <span style={{ fontSize:13, fontFamily:"var(--mono)", color:"var(--coral)", opacity:0.7, letterSpacing:0.5 }}>📌</span>
          )}
          {task.journal && !isDone && (
            <span style={{ fontSize:17, fontFamily:"var(--mono)", color:"var(--coral)",
              background:"rgba(255,95,87,0.12)", padding:"1px 6px", borderRadius:99, fontWeight:700, letterSpacing:0.5 }}>
              JOURNAL
            </span>
          )}
        </div>
        <div style={{ fontSize:18, color:"var(--text2)", marginTop:4, fontWeight:600 }}>
          {task.category ? task.category.charAt(0).toUpperCase()+task.category.slice(1) : ""}
        </div>
        {task.notes && (
          <div style={{ fontSize:17, color:"var(--text3)", marginTop:3, fontFamily:"var(--mono)" }}>{task.notes}</div>
        )}
        {isDone && task._streak > 1 && (
          <div style={{ marginTop:5 }}>
            <span className="task-streak-badge">◆ {task._streak}-day streak</span>
          </div>
        )}
      </div>

      <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3, flexShrink:0 }}>
        {isDone && (onDelete || onUndo) && (
          <div style={{ display:"flex", flexDirection:"row", alignItems:"center", gap:6 }}>
            {onUndo && (
              <button onClick={e => { e.stopPropagation(); onUndo(inst); }}
                style={{ fontSize:13, fontWeight:700, color:"var(--text3)", background:"none", border:"1px solid var(--border)",
                  borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"var(--mono)", WebkitTapHighlightColor:"transparent" }}>
                undo
              </button>
            )}
            {onDelete && (
              <button onClick={e => { e.stopPropagation(); onDelete(inst, task); }}
                style={{ fontSize:13, fontWeight:700, color:"var(--text3)", background:"none", border:"1px solid var(--border)",
                  borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"var(--mono)", WebkitTapHighlightColor:"transparent" }}>
                delete
              </button>
            )}
          </div>
        )}
        {!isDone && canTap && onEdit && (
          <button onClick={e => { e.stopPropagation(); onEdit(task); }}
            style={{ fontSize:13, fontWeight:700, color:"var(--text3)", background:"none", border:"1px solid var(--border)",
              borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"var(--mono)", WebkitTapHighlightColor:"transparent" }}>
            edit
          </button>
        )}
        {!isDone && canTap && <div style={{ fontSize:17, fontWeight:700, color:"var(--coral)" }}>swipe ›</div>}
      </div>
    </div>
  );
}

// ── InlineQuickAdd ───────────────────────────────────────
function InlineQuickAdd({ onAdd, recentTasks, todayNames }) {
  const [open, setOpen] = useState(false);
  const [val, setVal]   = useState("");
  const inputRef        = useRef(null);

  const submit = (name) => {
    const n = (name !== undefined ? name : val).trim();
    if (!n) { setOpen(false); return; }
    onAdd(n);
    setVal(""); setOpen(false);
  };

  const todaySet    = new Set((todayNames||[]).map(n => n.toLowerCase()));
  const recentChips = (recentTasks||[]).filter(t => t.active && !todaySet.has(t.name.toLowerCase())).slice(0, 5);
  const recentNames = new Set(recentChips.map(t => t.name.toLowerCase()));
  const commonChips = QUICK_TASKS.filter(t => !todaySet.has(t.toLowerCase()) && !recentNames.has(t.toLowerCase())).slice(0, 6);
  const hasChips    = recentChips.length > 0 || commonChips.length > 0;

  if (!open) return (
    <button onClick={() => { setOpen(true); setTimeout(() => inputRef.current?.focus(), 60); }}
      style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, width:"100%",
        marginTop:10, padding:"12px 0", borderRadius:14, border:"1.5px dashed var(--border)", background:"transparent",
        color:"var(--text3)", fontFamily:"var(--font)", fontSize:19, fontWeight:700,
        cursor:"pointer", WebkitTapHighlightColor:"transparent", transition:"all 0.15s" }}
      onMouseEnter={e => { e.currentTarget.style.borderColor="var(--coral)"; e.currentTarget.style.color="var(--coral)"; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor="var(--border)"; e.currentTarget.style.color="var(--text3)"; }}>
      <span style={{ fontSize:18 }}>+</span> add task
    </button>
  );

  return (
    <div style={{ marginTop:10, background:"var(--bg2)", borderRadius:14, border:"1.5px solid var(--coral)", overflow:"hidden", animation:"fadeScale 0.15s ease" }}>
      <div style={{ display:"flex", gap:8, alignItems:"center", padding:"6px 6px 6px 14px" }}>
        <input ref={inputRef} value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if(e.key==="Enter") submit(); if(e.key==="Escape"){setOpen(false);setVal("");} }}
          placeholder="Task name…"
          style={{ flex:1, background:"transparent", border:"none", outline:"none",
            color:"var(--text)", fontFamily:"var(--font)", fontSize:21, fontWeight:600 }} />
        <button onClick={() => submit()}
          style={{ background:"var(--coral)", border:"none", borderRadius:10, padding:"9px 16px",
            color:"#fff", fontFamily:"var(--font)", fontSize:17, fontWeight:800, cursor:"pointer",
            WebkitTapHighlightColor:"transparent", flexShrink:0 }}>Add</button>
        <button onClick={() => { setOpen(false); setVal(""); }}
          style={{ background:"transparent", border:"none", color:"var(--text3)", fontSize:20,
            cursor:"pointer", padding:"6px 4px", lineHeight:1, WebkitTapHighlightColor:"transparent" }}>✕</button>
      </div>
      {hasChips && (
        <div style={{ borderTop:"1px solid var(--border)", padding:"10px 12px 12px" }}>
          {recentChips.length > 0 && (
            <div style={{ marginBottom: commonChips.length > 0 ? 8 : 0 }}>
              <div style={{ fontSize:13, fontFamily:"var(--mono)", fontWeight:800, color:"var(--text3)", letterSpacing:1, textTransform:"uppercase", marginBottom:6 }}>Recent</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {recentChips.map((t,i) => <button key={i} className="quick-recent-chip" onClick={() => submit(t.name)}>{t.name}</button>)}
              </div>
            </div>
          )}
          {commonChips.length > 0 && (
            <div>
              <div style={{ fontSize:13, fontFamily:"var(--mono)", fontWeight:800, color:"var(--text3)", letterSpacing:1, textTransform:"uppercase", marginBottom:6 }}>Common</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {commonChips.map((t,i) => <button key={i} className="quick-recent-chip" onClick={() => submit(t)}>{t}</button>)}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function HomeView({ state, dispatch, showToast, onQuickAdd, onOpenJournal, onEditTask }) {
  const [browseDate, setBrowseDate]           = useState(todayStr());
  const today = todayStr();
  const isToday = browseDate === today;

  const { tasks, instances, cfg, streak } = state;
  const [completingIds, setCompletingIds] = useState({});
  const [confettiPos, setConfettiPos]     = useState(null);
  const [showMotivCard, setShowMotivCard] = useState(false);
  const [showPerfectDay, setShowPerfectDay] = useState(false);
  const [moveMode, setMoveMode] = useState(false);
  const completedCountRef = useRef(0);
  const longPressTimer = useRef(null);

  const handleCardLongPress = () => {
    if (!isToday) return;
    setMoveMode(true);
    if (navigator.vibrate) navigator.vibrate([40, 20, 80]);
  };
  const startLongPress = () => {
    longPressTimer.current = setTimeout(handleCardLongPress, 550);
  };
  const cancelLongPress = () => {
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
  };

  const orderedTasks = (() => {
    const order = state.taskOrder || [];
    const byId  = Object.fromEntries(tasks.map(t => [t.id, t]));
    const sorted = order.filter(id => byId[id]).map(id => byId[id]);
    const rest   = tasks.filter(t => !order.includes(t.id));
    return [...sorted, ...rest];
  })();

  const lastDay = useRef(today);
  useEffect(() => {
    if (lastDay.current !== today) {
      lastDay.current = today;
      const stored = instances[today] || [];
      const fresh  = stored.filter(i => i.status === "completed" && i.completedAt && (d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`)(new Date(i.completedAt)) === today);
      dispatch({ type:"SET_INST", date:today, list: fresh });
    }
  }, [today]);

  const todayInstList = (() => {
    const dayOfWeek  = isToday ? new Date().getDay() : new Date(browseDate + "T12:00:00").getDay();
    const dailyTasks = orderedTasks.filter(t => {
      if (!t.active) return false;
      if (!t.days.includes(dayOfWeek)) return false;
      if (t.repeat === false && t.createdAt) {
        const created = t.createdAt.slice(0, 10);
        if (created !== today) return false;
      }
      return true;
    });
    const extraTasks  = (state.tomorrowTasks || []).filter(t => t.forDate <= today);
    const saved       = instances[today] || [];
    const completedMap = {};
    saved.forEach(i => {
      if (i.status === "completed" && i.completedAt) {
        const d = new Date(i.completedAt);
        const localDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        if (localDate === today) completedMap[i.taskId] = i;
      }
    });
    const allInsts = [
      ...dailyTasks.map(t => completedMap[t.id] || { id:`${today}_${t.id}`, taskId:t.id, date:today, status:"pending", completedAt:null }),
      ...extraTasks.map(t => completedMap[t.id] || { id:`${today}_${t.id}`, taskId:t.id, date:today, status:"pending", completedAt:null }),
    ].filter(i => !((state.skippedDays || {})[today] || []).includes(i.taskId));
    // Deduplicate by taskId to prevent React key collisions (e.g. task in both dailyTasks + extraTasks)
    const seen = new Set();
    return allInsts.filter(i => { if (seen.has(i.taskId)) return false; seen.add(i.taskId); return true; });
  })();

  const browseInst = isToday ? todayInstList : (instances[browseDate] || []);

  const lastSaveKey = useRef("");
  useEffect(() => {
    const completed = todayInstList.filter(i => i.status === "completed");
    if (completed.length === 0) return;
    const key = completed.map(i => i.taskId).sort().join("|");
    if (key === lastSaveKey.current) return;
    lastSaveKey.current = key;
    dispatch({ type:"SET_INST", date:today, list: todayInstList });
  }, [todayInstList.filter(i=>i.status==="completed").map(i=>i.taskId).sort().join("|")]);

  const isPending  = inst => inst.status === "pending";

  const doComplete = (inst, confettiEvent) => {
    const taskForCheck = tasks.find(t => t.id === inst.taskId) || (state.tomorrowTasks||[]).find(t => t.id === inst.taskId) || (inst.taskId === JOURNAL_TASK_ID ? JOURNAL_TASK : null);
    if (inst.taskId === JOURNAL_TASK_ID) { onOpenJournal && onOpenJournal(inst, browseDate, todayInstList); return; }
    if (!isPending(inst) || completingIds[inst.id]) return;
    const task = taskForCheck;
    if (task?.journal && isToday) { onOpenJournal && onOpenJournal(inst, browseDate, todayInstList); return; }
    if (confettiEvent) {
      const rect = confettiEvent.currentTarget?.getBoundingClientRect?.();
      if (rect) setConfettiPos({ x: rect.left+22, y: rect.top+22 });
    }
    setCompletingIds(m => merge(m, { [inst.id]: true }));
    setTimeout(() => {
      dispatch({ type:"COMPLETE", date:browseDate, id:inst.id, list:todayInstList });
      setCompletingIds(m => { const n={...m}; delete n[inst.id]; return n; });
      showToast('✓ ' + (task?.name||''));
      // Completion chime
      playChime();
      // Haptic feedback
      if (cfg.haptics && navigator.vibrate) navigator.vibrate([30, 10, 60]);
      // Streak milestone toast + big confetti
      const newStreak = state.streak.cur + 1;
      if ([7, 14, 21, 30, 60, 100].includes(newStreak)) {
        setTimeout(() => showToast('🔥 ' + newStreak + '-day streak! Keep going.'), 800);
        // Big confetti burst for milestone streaks
        setTimeout(() => {
          const colors = ['#ff5f57','#00e5a0','#ff8a82','#c77dff','#4cc9f0','#ffd166','#fff'];
          for (let i = 0; i < 55; i++) {
            const el = document.createElement('div');
            el.className = 'confetti-rain-piece';
            el.style.cssText = `left:${Math.random()*100}%;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};background:${colors[i%colors.length]};animation-duration:${1.4+Math.random()*1.4}s;animation-delay:${Math.random()*0.6}s;`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
          }
        }, 400);
      }
      // Variable reward: show motivational card after 3+ completions
      const newCount = completedCountRef.current + 1;
      completedCountRef.current = newCount;
      if (newCount >= 3 && newCount % 3 === 0) {
        setTimeout(() => setShowMotivCard(true), 400);
      }
      // Perfect day check
      const updatedList = todayInstList.map(i => i.id === inst.id ? { ...i, status: 'completed' } : i);
      const allNowDone = updatedList.every(i => i.status === 'completed');
      if (allNowDone && updatedList.length > 0) {
        setTimeout(() => setShowPerfectDay(true), 600);
      }
    }, 480);
  };


  const shiftDay = (delta) => {
    const d = new Date(browseDate + "T12:00:00");
    d.setDate(d.getDate() + delta);
    const newDate = todayStr(d);
    if (newDate <= today) setBrowseDate(newDate);
  };

  const pending   = browseInst.filter(i => i.status === "pending" && i.taskId !== JOURNAL_TASK_ID);
  const completed = browseInst.filter(i => i.status === "completed" && i.taskId !== JOURNAL_TASK_ID);
  const notDone   = browseInst.filter(i => i.status !== "completed" && i.taskId !== JOURNAL_TASK_ID);
  const total     = browseInst.filter(i => i.taskId !== JOURNAL_TASK_ID).length;
  const pct       = total > 0 ? Math.round(completed.length/total*100) : 0;
  const RING_R    = 52;
  const RING_CIRC = 2 * Math.PI * RING_R;

  // End-of-day / streak-at-risk logic
  const hour = new Date().getHours();
  const isLate = hour >= 20 && isToday;
  const hasPending = pending.length > 0 && isToday;
  const streakAtRisk = isLate && hasPending && streak.cur > 0;
  const eodPrompt = isLate && hasPending;

  // Overloaded day — cap of 5 tasks including journal
  const TASK_CAP = 5;
  const isOverloaded = isToday && total > TASK_CAP;

  const handleMoveToTomorrow = (inst) => {
    const isTomorrowTask = (state.tomorrowTasks||[]).some(t => t.id === inst.taskId);
    const task = enrichedTasks[inst.taskId]
      || (state.tomorrowTasks||[]).find(t => t.id === inst.taskId)
      || (inst.taskId === JOURNAL_TASK_ID ? JOURNAL_TASK : null);
    if (!task) return;
    const tomorrowDate = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return todayStr(d); })();
    if (isTomorrowTask) {
      // Re-schedule the tomorrowTask to tomorrow instead of today
      dispatch({ type:"DEL_TOMORROW_TASK", id: inst.taskId });
      dispatch({ type:"ADD_TOMORROW_TASK", task: {
        id: `tt_${Date.now()}_${inst.taskId}`,
        name: task.name,
        category: task.category || "morning",
        forDate: tomorrowDate,
        points: task.points || 10,
        active: true,
        journal: false,
        createdAt: new Date().toISOString(),
      }});
    } else {
      // Recurring task — skip today durably, add a tomorrowTask copy
      dispatch({ type:"SKIP_TODAY", date: today, taskId: inst.taskId });
      dispatch({ type:"ADD_TOMORROW_TASK", task: {
        id: `tt_${Date.now()}_${inst.taskId}`,
        name: task.name,
        category: task.category || "morning",
        forDate: tomorrowDate,
        points: task.points || 10,
        active: true,
        journal: false,
        createdAt: new Date().toISOString(),
      }});
    }
    showToast(`→ "${task.name}" moved to tomorrow`);
  };

  const handleQuickAddInline = (name) => {
    const n = name.trim();
    if (!n) return;
    const dow = new Date().getDay();
    dispatch({ type:"ADD_TASK", task: {
      id: `t_${Date.now()}`,
      name: n,
      category: "morning",
      days: [dow],
      points: 10,
      active: true,
      journal: false,
      repeat: false,
      createdAt: new Date().toISOString(),
    }});
    showToast(`"${n}" added for today`);
  };
















  const enrichedTasks = (() => {
    const m = {};
    orderedTasks.forEach(t => { m[t.id] = { ...t, _streak: calcTaskStreak(t.id, instances) }; });
    m[JOURNAL_TASK_ID] = { ...JOURNAL_TASK, _streak: calcTaskStreak(JOURNAL_TASK_ID, instances) };
    return m;
  })();

  const renderCard = (inst, allowMoveMode) => {
    const task = enrichedTasks[inst.taskId] || (state.tomorrowTasks||[]).find(t=>t.id===inst.taskId);
    if (!task) return null;
    const isMoveTarget = allowMoveMode && moveMode && inst.status !== "completed";
    const card = (
      <SwipeableTaskCard key={inst.id}
        inst={inst} task={task} cfg={cfg}
        completingIds={isMoveTarget ? {} : completingIds}
        isPending={isMoveTarget ? false : isPending(inst)}
        isDone={inst.status === "completed"}
        isJournal={inst.taskId === JOURNAL_TASK_ID}
        isPinned={(state.taskOrder||[])[0] === inst.taskId}
        onTap={isMoveTarget ? undefined : (inst, e) => doComplete(inst, e)}
        onSwipeComplete={isMoveTarget ? undefined : () => doComplete(inst, null)}
        onDelete={inst.status === "completed" ? (inst, task) => { const isTT = (state.tomorrowTasks||[]).some(t => t.id === task.id); dispatch({ type: isTT ? "DEL_TOMORROW_TASK" : "DEL_TASK", id:task.id }); showToast("Task deleted"); } : undefined}
        onUndo={inst.status === "completed" ? (inst) => { dispatch({ type:"UNDO_COMPLETE", date:browseDate, id:inst.id }); showToast("Task moved back to pending"); } : undefined}
        onEdit={inst.status !== "completed" ? (task) => onEditTask && onEditTask(task) : undefined}
      />
    );
    if (isMoveTarget) {
      return (
        <div key={inst.id} className="move-mode-wrap" onClick={() => handleMoveToTomorrow(inst)}>
          <div className="move-mode-badge">→ Tomorrow</div>
          {card}
        </div>
      );
    }
    // Wrap pending cards with long-press-to-move-mode
    if (inst.status !== "completed" && isToday) {
      return (
        <div key={inst.id} onTouchStart={startLongPress} onTouchEnd={cancelLongPress} onTouchMove={cancelLongPress}>
          {card}
        </div>
      );
    }
    return card;
  };

  const now       = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - (now.getDay()+6)%7);
  weekStart.setHours(0,0,0,0);
  const weekKey          = todayStr(weekStart);
  const pendingWeekly    = (state.weeklyTasks||[]).filter(t => !(t.completions||[]).some(c=>c.weekKey===weekKey));
  const completedWeekly  = (state.weeklyTasks||[]).filter(t => (t.completions||[]).some(c=>c.weekKey===weekKey));
  const dayInWeek        = Math.floor((now - weekStart)/86_400_000);
  const maxPtsWeekly     = Math.max(30, 100 - dayInWeek*10);

  const browseDayName = (() => {
    if (isToday) return DAYS_LONG[new Date().getDay()];
    const d = new Date(browseDate + "T12:00:00");
    return d.toLocaleDateString("en-US", { weekday:"long" });
  })();
  const browseDateSub = (() => {
    const d = new Date(browseDate + "T12:00:00");
    return d.toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
  })();



  const xp = (() => {
    const s = streak.cur || 0;
    const level = Math.floor(s / 7) + 1;
    const pct   = ((s % 7) / 7) * 100;
    const label = s >= 30 ? 'Elite' : s >= 14 ? 'Consistent' : s >= 7 ? 'Building' : 'Starting';
    return { level, pct, label };
  })();

  return (
    <div>
      {showPerfectDay && (
        <PerfectDayOverlay
          streak={streak.cur}
          taskCount={completed.length + 1}
          onDone={() => setShowPerfectDay(false)}
        />
      )}
      {confettiPos && <ConfettiBurst x={confettiPos.x} y={confettiPos.y} onDone={() => setConfettiPos(null)} />}

      {/* Greeting */}
      {isToday && (
        <div style={{ marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ fontSize:17, fontWeight:700, color:"var(--text3)", fontFamily:"var(--mono)", letterSpacing:0.5 }}>
                {getGreeting()}{state.userName ? `, ${state.userName.trim().split(" ")[0]}` : ""}
              </div>
            </div>
            {streak.cur >= 3 && (
              <div style={{ display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:99, background:"var(--coralg)", border:"1px solid var(--coral)", fontFamily:"var(--mono)", fontSize:12, fontWeight:900, color:"var(--coral)", flexShrink:0 }}>
                🔥 {streak.cur}
              </div>
            )}
          </div>
        </div>
      )}

      {/* End-of-day banners */}
      {streakAtRisk && (
        <div style={{ padding:"14px 16px", borderRadius:12, background:"rgba(255,150,0,0.08)", border:"1px solid rgba(255,150,0,0.3)", marginBottom:14, animation:"bannerPulse 2s ease-in-out infinite" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ fontSize:28, lineHeight:1, filter:"drop-shadow(0 0 8px rgba(255,150,0,0.8))" }}>🔥</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:17, fontWeight:800, color:"#ff9500" }}>{streak.cur}-day streak at risk</div>

            return baseFilter(a);

          .map(a => ({ ...a, _score: calcPriorityScoreWithPrefs(a, prefs) }))

          .filter(baseFilter)

              const msLeft = new Date(task.dueDate.split("T")[0]+"T23:59:59") - now;

            let pts=50;
            if(task.completedBy!==""&&task.completedBy!==undefined){
              const ratio=Math.max(0,Math.min(1,1-(mon(now.getDay())+7)%7/7));
              pts=Math.round(30+ratio*70);
            }
            const dueDateStr = task.dueDate ? task.dueDate.split("T")[0] : "";
            const dueDateDisplay = task.dueDate ? new Date(task.dueDate + "T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}) : null;
            return (
              <div key={task.id} style={{ borderLeft:"5px solid var(--blue)", background:"rgba(76,201,240,0.04)", padding:"18px 16px 18px 20px", display:"flex", alignItems:"center", gap:16, marginBottom:0 }}>
                <div onClick={() => dispatch({ type:"COMPLETE_WEEKLY_TASK", id:task.id })}
                  style={{ width:52, height:52, borderRadius:"50%", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontFamily:"var(--mono)", border:"2.5px solid var(--blue)", background:"rgba(76,201,240,0.08)", color:"var(--blue)", cursor:"pointer" }}>{task.emoji||"◇"}</div>
                <div style={{ flex:1, minWidth:0 }} onClick={() => dispatch({ type:"COMPLETE_WEEKLY_TASK", id:task.id })} >
                  <div style={{ fontSize:21, fontWeight:800, cursor:"pointer" }}>{task.name}</div>
                  {task.description && <div style={{ fontSize:17, color:"var(--text2)", marginTop:3 }}>{task.description}</div>}
                  {dueDateDisplay && <div style={{ fontSize:17, fontWeight:700, color:urgencyColor, marginTop:4 }}>Due {dueDateDisplay}{daysLeft!==null ? " · " + (daysLeft===0?"today":daysLeft===1?"1 day left":`${daysLeft} days left`) : ""}</div>}
                  {!dueDateDisplay && daysLeft!==null && <div style={{ fontSize:17, fontWeight:700, color:urgencyColor, marginTop:4 }}>Complete by {DAY_SHORT[parseInt(task.completedBy)]} · {daysLeft===7?"today":daysLeft===1?"1 day left":`${daysLeft} days left`}</div>}
                </div>
                <div style={{ flexShrink:0, display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                  <div style={{ fontSize:20, fontWeight:800, color:"var(--blue)" }}>+{pts}pt</div>
                  <label style={{ display:"flex", alignItems:"center", justifyContent:"center", width:32, height:32, borderRadius:8, background:"rgba(76,201,240,0.12)", border:"1px solid rgba(76,201,240,0.3)", cursor:"pointer", fontSize:16 }}
                    title="Set deadline">
                    📅
                    <input type="date" value={dueDateStr}
                      onChange={e => dispatch({ type:"UPD_WEEKLY_TASK", id:task.id, patch:{ dueDate: e.target.value ? e.target.value + "T00:00:00" : null } })}
                      style={{ position:"absolute", opacity:0, width:0, height:0, pointerEvents:"none" }} />
                  </label>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {(completed.length > 0 || (isToday && completedWeekly.length > 0)) && (
        <div style={{ marginTop:20 }}>
          <div className="sec-head">
            <div className="sec-head-label" style={{ color:"var(--green)" }}>
              {pct === 100 ? "✓ All done" : "Completed"}
            </div>
            <div className="sec-head-line" style={{ background:"var(--done-line)" }} />
            <div className="sec-head-count" style={{ color:"var(--green)" }}>{completed.length + (isToday?completedWeekly.length:0)}</div>
          </div>
          {completed.map(renderCard)}
          {isToday && completedWeekly.map(task => {
            const compl = (task.completions||[]).find(c=>c.weekKey===weekKey);
            return (
              <div key={task.id} style={{ borderLeft:"5px solid var(--green)", padding:"18px 16px 18px 20px", display:"flex", alignItems:"center", gap:16, background:"var(--done-bg)" }}>
                <div style={{ width:52, height:52, borderRadius:"50%", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, border:"2.5px solid var(--green)", background:"rgba(0,229,160,0.08)", color:"var(--green)" }}>✓</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:21, fontWeight:800, color:"var(--text2)", textDecoration:"line-through" }}>{task.name}</div>
                  {task.description && <div style={{ fontSize:17, color:"var(--text2)", marginTop:3 }}>{task.description}</div>}
                </div>
                <div style={{ flexShrink:0, textAlign:"right" }}>
                  <div style={{ fontSize:20, fontWeight:800, color:"var(--green)" }}>+{compl?.pointsEarned||0}pt</div>
                  <div style={{ fontSize:17, fontWeight:700, color:"var(--green)" }}>weekly task</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {isToday && notDone.length === 0 && !moveMode && <InlineQuickAdd onAdd={handleQuickAddInline} recentTasks={tasks} todayNames={browseInst.map(i=>(enrichedTasks[i.taskId]||(state.tomorrowTasks||[]).find(t=>t.id===i.taskId)||{}).name).filter(Boolean)} />}
    </div>
  );
}

// ── TasksView ────────────────────────────────────────────
function TasksView({ state, dispatch, showToast }) {
  const [editingTask, setEditingTask]       = useState(null);
  const [editingMode, setEditingMode]       = useState("daily");
  const [showWeeklyForm, setShowWeeklyForm] = useState(false);
  const [weeklyForm, setWeeklyForm]         = useState({ name:"", description:"", completedBy:"" });
  const [dragIdx, setDragIdx]               = useState(null);
  const [dragOverIdx, setDragOverIdx]       = useState(null);
  const { tasks } = state;

  const order = state.taskOrder || [];
  const byId  = Object.fromEntries(tasks.map(t => [t.id, t]));
  const todayDateStr = todayStr();
  const isVisible = (t) => {
    if (t.active === false) return false;
    if (t.repeat === false && t.createdAt) {
      return t.createdAt.slice(0,10) === todayDateStr;
    }
    return true;
  };
  const orderedTasks = [...order.filter(id=>byId[id]&&isVisible(byId[id])).map(id=>byId[id]), ...tasks.filter(t=>!order.includes(t.id)&&isVisible(t))];

  const handleDragStart = (e, idx) => { setDragIdx(idx); e.dataTransfer.effectAllowed = "move"; };
  const handleDragOver  = (e, idx) => { e.preventDefault(); setDragOverIdx(idx); };
  const handleDrop = (e, idx) => {
    e.preventDefault();
    if (dragIdx === null || dragIdx === idx) { setDragIdx(null); setDragOverIdx(null); return; }
    const newOrder = [...orderedTasks.map(t=>t.id)];
    const [moved]  = newOrder.splice(dragIdx, 1);
    newOrder.splice(idx, 0, moved);
    dispatch({ type:"REORDER_TASKS", order: newOrder });
    setDragIdx(null); setDragOverIdx(null);
  };
  const handleDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };

  const handleSaveWeekly = () => {
    if (!weeklyForm.name.trim()) return;
    dispatch({ type:"ADD_WEEKLY_TASK", task: merge(weeklyForm,{id:`w_${Date.now()}`,emoji:"◇",createdAt:new Date().toISOString(),completions:[]}) });
    showToast("Task added");
    setShowWeeklyForm(false);
    setWeeklyForm({ name:"", description:"", completedBy:"" });
  };

  const handleSaveTask = (taskData) => {
    const pts = inferPoints(taskData);
    if (editingTask === "new") {
      dispatch({ type:"ADD_TASK", task: merge(taskData,{id:`t_${Date.now()}`, points:pts, createdAt: new Date().toISOString()}) });
      showToast("Task added");
    } else {
      const isTT = (state.tomorrowTasks||[]).some(t => t.id === editingTask.id);
      if (isTT) {
        const updated = merge(editingTask, taskData, { points: pts });
        dispatch({ type:"DEL_TOMORROW_TASK", id: editingTask.id });
        dispatch({ type:"ADD_TOMORROW_TASK", task: updated });
      } else {
        dispatch({ type:"UPD_TASK", task: merge(taskData,{id:editingTask.id, points:pts}) });
      }
      showToast("Updated");
    }
    setEditingTask(null);
  };

  const openNew = (mode) => { setEditingMode(mode); setEditingTask("new"); };
  const [expandedTaskId, setExpandedTaskId] = React.useState(null);

  const weeklyTasks = state.weeklyTasks || [];

  return (
    <div>
      {orderedTasks.length === 0 && weeklyTasks.length === 0 && (
        <div className="empty">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ marginBottom:18, opacity:0.6 }}>
            <circle cx="60" cy="60" r="48" stroke="var(--border)" strokeWidth="2" strokeDasharray="6 4"/>
            <rect x="36" y="42" width="48" height="6" rx="3" fill="var(--border)"/>
            <rect x="36" y="54" width="36" height="6" rx="3" fill="var(--border)"/>
            <rect x="36" y="66" width="42" height="6" rx="3" fill="var(--border)"/>
            <circle cx="28" cy="45" r="4" fill="var(--coral)" opacity="0.5"/>
            <circle cx="28" cy="57" r="4" fill="var(--border)"/>
            <circle cx="28" cy="69" r="4" fill="var(--border)"/>
            <path d="M52 88 Q60 78 68 88" stroke="var(--coral)" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.6"/>
          </svg>
          <div className="empty-msg">No tasks yet</div>
          <div className="empty-sub">Tap + Daily Task below to get started.</div>
          <div className="empty-tagline">One habit. That's all it takes to start.</div>
        </div>
      )}

      {/* Flat task list — no time-of-day grouping */}
      {orderedTasks.length > 0 && (
        <div style={{ marginBottom:24 }}>
          <div className="sec-head" style={{ marginBottom:10 }}>
            <div className="sec-head-label">Daily Tasks</div>
            <div className="sec-head-line" />
            <div className="sec-head-count">{orderedTasks.length}</div>
          </div>
          {orderedTasks.map((task) => {
            const globalIdx = orderedTasks.indexOf(task);
            const isExpanded = expandedTaskId === task.id;
            return (
              <div key={task.id}
                className={`task-row ${dragOverIdx===globalIdx?"drag-over":""} ${dragIdx===globalIdx?"dragging":""}`}
                style={{ flexDirection:"column", alignItems:"stretch", padding:"14px 16px 14px 20px", gap:0 }}
                draggable
                onDragStart={e => handleDragStart(e, globalIdx)}
                onDragOver={e => handleDragOver(e, globalIdx)}
                onDrop={e => handleDrop(e, globalIdx)}
                onDragEnd={handleDragEnd}>
                {/* Collapsed row — always visible */}
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div className="drag-handle" title="Drag to reorder" style={{ flexShrink:0 }}>⠿</div>
                  <div style={{ flex:1, minWidth:0, display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ fontSize:19, fontWeight:800, opacity:task.active?1:0.45 }}>{task.name}</div>
                    {!task.active && <span className="paused-badge">PAUSED</span>}
                  </div>
                  <button
                    onClick={() => setExpandedTaskId(isExpanded ? null : task.id)}
                    style={{ background:"none", border:"none", cursor:"pointer", color:"var(--text3)", padding:"4px 6px",
                      fontSize:18, lineHeight:1, flexShrink:0, WebkitTapHighlightColor:"transparent",
                      transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)", transition:"transform 0.2s" }}>
                    ▾
                  </button>
                </div>
                {/* Expanded details */}
                {isExpanded && (
                  <div style={{ marginTop:12, paddingLeft:28, display:"flex", flexDirection:"column", gap:10 }}>
                    <div style={{ fontSize:14, color:"var(--text2)", fontFamily:"var(--mono)" }}>
                      {task.repeat === false
                        ? <span style={{ color:"var(--blue)" }}>one-time task</span>
                        : DAYS_SHORT.filter((_,i)=>task.days.includes(i)).join(" · ")
                      }
                      <span style={{ marginLeft:10, color:"var(--text3)" }}>+{task.points}pt</span>
                      {task.notes && <span style={{ marginLeft:10, color:"var(--text3)" }}>· {task.notes}</span>}
                    </div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      <button className="icon-btn" onClick={() => { setEditingMode("daily"); setEditingTask(task); }}>Edit</button>
                      <button className="icon-btn" style={{ color:task.active?"var(--text3)":"var(--coral)" }}
                        onClick={() => dispatch({ type:"UPD_TASK", task:merge(task,{active:!task.active}) })}>
                        {task.active?"Pause":"Resume"}
                      </button>
                      <button className="icon-btn" style={{ color:"var(--red)" }}
                        onClick={() => { dispatch({type:"DEL_TASK",id:task.id}); showToast("Deleted"); }}>Del</button>
                      <button className="icon-btn" style={{ color:"var(--text3)" }}
                        onClick={() => { dispatch({type:"PIN_TASK",id:task.id}); showToast("📌 Pinned to top"); setExpandedTaskId(null); }}>Pin ↑</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Weekly / Complete By tasks */}
      {weeklyTasks.length > 0 && (
        <div style={{ marginBottom:24 }}>
          <div className="sec-head">
            <div className="sec-head-label" style={{ color:"var(--blue)" }}>Complete By</div>
            <div className="sec-head-line" />
            <div className="sec-head-count">{weeklyTasks.length}</div>
          </div>
          {weeklyTasks.map(task => (
            <div key={task.id} className="task-row" style={{ borderLeftColor:"var(--blue)" }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:19, fontWeight:800 }}>{task.name}</div>
                {task.description && <div style={{ fontSize:15, color:"var(--text2)", marginTop:2 }}>{task.description}</div>}
              </div>
              <button className="icon-btn" style={{ color:"var(--red)" }}
                onClick={() => { dispatch({type:"DEL_WEEKLY_TASK",id:task.id}); showToast("Deleted"); }}>Del</button>
            </div>
          ))}
        </div>
      )}

      {/* Add buttons */}
      <div style={{ display:"flex", gap:10, marginTop:16, marginBottom:8 }}>
        <button onClick={() => setShowWeeklyForm(true)}
          style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            padding:"15px 0", borderRadius:14, border:"1.5px solid var(--blue)",
            background:"rgba(76,201,240,0.07)", cursor:"pointer",
            fontFamily:"var(--mono)", fontSize:13, fontWeight:800,
            color:"var(--blue)", WebkitTapHighlightColor:"transparent" }}>
          <span style={{ fontSize:20 }}>+</span> Complete by
        </button>
        <button onClick={() => openNew("daily")}
          style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            padding:"15px 0", borderRadius:14, border:"1.5px solid var(--coral)",
            background:"var(--coralg)", cursor:"pointer",
            fontFamily:"var(--mono)", fontSize:13, fontWeight:800,
            color:"var(--coral)", WebkitTapHighlightColor:"transparent" }}>
          <span style={{ fontSize:20 }}>+</span> Daily Task
        </button>
      </div>

      {/* Task form sheet */}
      {editingTask && (
        <BottomSheet
          title={editingTask === "new" ? (editingMode === "daily" ? "New Daily Task" : "New Task") : "Edit Task"}
          onClose={() => setEditingTask(null)}>
          <TaskForm
            key={editingTask === "new" ? "new" : editingTask.id}
            init={editingTask === "new" ? null : editingTask}
            mode={editingMode}
            onSave={handleSaveTask}
            onCancel={() => setEditingTask(null)} />
        </BottomSheet>
      )}

      {/* Complete By form */}
      {showWeeklyForm && (
        <div className="backdrop" style={{ alignItems:"center" }}
          onClick={e => e.target===e.currentTarget && setShowWeeklyForm(false)}>
          <div className="sheet sheet-centered" style={{ borderRadius:20, maxHeight:"85dvh", maxWidth:500 }}
            onClick={e => e.stopPropagation()}>
            <div className="sheet-handle" />
            <div className="sheet-title">Complete By</div>
            <input className="field" value={weeklyForm.name} autoFocus
              onChange={e => setWeeklyForm(f=>merge(f,{name:e.target.value}))}
              placeholder="e.g. Read 3 chapters" />
            <input className="field" value={weeklyForm.description}
              onChange={e => setWeeklyForm(f=>merge(f,{description:e.target.value}))}
              placeholder="Details (optional)" />
            <label className="field-label">Deadline day (optional)</label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18 }}>
              {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map((dl,i) => {
                const dn = [1,2,3,4,5,6,0][i];
                const sel = weeklyForm.completedBy === String(dn);
                return (
                  <button key={dl}
                    onClick={() => setWeeklyForm(f=>merge(f,{completedBy:sel?"":String(dn)}))}
                    style={{ padding:"8px 14px", borderRadius:10,
                      border:`1.5px solid ${sel?"var(--blue)":"var(--border)"}`,
                      background:sel?"var(--blue)":"var(--bg2)",
                      color:sel?"var(--btn-text)":"var(--text2)",
                      fontFamily:"var(--mono)", fontSize:15, fontWeight:800, cursor:"pointer" }}>
                    {dl}
                  </button>
                );
              })}
            </div>
            <button className="btn btn-full btn-primary" style={{ marginBottom:10 }}
              onClick={handleSaveWeekly}>Add</button>
            <button className="btn btn-full btn-secondary"
              onClick={() => setShowWeeklyForm(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SettingsView ─────────────────────────────────────────
function SettingsView({ state, dispatch, showToast, onSimulate }) {
  const { cfg } = state;
  const setCfg  = (key, val) => dispatch({ type:"UPD_CFG", cfg:{ [key]:val } });

  const fileInputRef = useRef(null);
  const [importPreview, setImportPreview] = useState(null);
  const [importSummary, setImportSummary] = useState(null);
  const [importError, setImportError]     = useState("");
  const [newPunishment, setNewPunishment] = useState("");
  const [newDailyTask, setNewDailyTask]   = useState("");

  const punishments = cfg.punishments || [];
  const dailyTasks  = cfg.dailyTasks  || [];

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(buildExportData(state),null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `sched-backup-${new Date().toISOString().split("T")[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast("Backup downloaded");
  };

  const handleFileSelect = (e) => {
    setImportError(""); setImportPreview(null); setImportSummary(null);
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data._meta?.app !== "Sched") { setImportError("Not a Sched backup."); return; }
        setImportPreview(data); setImportSummary(data._summary ?? null);
      } catch { setImportError("Could not read file."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div>
      <div className="card">
        <div className="section-title">Appearance</div>
        <div className="setting-row">
          <div>
            <div className="setting-label">Theme</div>
            <div className="setting-sub">Dark or Claude</div>
          </div>
          <div style={{ display:"flex",gap:8 }}>
            {[["dark","Dark"],["claude2","Claude"]].map(([val,label]) => (
              <button key={val} onClick={() => setCfg("theme",val)}
                style={{ padding:"10px 18px",borderRadius:10,border:`1.5px solid ${cfg.theme===val?"var(--coral)":"var(--border)"}`,background:cfg.theme===val?"var(--coral)":"var(--bg2)",color:cfg.theme===val?"var(--btn-text)":"var(--text2)",fontFamily:"var(--font)",fontSize:18,fontWeight:800,cursor:"pointer" }}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div className="setting-row" style={{ borderBottom:"none" }}>
          <div>
            <div className="setting-label">Haptic Feedback</div>
            <div className="setting-sub">Vibrate on task completion</div>
          </div>
          <div onClick={() => setCfg("haptics", !cfg.haptics)} style={{ width:44,height:26,borderRadius:99,padding:3,background:cfg.haptics?"var(--coral)":"var(--bg3)",display:"flex",alignItems:"center",justifyContent:cfg.haptics?"flex-end":"flex-start",transition:"all 0.2s",cursor:"pointer",flexShrink:0 }}>
            <div style={{ width:20,height:20,borderRadius:"50%",background:"#fff" }} />
          </div>
        </div>
      </div>

      <div className="card">
        <div className="section-title">Daily Task Wheel</div>
        <div style={{ fontSize:18,color:"var(--text2)",marginBottom:16,lineHeight:1.6 }}>Spins on first app open each day. Add up to 10.</div>
        {dailyTasks.map((task,i) => (
          <div key={i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px" }}>
            <div style={{ fontSize:19,fontWeight:700 }}>{task}</div>
            <button onClick={() => setCfg("dailyTasks",dailyTasks.filter((_,j)=>j!==i))} style={{ background:"none",border:"none",color:"var(--red)",fontSize:22,cursor:"pointer",fontWeight:700,padding:"4px 8px" }}>×</button>
          </div>
        ))}
        {dailyTasks.length < 10 && (
          <div style={{ display:"flex",gap:8,marginTop:8 }}>
            <input className="field" style={{ flex:1,marginBottom:0 }} value={newDailyTask}
              onChange={e=>setNewDailyTask(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&newDailyTask.trim()){setCfg("dailyTasks",[...dailyTasks,newDailyTask.trim()]);setNewDailyTask("");}}}
              placeholder="e.g. Meditate 10 minutes" />
            <button className="btn btn-primary" style={{ flexShrink:0,padding:"0 20px" }}
              onClick={() => { if(newDailyTask.trim()){setCfg("dailyTasks",[...dailyTasks,newDailyTask.trim()]);setNewDailyTask("");} }}>Add</button>
          </div>
        )}
        {dailyTasks.length < 10 && (() => {
          const suggestions = ["Meditate 10 min","Cold shower","Read 20 pages","Journal entry","10 min walk","Stretch routine","No phone first hour","Drink 2L water","Gratitude list","Review your goals","5 min breathing","Clean your space","Plan tomorrow","No social media","20 min workout","Healthy breakfast","Vitamin & supplements","Call a friend or family","Learn something new","Evening reflection"];
          const available = suggestions.filter(s => !dailyTasks.includes(s));
          if (available.length === 0) return null;
          return (
            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:13,fontWeight:700,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:"0.5px",marginBottom:6 }}>SUGGESTIONS</div>
              <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                {available.slice(0,12).map(s => (
                  <button key={s} onClick={() => { if(dailyTasks.length<10) setCfg("dailyTasks",[...dailyTasks,s]); }}
                    style={{ fontSize:13,fontWeight:700,padding:"5px 12px",borderRadius:20,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text2)",cursor:"pointer",fontFamily:"var(--font)",WebkitTapHighlightColor:"transparent" }}>
                    + {s}
                  </button>
                ))}
              </div>
            </div>
          );
        })()}
      </div>

      <div className="card">
        <div className="section-title">Punishment Wheel</div>
        <div style={{ fontSize:18,color:"var(--text2)",marginBottom:16,lineHeight:1.6 }}>If you miss tasks, a wheel spins on next open. Add up to 10.</div>
        {punishments.map((p,i) => (
          <div key={i} style={{ display:"flex",alignItems:"center",gap:12,padding:"12px 0" }}>
            <div style={{ flex:1,fontSize:20,fontWeight:600 }}>{p}</div>
            <button onClick={() => setCfg("punishments",punishments.filter((_,j)=>j!==i))} style={{ background:"none",border:"none",color:"var(--red)",fontSize:22,cursor:"pointer",fontWeight:700,padding:"4px 8px" }}>×</button>
          </div>
        ))}
        {punishments.length < 10 && (
          <div style={{ display:"flex",gap:10,marginTop:16 }}>
            <input className="field" style={{ marginBottom:0,flex:1 }} value={newPunishment}
              onChange={e=>setNewPunishment(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&newPunishment.trim()){setCfg("punishments",[...punishments,newPunishment.trim()]);setNewPunishment("");}}}
              placeholder="e.g. 50 push-ups" />
            <button className="btn btn-primary btn-sm"
              onClick={() => { if(newPunishment.trim()){setCfg("punishments",[...punishments,newPunishment.trim()]);setNewPunishment("");} }}>Add</button>
          </div>
        )}
        {punishments.length < 10 && (() => {
          const suggestions = ["50 push-ups","1 mile run","Cold shower","No phone 2 hours","100 jumping jacks","Plank for 2 minutes","Write 200 words","No dessert today","Wake up 1hr earlier","50 squats","Donate $5","Delete a social app","30 min no screens","Extra chore","Skip a meal out","20 min jog","No music today","Write apology letter to self","Burpees × 30","Go to bed 1hr early"];
          const available = suggestions.filter(s => !punishments.includes(s));
          if (available.length === 0) return null;
          return (
            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:13,fontWeight:700,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:"0.5px",marginBottom:6 }}>SUGGESTIONS</div>
              <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                {available.slice(0,12).map(s => (
                  <button key={s} onClick={() => { if(punishments.length<10) setCfg("punishments",[...punishments,s]); }}
                    style={{ fontSize:13,fontWeight:700,padding:"5px 12px",borderRadius:20,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text2)",cursor:"pointer",fontFamily:"var(--font)",WebkitTapHighlightColor:"transparent" }}>
                    + {s}
                  </button>
                ))}
              </div>
            </div>
          );
        })()}
      </div>

      <div className="card">
        <div className="section-title">Reminders</div>
        {(() => {
          const notifSupported = typeof Notification !== "undefined";
          const granted = notifSupported && Notification.permission === "granted";
          const enabled = cfg.notifEnabled && granted;
          return (
            <div>
              <div style={{ fontSize:15, color:"var(--text2)", marginBottom:16, lineHeight:1.6 }}>
                Get a nudge if you still have tasks left at a chosen time each day.
              </div>
              {!notifSupported && (
                <div style={{ fontSize:14, color:"var(--text3)", fontFamily:"var(--mono)" }}>Notifications not supported in this browser.</div>
              )}
              {notifSupported && (
                <>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                    <div style={{ fontWeight:700, fontSize:16 }}>{granted ? "Reminders enabled" : "Allow reminders"}</div>
                    <button
                      onClick={async () => {
                        if (!granted) {
                          const perm = await Notification.requestPermission();
                          if (perm === "granted") {
                            setCfg("notifEnabled", true);
                            showToast("Reminders on ✓");
                          } else {
                            showToast("Permission denied — enable in browser settings");
                          }
                        } else {
                          setCfg("notifEnabled", !cfg.notifEnabled);
                          showToast(cfg.notifEnabled ? "Reminders off" : "Reminders on ✓");
                        }
                      }}
                      style={{
                        width:52, height:28, borderRadius:99, border:"none", cursor:"pointer",
                        background: enabled ? "var(--coral)" : "var(--bg3)",
                        position:"relative", transition:"background 0.2s",
                      }}>
                      <div style={{
                        position:"absolute", top:3, left: enabled ? 26 : 3,
                        width:22, height:22, borderRadius:"50%", background:"#fff",
                        transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)",
                      }} />
                    </button>
                  </div>
                  {granted && cfg.notifEnabled && (
                    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                      <div style={{ fontSize:14, color:"var(--text3)", fontFamily:"var(--mono)" }}>Remind me at</div>
                      <input
                        type="time"
                        value={cfg.notifTime || "21:00"}
                        onChange={e => setCfg("notifTime", e.target.value)}
                        style={{
                          background:"var(--bg2)", border:"1px solid var(--border)",
                          borderRadius:8, color:"var(--text)", fontFamily:"var(--mono)",
                          fontSize:16, fontWeight:700, padding:"6px 10px", outline:"none",
                        }}
                      />
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })()}
      </div>
      <div className="card mt8">
        <div className="section-title">Backup &amp; Restore</div>
        <div style={{ fontSize:19,color:"var(--text2)",lineHeight:1.7,marginBottom:18 }}>Export saves all tasks, history, streak, points, and settings.</div>
        <button className="btn btn-full btn-primary" style={{ marginBottom:10 }} onClick={handleExport}>Export Backup</button>
        <input ref={fileInputRef} type="file" accept=".json" style={{ display:"none" }} onChange={handleFileSelect} />
        <button className="btn btn-full btn-ghost" onClick={() => fileInputRef.current?.click()}>Import Backup</button>
        {importError && <div style={{ marginTop:14,fontSize:18,color:"var(--red)",fontWeight:700 }}>{importError}</div>}
        {importSummary && (
          <div style={{ marginTop:18,padding:"16px",background:"var(--bg2)",borderRadius:14,border:"1px solid var(--border)" }}>
            <div style={{ fontSize:20,fontWeight:800,marginBottom:12 }}>Backup Preview</div>
            {[["Tasks",importSummary.totalTasks],["Days tracked",importSummary.totalDaysTracked],["Completion",importSummary.completionRate+"%"],["Streak",importSummary.currentStreak],["Points",importSummary.totalPoints]].map(([k,v]) => (
              <div key={k} style={{ display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--border)" }}>
                <span style={{ color:"var(--text3)",fontSize:18 }}>{k}</span>
                <span style={{ fontWeight:800,fontSize:18 }}>{v}</span>
              </div>
            ))}
            <div style={{ display:"flex",gap:10,marginTop:16 }}>
              <button className="btn btn-primary" style={{ flex:1,padding:14,fontSize:18 }}
                onClick={() => { dispatch({type:"IMPORT",data:mergeImport(importPreview,state)}); showToast("Imported!"); setImportPreview(null); setImportSummary(null); }}>
                Merge Import
              </button>
              <button className="btn btn-secondary" style={{ padding:"14px 16px",fontSize:18 }}
                onClick={() => { setImportPreview(null); setImportSummary(null); }}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      {/* Canvas iCal Feed */}
      <div className="card">
        <div className="section-title">Canvas Feed</div>
        <div style={{ fontSize:18, color:"var(--text2)", lineHeight:1.6, marginBottom:16 }}>
          Paste your Canvas iCal URL to auto-sync assignments on every app open.
        </div>
        <label className="field-label">iCal Feed URL</label>
        <input className="field" value={cfg.icalFeedUrl || ""}
          onChange={e => setCfg("icalFeedUrl", e.target.value)}
          placeholder="https://yourschool.instructure.com/feeds/calendars/user_…"
          style={{ fontSize:14, fontFamily:"var(--mono)" }} />
        {cfg.icalLastSync && (
          <div style={{ fontSize:16, color:"var(--text3)", marginTop:-10, marginBottom:14, fontFamily:"var(--mono)" }}>
            Last synced: {new Date(cfg.icalLastSync).toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
          </div>
        )}
        {cfg.icalFeedUrl && (
          <div style={{ fontSize:15, color:"var(--green)", fontFamily:"var(--mono)", fontWeight:700 }}>
            ✓ Feed configured — syncs on app open
          </div>
        )}
      </div>

      <div className="card">
        <div className="section-title">Developer</div>
        <div style={{ fontSize:18, color:"var(--text2)", lineHeight:1.6, marginBottom:18 }}>
          Simulate a new day — resets all task completions, punishment wheel, and daily task spin back to pending.

        <button className="btn btn-full" style={{ background:"var(--red)", color:"#fff", fontSize:16, fontWeight:800, marginBottom:10 }}

☀️ Preview Morning Briefing

// ── CalendarView ─────────────────────────────────────────
function CalendarView({ state, dispatch, showToast }) {
  const today    = todayStr();
  const [curMonth, setCurMonth] = useState(new Date(today+"T12:00:00"));
  const [selDate, setSelDate]   = useState(today);
  const [newItem, setNewItem]   = useState({ title:"", time:"" });
  const [showAdd, setShowAdd]   = useState(false);
  const [newTask, setNewTask]   = useState({ name:"", category:"morning" });
  const [showAddTask, setShowAddTask] = useState(false);
  const [readingJournal, setReadingJournal] = useState(null);

  const year  = curMonth.getFullYear();
  const month = curMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const prevMonth = () => setCurMonth(d => new Date(d.getFullYear(), d.getMonth()-1, 1));
  const nextMonth = () => setCurMonth(d => new Date(d.getFullYear(), d.getMonth()+1, 1));

  const selItems = (state.calendarItems?.[selDate] || []);
  const selInst  = (state.instances?.[selDate] || []);

  const addItem = () => {
    if (!newItem.title.trim()) return;
    dispatch({ type:"ADD_CAL_ITEM", date:selDate, item:{ id:`ci_${Date.now()}`, ...newItem } });
    showToast("Added to calendar");
    setNewItem({ title:"", time:"" });
    setShowAdd(false);
  };

  const addTask = () => {
    if (!newTask.name.trim()) return;
    const dow = new Date(selDate + "T12:00:00").getDay();
    dispatch({ type:"ADD_TASK", task:{
      id: `t_${Date.now()}`, name: newTask.name, category: newTask.category,
      days: [dow], points: 10, active: true, emoji: "◎", journal: false,
      repeat: false, createdAt: new Date(selDate + "T00:00:00").toISOString(),
    }});
    showToast(`Task added`);
    setNewTask({ name:"", category:"morning" });
    setShowAddTask(false);
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
        <button className="day-browser-btn" onClick={prevMonth}>‹</button>
        <div style={{ fontFamily:"var(--heading)", fontSize:24, fontWeight:800 }}>
          {curMonth.toLocaleDateString("en-US",{month:"long",year:"numeric"})}
        </div>
        <button className="day-browser-btn" onClick={nextMonth}>›</button>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:18 }}>
        {DAYS_SHORT.map(d => (
          <div key={d} style={{ textAlign:"center", fontSize:12, fontWeight:800, color:"var(--text3)", paddingBottom:5, fontFamily:"var(--mono)", letterSpacing:0.5 }}>{d}</div>
        ))}
        {Array.from({length:firstDay},(_,i) => <div key={"e"+i} />)}
        {Array.from({length:daysInMonth},(_,i) => {
          const day = i+1;
          const ds  = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const isTod = ds === today, isSel = ds === selDate;
          const hasInst = (state.instances?.[ds]||[]).length > 0;
          const hasCal  = (state.calendarItems?.[ds]||[]).length > 0;
          const doneAll = hasInst && (state.instances?.[ds]||[]).every(i=>i.status==="completed");
          return (
            <div key={ds} onClick={() => { setSelDate(ds); setShowAdd(false); setShowAddTask(false); setReadingJournal(null); }}
              style={{ padding:"8px 3px 6px", borderRadius:7, textAlign:"center", cursor:"pointer",
                background: isSel ? "var(--coral)" : isTod ? "rgba(255,95,87,0.12)" : "transparent",
                outline: isTod && !isSel ? "1.5px solid var(--coral)" : "none", outlineOffset:-1,
                opacity: ds > today ? 1 : ds < today ? 0.55 : 1, transition:"background 0.12s",
                WebkitTapHighlightColor:"transparent", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
              <div style={{ fontSize:17, fontWeight: isTod ? 900 : 500, color: isSel ? "#000" : isTod ? "var(--coral)" : "var(--text)", lineHeight:1 }}>{day}</div>
              <div style={{ display:"flex", gap:2, justifyContent:"center", minHeight:5 }}>
                {hasInst && <div style={{ width:4, height:4, borderRadius:"50%", background: isSel ? "#000" : doneAll ? "var(--green)" : "var(--coral)" }} />}
                {hasCal  && <div style={{ width:4, height:4, borderRadius:"50%", background: isSel ? "#000" : "var(--blue)" }} />}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ borderTop:"1px solid var(--border)", paddingTop:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
          <div style={{ fontFamily:"var(--heading)", fontSize:22, fontWeight:800, fontStyle:"italic", color:"var(--coral)" }}>
            {new Date(selDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn btn-sm" style={{ background:"var(--blue)", color:"var(--btn-text)", fontSize:17, padding:"8px 14px" }}
              onClick={() => { setShowAddTask(t=>!t); setShowAdd(false); }}>+ Task</button>
            <button className="btn btn-sm btn-primary" style={{ fontSize:17, padding:"8px 14px" }}
              onClick={() => { setShowAdd(t=>!t); setShowAddTask(false); }}>+ Event</button>
          </div>
        </div>

        {showAddTask && (
          <div style={{ background:"rgba(76,201,240,0.06)", borderRadius:14, padding:14, marginBottom:14, border:"1px solid rgba(76,201,240,0.25)" }}>
            <input className="field" autoFocus value={newTask.name}
              onChange={e=>setNewTask(t=>merge(t,{name:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&addTask()}
              placeholder="Task name…" style={{ marginBottom:10 }} />
            <div style={{ display:"flex", gap:8 }}>
              <button className="btn btn-primary" style={{ flex:1, padding:11, fontSize:15 }} onClick={addTask}>Add Task</button>
              <button className="btn btn-secondary" style={{ padding:"11px 14px", fontSize:15 }} onClick={() => setShowAddTask(false)}>Cancel</button>
            </div>
          </div>
        )}

        {showAdd && (
          <div style={{ background:"var(--bg2)", borderRadius:14, padding:14, marginBottom:14, border:"1px solid var(--border)" }}>
            <input className="field" value={newItem.title} autoFocus
              onChange={e=>setNewItem(x=>merge(x,{title:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&addItem()}
              placeholder="e.g. Doctor appointment" style={{ marginBottom:10 }} />
            <input className="field" type="time" value={newItem.time}
              onChange={e=>setNewItem(x=>merge(x,{time:e.target.value}))} style={{ marginBottom:10 }} />
            <div style={{ display:"flex", gap:8 }}>
              <button className="btn btn-primary" style={{ flex:1, padding:11, fontSize:15 }} onClick={addItem}>Add</button>
              <button className="btn btn-secondary" style={{ padding:"11px 14px", fontSize:15 }} onClick={() => setShowAdd(false)}>Cancel</button>
            </div>
          </div>
        )}

        {selInst.length > 0 && (() => {
          const done    = selInst.filter(i=>i.status==="completed");
          const pending = selInst.filter(i=>i.status!=="completed");
          const renderRow = (inst, isDone) => {
            const task = state.tasks.find(t=>t.id===inst.taskId) || (state.tomorrowTasks||[]).find(t=>t.id===inst.taskId) || (inst.taskId===JOURNAL_TASK_ID ? JOURNAL_TASK : null);
            if (!task) return null;
            return (
              <div key={inst.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", borderRadius:10, marginBottom:6,
                background: isDone ? "var(--done-bg)" : "var(--bg1)",
                border: `1px solid ${isDone ? "var(--done-line)" : "var(--border)"}` }}>
                <div style={{ width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0,
                  background: isDone ? "rgba(0,229,160,0.12)" : "var(--bg2)",
                  border: `1.5px solid ${isDone ? "var(--green)" : "var(--border)"}`,
                  color: isDone ? "var(--green)" : "var(--text3)" }}>
                  {isDone ? "✓" : "○"}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:17, fontWeight:700, color: isDone ? "var(--text2)" : "var(--text)", textDecoration: isDone ? "line-through" : "none" }}>{task.name}</div>
                  <div style={{ fontSize:16, color:"var(--text3)", marginTop:2, textTransform:"capitalize" }}>{task.category}</div>
                </div>
                <div style={{ fontSize:17, fontWeight:800, color: isDone ? "var(--green)" : "var(--text3)" }}>
                  {isDone ? `+${task.points}pt` : `${task.points}pt`}
                </div>
              </div>
            );
          };
          return (
            <div style={{ marginBottom:16 }}>
              {pending.length > 0 && (<><div style={{ fontSize:12, fontWeight:800, color:"var(--text3)", letterSpacing:1, textTransform:"uppercase", fontFamily:"var(--mono)", marginBottom:8 }}>Pending · {pending.length}</div>{pending.map(i => renderRow(i, false))}</>)}
              {done.length > 0 && (<div style={{ marginTop: pending.length > 0 ? 12 : 0 }}><div style={{ fontSize:12, fontWeight:800, color:"var(--green)", letterSpacing:1, textTransform:"uppercase", fontFamily:"var(--mono)", marginBottom:8 }}>Completed · {done.length}</div>{done.map(i => renderRow(i, true))}</div>)}
            </div>
          );
        })()}

        {selItems.length > 0 && (
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, fontWeight:800, color:"var(--blue)", letterSpacing:1, textTransform:"uppercase", fontFamily:"var(--mono)", marginBottom:8 }}>Events</div>
            {selItems.map(item => (
              <div key={item.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", borderRadius:10, marginBottom:6, background:"rgba(76,201,240,0.06)", border:"1px solid rgba(76,201,240,0.2)" }}>
                <div style={{ color:"var(--blue)", fontSize:16, flexShrink:0 }}>◈</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:17, fontWeight:700 }}>{item.title}</div>
                  {item.time && <div style={{ fontSize:16, color:"var(--text3)", marginTop:2 }}>{item.time}</div>}
                </div>
                <button onClick={() => dispatch({type:"DEL_CAL_ITEM",date:selDate,id:item.id})}
                  style={{ background:"none", border:"none", color:"var(--text3)", fontSize:18, cursor:"pointer", padding:"4px 8px" }}>×</button>
              </div>
            ))}
          </div>
        )}

        {state.journals?.[selDate]?.reflection && (
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, fontWeight:800, color:"var(--purple)", letterSpacing:1, textTransform:"uppercase", fontFamily:"var(--mono)", marginBottom:8 }}>Journal</div>
            <div onClick={() => setReadingJournal(j => j ? null : selDate)}
              style={{ padding:"14px 16px", borderRadius:12, background:"rgba(199,125,255,0.06)", border:"1px solid rgba(199,125,255,0.2)", cursor:"pointer" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: readingJournal===selDate ? 12 : 0 }}>
                <div style={{ fontSize:16, fontWeight:800, color:"var(--purple)" }}>
                  {new Date(state.journals[selDate].savedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} reflection
                </div>
                <div style={{ fontSize:18, color:"var(--purple)", fontFamily:"var(--mono)" }}>{readingJournal===selDate ? "▲" : "▼"}</div>
              </div>
              {readingJournal === selDate && (
                <div style={{ fontSize:17, color:"var(--text2)", lineHeight:1.75, fontStyle:"italic", borderTop:"1px solid rgba(199,125,255,0.15)", paddingTop:12, whiteSpace:"pre-wrap" }}>
                  {state.journals[selDate].reflection}
                </div>
              )}
            </div>
          </div>
        )}

        {selInst.length === 0 && selItems.length === 0 && !state.journals?.[selDate]?.reflection && (
          <div className="empty" style={{ padding:"30px 20px" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>◈</div>
            <div className="empty-msg">Nothing here</div>
            <div className="empty-sub">Tap + Event or + Task to plan this day.</div>
            <div className="empty-tagline">A clear day is its own kind of discipline.</div>
          </div>
        )}
      </div>
    </div>
  );
}
