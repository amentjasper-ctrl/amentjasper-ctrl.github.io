// ── TUTORIAL OVERLAY ──────────────────────────────────────
// ══════════════════════════════════════════════════════════

// Each step can have:
//   domQuery: string | string[]  — CSS selector(s) to spotlight (union rect if array)
//   fullWidth: bool              — spotlight the topbar
//   isAddBtn: bool               — find "+ Daily Task" and "+ Complete by" buttons
//   goToSettings: bool           — navigate to settings tab and spotlight canvas input
//   openTaskForm: bool           — after spotlighting add buttons, auto-open form and spotlight it
const TUT_STEPS = [
  {
    id: "home_greeting",
    tab: "home",
    fullWidth: true,
    scrollTop: true,
    title: "Your greeting & time",
    body: "At the top you'll always see the Tempo name, the current time ribbon, and your discipline score — updating live as you build your streak.",

    body: "\uD83D\uDD25 Streak \u2014 consecutive days completed. The ring shows today\u2019s progress. Your Discipline Score on the right reflects long-term consistency.",

  },
  {

  },
  {
    id: "home_tasks",
    tab: "home",
    domQuery: [".sec-head", ".task-card"],
    unionRect: true,
    scrollTo: ".sec-head",
    title: "Check off tasks here",
    body: "Tap a task or swipe right to complete it. Finish every task today and you\u2019ll get a \uD83C\uDFAF Perfect Day celebration.",
    btn: "Next: add tasks \u2192",
  },
  {
    id: "tasks_add_btn",
    tab: "tasks",
    isAddBtn: true,
    title: "Your two task types",
    body: "Daily Task repeats on whatever days you choose. Complete By is a one-off deadline. Tap + Daily Task to add one now.",
    btn: "Open the form \u2192",
    actionNext: "openTaskForm",
  },
  {
    id: "tasks_form",
    tab: "tasks",
    openTaskForm: true,
    scrollTop: true,
    title: "Fill in the task",
    body: "Give it a name, pick which days it repeats, and choose a time of day. Tap Add Daily Task when you\u2019re ready.",
    btn: "Close & continue \u2192",
    actionNext: "closeForm",
  },
  {
    id: "homework_intro",
    tab: "homework",
    domQuery: null,
    title: "\uD83D\uDCDA Homework board",
    body: "Tempo pulls every Canvas assignment automatically \u2014 no manual entry ever. Tap below to connect your feed in Settings.",
    btn: "Go to Settings \u2192",

  {

    tab: "settings",
    goToSettings: true,
    title: "Connect Canvas",
    body: "In Canvas: Calendar \u2192 Calendar Feed (bottom of page) \u2192 copy the https:// link. Paste it into the field highlighted below, then come back.",
    btn: "Done \u2192",
  },
  {

    tab: "calendar",
    domQuery: null,
    scrollTop: true,
    title: "\uD83D\uDCC5 Your Calendar",
    body: "Tap any day to see tasks and events. Use + Event for appointments and + Task for one-off to-dos. Let\u2019s add an event now.",
    btn: "Select today \u2192",
    actionNext: "selectToday",

    tab: "calendar",
    calEventBtn: true,
    title: "Add an event",
    body: "Tap + Event to open the form. Type a name \u2014 a class, appointment, or reminder \u2014 then tap Add.",
    btn: "Open event form \u2192",
    actionNext: "openCalEvent",
  },
  {

    openCalEvent: true,
    title: "Fill in the event",
    body: "Type in a name and optionally a time. Tap Add when you\u2019re done and it\u2019ll appear on the calendar.",
    btn: "Done \u2192",

  {

    domQuery: null,
    title: "You know Tempo \uD83C\uDF89",
    body: "Come back every morning, check off your tasks, protect your streak. Every day you show up is a vote for the person you\u2019re becoming.",
    btn: "Start my streak \uD83D\uDD25",
  },
];

function TutorialOverlay({ stepIdx, onNext, onBack, onSkip, setTab, activeTab }) {
  const step = TUT_STEPS[stepIdx];
  if (!step) return null;

  const isLast  = stepIdx === TUT_STEPS.length - 1;
  const isFirst = stepIdx === 0;

  const [spotRects, setSpotRects] = useState([]);
  const rafRef    = useRef(null);
  const prevKey   = useRef("");
  const readyRef  = useRef(false);
  const [ready, setReadyState] = useState(false);
  const timerRefs = useRef([]);

  const markReady = () => {
    if (!readyRef.current) { readyRef.current = true; setReadyState(true); }
  };

  const clearAllTimers = () => {
    timerRefs.current.forEach(t => clearTimeout(t));
    timerRefs.current = [];
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
  };

  const addTimer = (fn, ms) => {
    const id = setTimeout(fn, ms);
    timerRefs.current.push(id);
    return id;
  };

  useEffect(() => {
    clearAllTimers();
    readyRef.current = false;
    setReadyState(false);
    setSpotRects([]);
    prevKey.current = "";

    const tabDelay = (step.tab && step.tab !== activeTab) ? 500 : 80;
    if (step.tab && step.tab !== activeTab) setTab(step.tab);

    addTimer(() => {
      if (step.scrollTop) {
        const scrollEl = document.querySelector(".scroll");
        if (scrollEl) scrollEl.scrollTo({ top: 0, behavior: "smooth" });
      } else if (step.scrollTo) {
        const el = document.querySelector(step.scrollTo);
        if (el) el.scrollIntoView({ behavior:"smooth", block:"center" });
      } else {
        const el = findPrimaryTarget();
        if (el && !step.fullWidth) el.scrollIntoView({ behavior:"smooth", block:"center" });
      }
      addTimer(startTracking, 420);
      addTimer(markReady, 900);
    }, tabDelay);

    return () => clearAllTimers();
  }, [stepIdx]);

  function findPrimaryTarget() {
    if (step.fullWidth)     return document.querySelector(".topbar");
    if (step.isAddBtn)      { let f=null; document.querySelectorAll("button").forEach(b=>{ const t=b.textContent.trim(); if(!f&&(t.includes("Daily Task")||t.includes("Complete by")||t.includes("Complete By"))&&!b.closest(".sheet"))f=b; }); return f; }
    if (step.openTaskForm || step.openCalEvent) return document.querySelector(".sheet");
    if (step.calEventBtn)   { let f=null; document.querySelectorAll("button").forEach(b=>{ if(!f&&b.textContent.trim()==="\u002B Event")f=b; }); return f; }
    if (step.goToSettings)  { let f=null; document.querySelectorAll(".card").forEach(c=>{ if(!f&&(c.textContent.includes("Canvas Feed")||c.textContent.includes("iCal")))f=c; }); return f; }
    if (step.heatmapFallback) return findHeatmap();
    if (step.domQuery)      { const q=Array.isArray(step.domQuery)?step.domQuery[0]:step.domQuery; return q?document.querySelector(q):null; }
    return null;
  }

  function findHeatmap() {
    let found = null;
    document.querySelectorAll("div").forEach(d => {
      if (!found && d.children.length === 28 && d.style.gridTemplateColumns) found = d.parentElement;
    });
    if (!found) {
      document.querySelectorAll("div").forEach(d => {
        if (!found && d.textContent.trim().startsWith("4-week")) found = d.closest("[style]") || d.parentElement;
      });
    }
    return found;
  }

  function measureRects() {
    const PAD = 16;
    const vw  = window.innerWidth;
    const rects = [];

    const push = (el, extra) => {
      if (!el) return;
      const r = el.getBoundingClientRect();
      const p = PAD + (extra || 0);
      if (r.width > 0 && r.height > 0) {
        rects.push({
          top:    r.top  - p,
          left:   Math.max(0,  r.left - p),
          width:  Math.min(vw, r.width  + p * 2),
          height: r.height + p * 2,
        });
      }
    };

    if (step.fullWidth) {
      const bar = document.querySelector(".topbar");
      if (bar) {
        const r = bar.getBoundingClientRect();
        rects.push({ top: 0, left: 0, width: vw, height: r.height + 8 });
      }
    }

    if (step.isAddBtn) {
      document.querySelectorAll("button").forEach(b => {
        const t = b.textContent.trim();
        if ((t.includes("Daily Task") || t.includes("Complete by") || t.includes("Complete By")) && !b.closest(".sheet") && !b.closest(".backdrop")) push(b, 6);
      });
    }

    if (step.openTaskForm || step.openCalEvent) {
      push(document.querySelector(".backdrop .sheet, .sheet"), 6);
    }

    if (step.calEventBtn) {
      document.querySelectorAll("button").forEach(b => {
        const t = b.textContent.trim();
        if (t === "\u002B Event" || t === "\u002B Task") push(b, 4);
      });
    }

    if (step.goToSettings) {
      let found = false;
      document.querySelectorAll(".card").forEach(card => {
        if (card.textContent.includes("Canvas Feed") || card.textContent.includes("iCal")) { push(card, 8); found = true; }
      });
      if (!found) {
        document.querySelectorAll("input.field").forEach(inp => {
          const ph = inp.getAttribute("placeholder") || "";
          if (ph.includes("instructure") || ph.includes("ical") || ph.includes("calendar") || ph.includes("feeds")) push(inp, 12);
        });
      }
    }

    if (step.heatmapFallback) { push(findHeatmap(), 10); }

    if (step.domQuery && !step.heatmapFallback && !step.goToSettings) {
      const queries = Array.isArray(step.domQuery) ? step.domQuery : [step.domQuery];
      if (step.unionRect) {
        let minT=Infinity, minL=Infinity, maxB=-Infinity, maxR=-Infinity, any=false;
        queries.forEach(q => {
          document.querySelectorAll(q).forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.width > 0 && r.height > 0 && r.top > -100 && r.bottom < window.innerHeight + 100) {
              minT=Math.min(minT,r.top); minL=Math.min(minL,r.left); maxB=Math.max(maxB,r.bottom); maxR=Math.max(maxR,r.right); any=true;
            }
          });
        });
        if (any) rects.push({ top:minT-PAD, left:Math.max(0,minL-PAD), width:Math.min(vw,maxR-minL+PAD*2), height:maxB-minT+PAD*2 });
      } else {
        queries.forEach(q => { if (q) push(document.querySelector(q)); });
      }
    }

    return rects;
  }

  function startTracking() {
    const tick = () => {
      const newRects = measureRects();
      const key = JSON.stringify(newRects.map(r=>({t:Math.round(r.top),l:Math.round(r.left),w:Math.round(r.width),h:Math.round(r.height)})));
      if (key !== prevKey.current) {
        prevKey.current = key;
        setSpotRects(newRects);
        if (!readyRef.current && newRects.length > 0) markReady();
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(tick);
  }

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const unionRect = spotRects.length > 0 ? {
    top:    Math.min(...spotRects.map(r=>r.top)),
    left:   Math.min(...spotRects.map(r=>r.left)),
    bottom: Math.max(...spotRects.map(r=>r.top+r.height)),
    right:  Math.max(...spotRects.map(r=>r.left+r.width)),
  } : null;

  const vignetteStyle = (() => {
    if (spotRects.length === 0) return { position:"fixed",inset:0,zIndex:1900,pointerEvents:"none",background:"rgba(0,0,0,0.70)" };
    const holes = spotRects.map(r=>`<rect x='${Math.max(0,r.left)}' y='${Math.max(0,r.top)}' width='${r.width}' height='${r.height}' rx='14' fill='black'/>`).join("");
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${vw}' height='${vh}'><defs><mask id='m'><rect width='${vw}' height='${vh}' fill='white'/>${holes}</mask></defs><rect width='${vw}' height='${vh}' fill='rgba(0,0,0,0.70)' mask='url(%23m)'/></svg>`;
    return { position:"fixed",inset:0,zIndex:1900,pointerEvents:"none", backgroundImage:`url("data:image/svg+xml,${svg.replace(/#/g,'%23')}")`, backgroundRepeat:"no-repeat", backgroundSize:`${vw}px ${vh}px` };
  })();

  const NAV_H = 62, TOPBAR_H = 66;
  const ttW   = Math.min(310, vw - 28);
  const mg    = 14;

  const tooltipStyle = (() => {
    // For steps where the form fills the screen, always anchor to bottom so it doesn't cover content
    if (step.openTaskForm || step.openCalEvent) {
      return { bottom: NAV_H + mg, left: Math.max(mg,(vw-ttW)/2), width: ttW };
    }
    if (!unionRect || !ready) return { bottom: NAV_H + mg, left: Math.max(mg,(vw-ttW)/2), width: ttW };
    const cx     = (unionRect.left + unionRect.right) / 2;
    const spaceB = vh - unionRect.bottom - NAV_H;
    const spaceT = unionRect.top - TOPBAR_H;
    const ttH    = 260;
    if (spaceB >= ttH + mg) return { top: unionRect.bottom + mg, left: Math.max(mg, Math.min(vw-ttW-mg, cx-ttW/2)), width: ttW };
    if (spaceT >= ttH + mg) return { bottom: vh - unionRect.top + mg, left: Math.max(mg, Math.min(vw-ttW-mg, cx-ttW/2)), width: ttW };
    // Side placement if no room above/below
    if (vw - unionRect.right - mg >= ttW + mg) return { top: Math.max(TOPBAR_H+mg, Math.min(vh-ttH-NAV_H-mg, (unionRect.top+unionRect.bottom)/2-ttH/2)), left: unionRect.right+mg, width: ttW };
    if (unionRect.left - mg >= ttW + mg) return { top: Math.max(TOPBAR_H+mg, Math.min(vh-ttH-NAV_H-mg, (unionRect.top+unionRect.bottom)/2-ttH/2)), left: unionRect.left-ttW-mg, width: ttW };
    return { bottom: NAV_H + mg, left: Math.max(mg, Math.min(vw-ttW-mg, cx-ttW/2)), width: ttW };
  })();

  const handleNext = () => {
    if (step.actionNext === "openTaskForm") {
      let clicked = false;
      document.querySelectorAll("button").forEach(b => {
        if (!clicked && b.textContent.trim().endsWith("Daily Task") && !b.closest(".sheet") && !b.closest(".backdrop")) { b.click(); clicked = true; }
      });
      addTimer(onNext, 340);
      return;
    }
    if (step.actionNext === "closeForm") {
      let cancelled = false;
      document.querySelectorAll("button").forEach(b => {
        if (!cancelled && b.textContent.trim() === "Cancel") { b.click(); cancelled = true; }
      });
      addTimer(onNext, 220);
      return;
    }
    if (step.actionNext === "goToSettings") { setTab("settings"); addTimer(onNext, 400); return; }
    if (step.actionNext === "selectToday") {
      const todayCell = document.querySelector(".cal-day.is-today");
      if (todayCell) todayCell.click();
      addTimer(onNext, 360);
      return;
    }
    if (step.actionNext === "openCalEvent") {
      let clicked = false;
      document.querySelectorAll("button").forEach(b => { if (!clicked && b.textContent.trim() === "\u002B Event") { b.click(); clicked = true; } });
      addTimer(onNext, 340);
      return;
    }
    onNext();
  };

  return (
    <div style={{ position:"fixed",inset:0,zIndex:1900,pointerEvents:"none" }}>
      <div style={vignetteStyle} />

      {spotRects.map((r, i) => (
        <div key={i} style={{
          position:"fixed", zIndex:1901, pointerEvents:"none",
          top: Math.max(0,r.top), left: Math.max(0,r.left), width: r.width, height: r.height,
          borderRadius:16, border:"2px solid var(--coral)",
          boxShadow:"0 0 0 4px rgba(255,95,87,0.12), 0 0 28px rgba(255,95,87,0.18)",
          animation:"tutPulse 2.2s ease-in-out infinite",
          transition:"top 0.22s ease, left 0.22s ease, width 0.22s ease, height 0.22s ease",
        }} />
      ))}

      <div style={{
        ...tooltipStyle, position:"fixed", zIndex:1902, pointerEvents:"all",
        background:"var(--bg1)", border:"1.5px solid var(--coral)", borderRadius:16,
        padding:"13px 14px 11px", boxShadow:"0 8px 40px rgba(0,0,0,0.6)",
        opacity: ready ? 1 : 0, transition:"opacity 0.22s ease",
        maxHeight: Math.max(160, vh - NAV_H - TOPBAR_H - 20), overflowY:"auto",
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
          <div style={{ fontFamily:"var(--mono)",fontSize:13,fontWeight:800,color:"var(--text3)",letterSpacing:"1.5px",textTransform:"uppercase" }}>
            {stepIdx + 1} / {TUT_STEPS.length}
          </div>
          <div style={{ display:"flex", gap:3 }}>
            {TUT_STEPS.map((_,i) => (
              <div key={i} style={{ width:i===stepIdx?14:4, height:3, borderRadius:99, transition:"all 0.22s",
                background:i<stepIdx?"rgba(255,95,87,0.45)":i===stepIdx?"var(--coral)":"var(--bg3)" }} />
            ))}
          </div>
        </div>

        <div style={{ fontFamily:"var(--heading)",fontSize:16,fontWeight:900,color:"var(--text)",marginBottom:4,lineHeight:1.2 }}>
          {step.title}
        </div>
        <div style={{ fontSize:13,color:"var(--text2)",lineHeight:1.5,marginBottom:10,fontWeight:500 }}>
          {step.body}
        </div>

        <button onClick={handleNext} style={{
          width:"100%", padding:"10px 0", borderRadius:10, border:"none",
          background:"var(--coral)", color:"#000", fontFamily:"var(--font)",
          fontSize:14, fontWeight:900, cursor:"pointer", WebkitTapHighlightColor:"transparent",
          marginBottom: (!isFirst || !isLast) ? 6 : 0, letterSpacing:"0.3px",
        }}>
          {isLast ? "Start my streak \uD83D\uDD25" : step.btn}
        </button>

        {(!isFirst || !isLast) && (
          <div style={{ display:"flex", gap:8 }}>
            {!isFirst && (
              <button onClick={onBack} style={{
                flex:1, padding:"7px 0", borderRadius:9,
                border:"1px solid var(--border)", background:"transparent",
                color:"var(--text3)", fontFamily:"var(--font)", fontSize:12, fontWeight:700,
                cursor:"pointer", WebkitTapHighlightColor:"transparent",
              }}>← Back</button>
            )}
            {!isLast && (
              <button onClick={onSkip} style={{
                flex:1, padding:"7px 0", borderRadius:9,
                border:"1px solid var(--border)", background:"transparent",
                color:"var(--text3)", fontFamily:"var(--font)", fontSize:12, fontWeight:700,
                cursor:"pointer", WebkitTapHighlightColor:"transparent",
              }}>Skip tutorial</button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
const TAB_LABELS = { home:null, tasks:"My Tasks", homework:"Homework", calendar:"Calendar", settings:"Settings" };



function App({ user }) {
  // auth handled by AuthGate wrapper

  const [appState, setAppState]             = useState(DEFAULT_STATE);
  const [logoShimmered, setLogoShimmered]   = useState(false);
  React.useEffect(() => { const t = setTimeout(() => setLogoShimmered(true), 600); return () => clearTimeout(t); }, []);
  const [loaded, setLoaded]                 = useState(false);
  const [activeTab, setActiveTab]           = useState("home");
  const [prevTab, setPrevTab]               = useState("home");
  const [toasts, setToasts]                 = useState([]);
  const [showPunishment, setShowPunishment] = useState(false);
  const [showDailyWheel, setShowDailyWheel] = useState(false);
  const [showQuickAdd, setShowQuickAdd]     = useState(false);
  const [showWeeklySummary, setShowWeeklySummary] = useState(false);
  const [showMorningBriefing, setShowMorningBriefing] = useState(false);
  const [journalOpen, setJournalOpen] = useState(null); // { inst, date, instList }
  const [editingTask, setEditingTask] = useState(null);
  const [editingMode, setEditingMode] = useState("daily");
  const [clockNow, setClockNow]             = useState(new Date());
  const [fabShake, setFabShake]             = useState(false);
  // ── Onboarding & tutorial ──
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [tutStep, setTutStep]               = useState(-1); // -1 = not running
  const [showSplash, setShowSplash]         = useState(false);

  // Shake gesture detection
  useEffect(() => {
    let lastX = null, lastY = null, lastZ = null;
    let lastShake = 0;
    const handleMotion = (e) => {
      const { x, y, z } = e.accelerationIncludingGravity || {};
      if (x == null) return;
      if (lastX != null) {
        const delta = Math.abs(x - lastX) + Math.abs(y - lastY) + Math.abs(z - lastZ);
        if (delta > 30 && Date.now() - lastShake > 2000) {
          lastShake = Date.now();
          setFabShake(true);
          setTimeout(() => setFabShake(false), 600);
          setShowQuickAdd(true);
        }
      }
      lastX = x; lastY = y; lastZ = z;
    };
    if (typeof DeviceMotionEvent !== "undefined") {
      window.addEventListener("devicemotion", handleMotion, { passive: true });
      return () => window.removeEventListener("devicemotion", handleMotion);
    }
  }, []);

  useEffect(() => {
    loadState().then(saved => {
      const today = todayStr();
      const yest  = new Date(); yest.setDate(yest.getDate()-1);
      const yStr  = todayStr(yest);
      const migratedTasks = (saved.tasks||[]).map(t => {
        const d = t.days || [];
        const isWeekdayDefault = d.length===5 && [1,2,3,4,5].every(x=>d.includes(x));
        return isWeekdayDefault ? merge(t,{days:[0,1,2,3,4,5,6]}) : t;
      });
      // Prune skippedDays older than today
      const rawSkipped = saved.skippedDays || {};
      const prunedSkipped = {};
      Object.keys(rawSkipped).forEach(date => { if (date >= today) prunedSkipped[date] = rawSkipped[date]; });
      const cleaned = merge(saved, { tasks: migratedTasks,
        tomorrowTasks: (saved.tomorrowTasks||[]).filter(t=>t.forDate>=today),
        skippedDays: prunedSkipped,
        instances: merge(saved.instances, {
          [today]: ((saved.instances?.[today])||[])
            .filter(i => i.status==="completed" && i.completedAt && (d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`)(new Date(i.completedAt)) === today)
        })
      });
      saveState(cleaned);
      setAppState(() => cleaned);
      setLoaded(true);

      // ── First-time user: show onboarding ──
      if (!saved.cfg?.onboardingComplete) {
        setShowOnboarding(true);
        return; // skip punishment/wheel checks for new users
      }

      // Show weekly summary on Sunday if not shown yet this week
      const now = new Date();
      if (now.getDay() === 0) {
        const weekKey = todayStr();
        const lastSummary = saved.cfg?.lastWeeklySummary;
        if (lastSummary !== weekKey) {
          setTimeout(() => setShowWeeklySummary(true), 1200);
        }
      }

      const yesterdayInst = saved.instances?.[yStr] || [];
      const hadTasks      = yesterdayInst.length > 0;
      const allCompleted  = yesterdayInst.every(i => i.status==="completed");
      const punishments   = saved.cfg?.punishments || [];
      const lastSpinDate  = saved.cfg?.lastSpinDate;
      const freezes       = saved.streak?.freezes || 0;

      // ── Splash greeting on every open (returning users) ──
      // If no name yet, splash stays open with name form — no timer, no modals
      setShowSplash(true);
      if (saved.userName) {
        setTimeout(() => setShowSplash(false), 5500);
        setTimeout(() => {
          if (hadTasks && !allCompleted) {
            if (punishments.length > 0 && lastSpinDate !== yStr) { setShowPunishment(true); return; }
          }
          const dailyTasks    = saved.cfg?.dailyTasks || [];
          const lastDailySpin = saved.cfg?.lastDailySpin;
          if (dailyTasks.length > 0 && lastDailySpin !== today) setShowDailyWheel(true);
          const hour = now.getHours();
          const lastBriefing = saved.cfg?.lastBriefingDate;
          if (hour >= 5 && hour < 12 && lastBriefing !== today) {
            setTimeout(() => setShowMorningBriefing(true), 800);
          }
        }, 5600);
      }
    });
  }, []);

  const dispatch = useCallback((action) => {
    setAppState(current => {
      const next = appReducer(current, action);
      saveState(next);
      return next;
    });
  }, []);

  useEffect(() => {
    const html = document.documentElement;
    if (appState.cfg.theme === "claude2") html.setAttribute("data-theme","claude2");
    else html.removeAttribute("data-theme");
  }, [appState.cfg.theme]);

  const showToast = useCallback((msg) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg }]);
  }, []);

  const handleTabChange = (tab) => {
    setPrevTab(activeTab);
    setActiveTab(tab);
  };

  // ── Onboarding complete handler ──
  const handleOnboardingComplete = ({ tasks, punishments, dailyTasks, userName, userIdentity }) => {
    setShowOnboarding(false);
    tasks.forEach(task => dispatch({ type:"ADD_TASK", task }));
    dispatch({ type:"UPD_CFG", cfg:{ punishments, dailyTasks, onboardingComplete: true } });
    if (userName) dispatch({ type:"SET_USER_INFO", userName, userIdentity });
    // Splash greeting then drop straight into the app
    setShowSplash(true);
    setTimeout(() => setShowSplash(false), 5500);
  };

  useEffect(() => {
    const interval = setInterval(() => setClockNow(new Date()), 60_000);
    return () => clearInterval(interval);
  }, []);

  // ── Notification scheduler ──
  useEffect(() => {
    if (typeof Notification === "undefined") return;
    if (!appState.cfg?.notifEnabled || Notification.permission !== "granted") return;
    const [h, m] = (appState.cfg.notifTime || "21:00").split(":").map(Number);
    const now = new Date();
    const fire = new Date();
    fire.setHours(h, m, 0, 0);
    if (fire <= now) fire.setDate(fire.getDate() + 1);
    const delay = fire - now;
    const tid = setTimeout(() => {
      const today = todayStr();
      const instances = appState.instances?.[today] || [];
      const pending = instances.filter(i => i.status !== "completed").length;
      if (pending > 0) {
        new Notification("Tempo", {
          body: `You still have ${pending} task${pending !== 1 ? "s" : ""} left today. Finish strong.`,
          icon: "/favicon.ico",
        });
      }
    }, delay);
    return () => clearTimeout(tid);
  }, [appState.cfg?.notifEnabled, appState.cfg?.notifTime, appState.instances]);

  const handleQuickAdd = ({ name, category, toTomorrow }) => {
    const today = todayStr();
    const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate()+1); return todayStr(d); })();
    if (toTomorrow) {
      dispatch({ type:"ADD_TOMORROW_TASK", task:{
        id: `tt_${Date.now()}`, name, category: category||"morning",
        forDate: tomorrow, points: 10, active: true,
        journal: false, createdAt: new Date().toISOString(),
      }});
      showToast(`→ "${name}" added to tomorrow`);
    } else {
      const dayOfWeek = new Date().getDay();
      dispatch({ type:"ADD_TASK", task:{
        id: `t_${Date.now()}`, name, category: category||"morning",
        days: [dayOfWeek], points: 10, active: true,
        journal: false, repeat: false, createdAt: new Date().toISOString(),
      }});
      showToast(`✓ "${name}" added`);
    }
  };

  if (!loaded) {
    return (
      <div style={{ background:"var(--bg)",height:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12 }}>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:12 }}>
        <svg width="84" height="84" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          {/* Broken circle — open at top-right, brush ends curl */}
          <path d="M68 14 C80 18 90 28 94 42 C98 56 95 71 87 82 C79 93 66 100 52 100 C38 100 25 93 17 82 C9 71 7 56 11 42 C15 28 25 18 37 14 C46 11 57 11 66 15" stroke="var(--coral)" strokeWidth="5.5" strokeLinecap="round" fill="none"/>
          <path d="M68 14 C70 12 73 11 72 13" stroke="var(--coral)" strokeWidth="4" strokeLinecap="round" fill="none"/>
          <path d="M37 14 C35 12 32 12 33 15" stroke="var(--coral)" strokeWidth="4" strokeLinecap="round" fill="none"/>
          {/* T crossbar */}
          <path d="M28 40 C40 37 55 36 77 40" stroke="var(--coral)" strokeWidth="5" strokeLinecap="round" fill="none"/>
          {/* Vertical stem */}
          <line x1="52" y1="38" x2="52" y2="68" stroke="var(--coral)" strokeWidth="5" strokeLinecap="round"/>
          {/* S-curve tail */}
          <path d="M52 68 C54 74 60 78 65 82 C70 86 74 90 70 96 C68 99 64 101 60 100" stroke="var(--coral)" strokeWidth="4.5" strokeLinecap="round" fill="none"/>
        </svg>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
          <span style={{ fontFamily:"var(--heading)", fontSize:44, fontWeight:700, color:"var(--text)", letterSpacing:"-0.5px" }}>Tempo</span>
          <span style={{ fontFamily:"var(--mono)", fontSize:12, fontWeight:700, color:"var(--text3)", letterSpacing:"3.5px", textTransform:"uppercase" }}>Scheduling App</span>
        </div>
      </div>
        <div style={{ fontSize:16,color:"var(--text3)",fontWeight:600 }}>Loading…</div>
      </div>
    );
  }


  const handleSaveTaskFromHome = (taskData) => {
    const pts = inferPoints(taskData);
    const isTT = (appState.tomorrowTasks||[]).some(t => t.id === editingTask.id);
    if (isTT) {
      const updated = merge(editingTask, taskData, { points: pts });
      dispatch({ type:"DEL_TOMORROW_TASK", id: editingTask.id });
      dispatch({ type:"ADD_TOMORROW_TASK", task: updated });
    } else {
      dispatch({ type:"UPD_TASK", task: merge(taskData,{id:editingTask.id, points:pts}) });
    }
    showToast("Updated");
    setEditingTask(null);
  };

  return (
    <>
      {/* ── Splash greeting (every open) ── */}
      {showSplash && !showOnboarding && (
        <SplashGreeting
          userName={appState.userName}
          userIdentity={appState.userIdentity}
          onDone={() => setShowSplash(false)}
          onSaveName={(name, identity) => {
            dispatch({ type:"SET_USER_INFO", userName:name, userIdentity:identity });
            // Now show the greeting for 5s then dismiss and allow modals
            setTimeout(() => setShowSplash(false), 5500);
          }}
        />
      )}

      {/* ── Onboarding (first-time users only) ── */}
      {showOnboarding && (
        <OnboardingFlow onComplete={handleOnboardingComplete} />
      )}

      {/* ── Tutorial overlay (after onboarding) ── */}
      {tutStep >= 0 && tutStep < TUT_STEPS.length && !showOnboarding && (
        <TutorialOverlay
          stepIdx={tutStep}
          activeTab={activeTab}
          setTab={(tab) => { setPrevTab(activeTab); setActiveTab(tab); }}
          onNext={() => {
            if (tutStep >= TUT_STEPS.length - 1) {
              setTutStep(-1);
              dispatch({ type:"UPD_CFG", cfg:{ tutorialComplete: true } });
            } else {
              setTutStep(s => s + 1);
            }
          }}
          onBack={() => {
            if (tutStep > 0) setTutStep(s => s - 1);
          }}
          onSkip={() => {
            setTutStep(-1);
            dispatch({ type:"UPD_CFG", cfg:{ tutorialComplete: true } });
            showToast("Tutorial skipped — you can always explore on your own!");
          }}
        />
      )}

      {showDailyWheel && !showPunishment && (
        <DailyTasksModal tasks={appState.cfg.dailyTasks||[]}
          onDone={selectedTask => {
            setShowDailyWheel(false);
            dispatch({ type:"UPD_CFG", cfg:{ lastDailySpin:todayStr() } });
            if (selectedTask) dispatch({ type:"ADD_TASK", task:{ id:`dt_${Date.now()}`, name:selectedTask, points:25, category:"morning", days:[new Date().getDay()], active:true, journal:false, repeat:false, createdAt:new Date().toISOString() } });
          }} />
      )}
      {showPunishment && (
        <PunishmentsModal punishments={appState.cfg.punishments||[]}
          onDone={() => {
            setShowPunishment(false);
            const yest = new Date(); yest.setDate(yest.getDate()-1);
            dispatch({ type:"UPD_CFG", cfg:{ lastSpinDate:todayStr(yest) } });
            const today=todayStr(), dl=appState.cfg?.dailyTasks||[], lds=appState.cfg?.lastDailySpin;
            if (dl.length>0&&lds!==today) setShowDailyWheel(true);
          }} />
      )}

      {journalOpen && (
        <JournalModal
          date={journalOpen.date}
          state={appState}
          dispatch={dispatch}
          onClose={() => setJournalOpen(null)}
          onConfirmComplete={() => {
            const { inst, date, instList } = journalOpen;
            const task = appState.tasks.find(t => t.id === inst.taskId) || (appState.tomorrowTasks||[]).find(t => t.id === inst.taskId) || (inst.taskId === JOURNAL_TASK_ID ? JOURNAL_TASK : null);
            dispatch({ type:"COMPLETE", date, id:inst.id, list:instList });
            showToast(`+${task?.points||0} pts ✶ ${task?.name||""}`);
            setJournalOpen(null);
          }}
        />
      )}

      {editingTask && editingTask !== "new" && (
        <BottomSheet title="Edit Task" onClose={() => setEditingTask(null)}>
          <TaskForm
            key={editingTask.id}
            init={editingTask}
            mode={editingMode}
            onSave={handleSaveTaskFromHome}
            onCancel={() => setEditingTask(null)} />
        </BottomSheet>
      )}

      {showMorningBriefing && (
        <MorningBriefing
          todayTasks={(appState.tomorrowTasks||[]).filter(t => t.forDate <= todayStr())}
          onAddTask={task => {
            const today = todayStr();
            const dow = new Date(today+"T12:00:00").getDay();
            dispatch({ type:"ADD_TASK", task:{ ...task, id:`mb_${Date.now()}`, days:[dow], active:true, repeat:false, points: task.points||25, category:"morning" } });
            showToast("Task added");
          }}
          onDismiss={() => {
            setShowMorningBriefing(false);
            dispatch({ type:"UPD_CFG", cfg:{ lastBriefingDate: todayStr() } });
          }}
        />
      )}

      {showWeeklySummary && (
        <WeeklySummaryModal state={appState} onClose={() => {
          setShowWeeklySummary(false);
          dispatch({ type:"UPD_CFG", cfg:{ lastWeeklySummary: todayStr() } });
        }} />
      )}

      {showQuickAdd && (
        <QuickAddSheet
          onAdd={handleQuickAdd}
          onClose={() => setShowQuickAdd(false)}
          recentTasks={appState.tasks.slice(0, 8)}
          todayTaskCount={(() => {
            const today = todayStr();
            const dow = new Date(today+"T12:00:00").getDay();
            return appState.tasks.filter(t => t.active && t.days.includes(dow) && t.id !== JOURNAL_TASK_ID).length;
          })()} />
      )}

      <div className="shell">
        <div className="topbar">
          <div style={{ display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                <span style={{ fontFamily:"var(--heading)", fontSize:36, fontWeight:700, color:"var(--text)", letterSpacing:"-0.3px", fontStyle:"normal" }}>Tempo</span>
                <span style={{ fontFamily:"var(--mono)", fontSize:9, fontWeight:700, color:"var(--text3)", letterSpacing:"2.5px", textTransform:"uppercase" }}>Scheduling App</span>
              </div>
            </div>
              {(() => {
                const allInst = Object.values(appState.instances).flat();
                const fin = allInst.filter(i => i.status !== 'pending');
                const done = fin.filter(i => i.status === 'completed');
                const rate = fin.length > 0 ? Math.round(done.length/fin.length*100) : 0;
                const score = Math.min(100, Math.round(rate*0.6 + Math.min(appState.streak.cur*5,40)));
                if (score === 0) return null;
                const color = score >= 80 ? 'var(--green)' : score >= 50 ? 'var(--coral)' : 'var(--red)';
                return (
                  <div style={{ fontFamily:"var(--mono)", fontSize:13, fontWeight:900, color, padding:"3px 10px", borderRadius:99, border:`1px solid ${color}`, background:`${color}18` }}>
                    {score}
                  </div>
                );
              })()}
            </div>
            <TimeRibbon />
          </div>

        </div>

        <div className="scroll">
          {activeTab !== "home" && (
            <div style={{ fontSize:46,fontWeight:700,marginBottom:20,color:"var(--coral)",letterSpacing:0,fontStyle:"italic",fontFamily:"var(--heading)" }}>
              {TAB_LABELS[activeTab]}
            </div>
          )}
          <div key={activeTab} className="tab-view-enter">
            {activeTab === "home"     && <HomeView     state={appState} dispatch={dispatch} showToast={showToast} onQuickAdd={() => setShowQuickAdd(true)} onOpenJournal={(inst, date, instList) => setJournalOpen({ inst, date, instList })} onEditTask={(task) => { setEditingMode("daily"); setEditingTask(task); }} />}

            {activeTab === "tasks"    && <TasksView    state={appState} dispatch={dispatch} showToast={showToast} />}
            {activeTab === "homework" && <HomeworkView state={appState} dispatch={dispatch} showToast={showToast} />}
            {activeTab === "calendar" && <CalendarView state={appState} dispatch={dispatch} showToast={showToast} />}
            {activeTab === "settings" && <SettingsView state={appState} dispatch={dispatch} showToast={showToast}
              onSimulate={(mode) => {
                handleTabChange("home");
                if (mode === "tutorial") {
                  setTimeout(() => setTutStep(0), 300);
                } else if (mode === "briefing") {
                  setTimeout(() => setShowMorningBriefing(true), 300);
                } else if (mode === "weekly") {
                  setTimeout(() => setShowWeeklySummary(true), 300);
                } else if (mode === "wheel") {
                  setTimeout(() => setShowDailyWheel(true), 300);
                } else if (mode === "punishment") {
                  setTimeout(() => setShowPunishment(true), 300);
                } else if (mode === "splash") {
                  setTimeout(() => setShowSplash(true), 300);
                  setTimeout(() => setShowSplash(false), 5800);
                } else {
                  setShowOnboarding(true);
                }
              }} />}
          </div>
          <div style={{ height:20 }} />
        </div>

        {/* Radial nav hidden — using bottom tab bar instead */}



        <div className="iframe-tabnav">
          {NAV_ITEMS.map(item => (
            <button key={item.id} className={`iframe-tabnav-btn ${activeTab===item.id?"active":""}`}
              onClick={() => handleTabChange(item.id)}>
              <div style={{ fontSize:20 }}>{item.icon}</div>
              <span>{item.label}</span>
            </button>
          ))}
        </div>
      </div>

      {toasts.map(toast => (
        <Toast key={toast.id} msg={toast.msg} onDone={() => setToasts(t=>t.filter(x=>x.id!==toast.id))} />
      ))}
    </>
  );
}

function AuthGate() {
  return <App user={null} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
</script>
</body>
