function inferDifficulty(title = "") {
  const t = (title || "").toLowerCase();
  if (/\b(final|midterm|exam)\b/.test(t))                    return 5;
  if (/\b(project|research paper|capstone)\b/.test(t))       return 4;
  if (/\b(essay|lab report|lab|report|paper)\b/.test(t))     return 3;
  if (/\b(quiz|homework|hw|worksheet|problem set)\b/.test(t)) return 2;
  if (/\b(reading|discussion|post|reflection)\b/.test(t))    return 1;
  return 2;
}

function calcPriorityScore(assignment) {
  const difficulty = assignment.difficultyOverride ?? assignment.estimatedDifficulty ?? 2;
  let urgency = 0;
  if (assignment.dueDate) {
    const now  = new Date();
    const due  = new Date(assignment.dueDate);
    const days = (due - now) / 86_400_000;
    if (days < 0)      urgency = 60;
    else if (days < 1) urgency = 55;
    else               urgency = Math.max(0, 50 - days * 3);
  }
  return Math.round(urgency + difficulty * 6);
}

function levenshtein(a, b) {
  a = (a ?? "").toLowerCase().trim(); b = (b ?? "").toLowerCase().trim();
  const m = a.length, n = b.length;
  if (m === 0) return n; if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  dp[0] = Array.from({ length: n + 1 }, (_, j) => j);
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function titleSimilarity(a, b) {
  const maxLen = Math.max(a.length, b.length);
  if (maxLen === 0) return 1;
  return 1 - levenshtein(a, b) / maxLen;
}

function courseSimilarity(a, b) {
  a = (a ?? "").toLowerCase().replace(/[^a-z0-9]/g, "");
  b = (b ?? "").toLowerCase().replace(/[^a-z0-9]/g, "");
  if (!a || !b) return 0.5;
  return a === b ? 1 : (a.includes(b) || b.includes(a)) ? 0.7 : 0;
}

function isDuplicate(existing, incoming) {
  const titleSim = titleSimilarity(existing.title || "", incoming.title || "");
  // High title similarity alone is enough — don't require course match
  // since Canvas course field is often null/garbage
  if (titleSim > 0.90) return true;
  // Lower title sim needs a matching due date as tiebreaker
  if (titleSim > 0.75) {
    const dateDiff = (!existing.dueDate || !incoming.dueDate)
      ? 0
      : Math.abs(new Date(existing.dueDate) - new Date(incoming.dueDate)) / 86_400_000;
    return dateDiff <= 1;
  }
  return false;
}

function mergeAssignments(existing = [], incoming = [], uploadId) {
  let newCount = 0, updatedCount = 0;
  const result = [...existing];
  for (const a of incoming) {
    const match = result.find(e => isDuplicate(e, a));
    if (match) {
      Object.assign(match, {
        dueDate:      a.dueDate    || match.dueDate,
        course:       a.course     || match.course,
        updatedAt:    new Date().toISOString(),
        priorityScore: calcPriorityScore({ ...match, dueDate: a.dueDate || match.dueDate }),
      });
      updatedCount++;
    } else {
      result.push({
        ...a,
        id:              `hw_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        sourceUploadId:  uploadId,
        completed:       false,
        addedAt:         new Date().toISOString(),
        updatedAt:       new Date().toISOString(),
        priorityScore:   calcPriorityScore(a),
      });
      newCount++;
    }
  }
  return { finalList: result, newCount, updatedCount };
}

function parseIcal(icsText) {
  // Unfold RFC 5545 line continuations
  let unfolded = icsText
    .replace(/\r\n/g, "\n")
    .replace(/\n[ \t]/g, "");

  const assignments = [];
  const events = unfolded.split("BEGIN:VEVENT").slice(1);

  for (const ev of events) {
    // Robust property extractor: handles TYPE;PARAM=val:VALUE and plain KEY:VALUE
    // Stops only at the first colon AFTER any semicolons (parameter section)
    const get = (key) => {
      const keyUp = key.toUpperCase();
      const lines = ev.split("\n");
      for (const line of lines) {
        if (!line) continue;
        const trimmed = line.replace(/\r$/, ""); // strip Windows 
        const upper = trimmed.toUpperCase();
        if (!upper.startsWith(keyUp)) continue;
        const colonIdx = trimmed.indexOf(":");
        if (colonIdx === -1) continue;
        return trimmed.slice(colonIdx + 1).trim() || null;
      }
      return null;
    };

    const summary = get("SUMMARY");
    if (!summary) continue;

    // Prefer DUE (tasks), fall back to DTEND, then DTSTART
    const dtdue = get("DUE") || get("DTEND") || get("DTSTART");
    const url   = get("URL") || "";
    const desc  = get("DESCRIPTION") || "";

    // Extract course name from Canvas URL pattern only (description text is unreliable)
    let course = null;
    const courseUrlMatch = url.match(/\/courses\/(\d+)/);
    if (courseUrlMatch) {
      const nameMatch = url.match(/\/courses\/\d+\/([^/?#]+)/);
      if (nameMatch) course = decodeURIComponent(nameMatch[1].replace(/-/g, " "));
    }

    // Parse iCal date/datetime (YYYYMMDD or YYYYMMDDTHHmmssZ)
    let dueDate = null;
    if (dtdue) {
      try {
        const clean = dtdue.replace(/[TZ]/g, m => m === "T" ? "T" : "Z");
        if (dtdue.length >= 15) {
          // Full datetime: 20250115T235900Z
          const iso = dtdue.slice(0,4)+"-"+dtdue.slice(4,6)+"-"+dtdue.slice(6,8)
                    +"T"+dtdue.slice(9,11)+":"+dtdue.slice(11,13)+":"+dtdue.slice(13,15)+"Z";
          const d = new Date(iso);
          if (!isNaN(d)) dueDate = d.toISOString();
        } else if (dtdue.length >= 8) {
          // Date only: 20250115
          const iso = dtdue.slice(0,4)+"-"+dtdue.slice(4,6)+"-"+dtdue.slice(6,8);
          const d = new Date(iso + "T23:59:00Z");
          if (!isNaN(d)) dueDate = d.toISOString();
        }
      } catch(e) {}
    }

    // Decode iCal text escape sequences
    const decode = (s) => s
      .replace(/\\n/g, " ")
      .replace(/\\,/g, ",")
      .replace(/\\;/g, ";")
      .replace(/\\\\/g, "\\");

    // CATEGORIES field: Canvas sets "assignment" for graded work, "event" for non-graded
    const categories = (get("CATEGORIES") || "").toLowerCase();
    const itemType = categories.includes("assignment") ? "assignment"
                   : categories.includes("event")      ? "event"
                   : "unknown";

    // Heuristic: flag likely-ungraded items by title keywords
    const ungradedKeywords = /\b(survey|attendance|optional|extra credit|ungraded|check.?in|sign.?up|poll|rsvp|participate)\b/i;
    const likelyUngraded = ungradedKeywords.test(summary) || itemType === "event";

    assignments.push({
      title:         decode(summary),
      course:        course ? decode(course) : null,
      dueDate,
      rawText:       summary,
      sourceUrl:     url || null,
      itemType,        // "assignment" | "event" | "unknown"
      likelyUngraded,  // true = probably not graded based on category or keywords
    });
  }
  return assignments;
}

// iCal proxy chain — tries each in order, returns first valid iCal response.
// Each proxy handles Canvas's token-auth URLs differently:
//   corsproxy.io  — most reliable, passes auth tokens through correctly
//   allorigins    — good fallback, returns JSON wrapper with .contents
//   xmlesc        — simple GET proxy via xmlesc.com
// Wrap a fetch with a timeout using Promise.race — avoids AbortSignal
// which causes "object could not be cloned" on iOS 15/16 (WebKit bug #218323)
function fetchWithTimeout(url, opts, ms = 8000) {
  const fetchPromise = fetch(url, opts);
  const timeoutPromise = new Promise((_, reject) =>
    setTimeout(() => reject(new Error("timed out after " + ms + "ms")), ms)
  );
  return Promise.race([fetchPromise, timeoutPromise]);
}

// Returns the text of a response, throwing if it looks like an HTML error page
async function safeText(r, proxyName) {
  if (!r.ok) throw new Error(proxyName + " HTTP " + r.status);
  const text = await r.text();
  if (text.trimStart().startsWith("<")) {
    // Detect Canvas login redirect
    if (text.includes("login") || text.includes("Login")) {
      throw new Error(proxyName + ": Canvas returned login page — re-copy your feed URL from Canvas > Calendar > Feed");
    }
    throw new Error(proxyName + ": got HTML instead of iCal");
  }
  return text;
}

const ICAL_PROXIES = [
  // 0. Direct fetch — works when Canvas sets permissive CORS headers (no school firewall issue)
  async (url) => {
    const r = await fetchWithTimeout(url, { headers: { "Accept": "text/calendar, */*" } }, 6000);
    return safeText(r, "direct");
  },

  // 1. corsproxy.io — reliable, passes Canvas auth tokens cleanly
  async (url) => {
    const r = await fetchWithTimeout(
      "https://corsproxy.io/?" + encodeURIComponent(url),
      { headers: { "Accept": "text/calendar, */*" } }
    );
    return safeText(r, "corsproxy.io");
  },

  // 2. allorigins.win — wraps response in JSON envelope
  async (url) => {
    const r = await fetchWithTimeout(
      "https://api.allorigins.win/get?url=" + encodeURIComponent(url),
      {}
    );
    if (!r.ok) throw new Error("allorigins HTTP " + r.status);
    const j = await r.json();
    if (!j || !j.contents) throw new Error("allorigins: empty response");
    if (j.contents.trimStart().startsWith("<")) {
      if (j.contents.includes("login") || j.contents.includes("Login")) {
        throw new Error("allorigins: Canvas login redirect — check feed URL");
      }
      throw new Error("allorigins: got HTML instead of iCal");
    }
    return j.contents;
  },

  // 3. htmldriven cors-proxy — simple GET passthrough, different domain than above
  async (url) => {
    const r = await fetchWithTimeout(
      "https://cors-proxy.htmldriven.com/?url=" + encodeURIComponent(url),
      {}
    );
    return safeText(r, "htmldriven");
  },

  // 4. codetabs.com proxy
  async (url) => {
    const r = await fetchWithTimeout(
      "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
      {}
    );
    return safeText(r, "codetabs");
  },

  // 5. thingproxy.freeboard.io — Freeboard's proxy, different infrastructure
  async (url) => {
    const r = await fetchWithTimeout(
      "https://thingproxy.freeboard.io/fetch/" + url,
      {}
    );
    return safeText(r, "thingproxy");
  },
];

// Decode a response string that might be a data: URI containing iCal
function resolveIcsText(raw) {
  if (!raw) return raw;
  const trimmed = raw.trim();
  // Case: proxy returned a data: URI — decode it to get the real iCal content
  if (trimmed.startsWith("data:")) {
    try {
      const commaIdx = trimmed.indexOf(",");
      if (commaIdx === -1) return raw;
      const meta    = trimmed.slice(5, commaIdx).toLowerCase(); // "text/calendar;charset=utf-8;base64"
      const payload = trimmed.slice(commaIdx + 1);
      if (meta.includes("base64")) {
        try {
          return atob(payload);
        } catch(e) {
          // atob throws InvalidCharacterError on iOS for non-Latin1 chars
          // Try decoding as percent-encoded fallback
          try { return decodeURIComponent(payload); } catch(e2) {}
          return payload; // return raw, let VCALENDAR check catch it
        }
      } else {
        try { return decodeURIComponent(payload); } catch(e) { return payload; }
      }
    } catch(e) {
      return raw; // decoding failed, return as-is and let the VCALENDAR check catch it
    }
  }
  return raw;
}

async function fetchIcalAssignments(feedUrl) {
  const normalizedFeedUrl = (feedUrl || "").trim();
  if (!normalizedFeedUrl) throw new Error("No feed URL configured");

  // Validate URL — must be https:// not a data: URI or file path
  let parsed;
  try { parsed = new URL(normalizedFeedUrl); } catch(e) {
    throw new Error("Invalid URL — paste it directly from Canvas > Calendar > Calendar Feed");
  }
  if (parsed.protocol === "data:") {
    throw new Error(
      "That looks like a data: URI, not a feed URL. " +
      "In Canvas: go to Calendar → click 'Calendar Feed' in the sidebar → copy the https:// URL."
    );
  }
  if (parsed.protocol !== "https:" && parsed.protocol !== "http:") {
    throw new Error("Feed URL must start with https://");
  }

  const errors = [];

  for (const proxy of ICAL_PROXIES) {
    let ics;
    try {
      ics = await proxy(normalizedFeedUrl);
    } catch(e) {
      const msg = e.name === "AbortError"
        ? proxy.name + ": timed out after 8s"
        : e.message;
      errors.push(msg);
      continue;
    }

    if (!ics || !ics.trim()) {
      errors.push("Empty response");
      continue;
    }

    // Handle data: URI responses (some proxies wrap content this way)
    ics = resolveIcsText(ics);

    if (!ics.includes("BEGIN:VCALENDAR")) {
      console.warn("Non-iCal response preview:", ics.slice(0, 200).replace(/\n/g, " "));
      // Give a specific hint when the response is a Canvas login page
      if (ics.includes("pseudonym_session") || ics.includes("canvas-login") || (ics.includes("<html") && ics.includes("login"))) {
        errors.push("Canvas returned login page — your feed URL may have expired. Re-copy from Canvas > Calendar > Feed.");
        break; // No point trying more proxies if Canvas itself is redirecting
      }
      errors.push("Not iCal — got: " + ics.slice(0, 60).replace(/\n/g, " "));
      continue;
    }

    return parseIcal(ics);
  }

  const networkBlocked = errors.length > 0 && errors.every(e =>
    e.includes("Failed to fetch") || e.includes("timed out") || e.includes("NetworkError") || e.includes("Load failed")
  );
  if (networkBlocked) {
    throw new Error(
      "All proxies blocked by your network. Try syncing on mobile data instead of WiFi. " +
      "(" + errors.join(" | ") + ")"
    );
  }
  throw new Error(errors.join(" | "));
}

// ── Priority score incorporating survey prefs ────────────
function calcPriorityScoreWithPrefs(assignment, prefs) {
  const base = calcPriorityScore(assignment);
  if (!prefs) return base;

  let bonus = 0;

  // Subject rank bonus: most important subjects get +20 down to 0
  if (prefs.subjectRank && assignment.course) {
    const course = (assignment.course || "").toLowerCase();
    const rank = prefs.subjectRank.findIndex(s => course.includes(s.toLowerCase()));
    if (rank !== -1) {
      // rank 0 = most important → highest bonus
      const maxBonus = 20;
      bonus += Math.round(maxBonus * (1 - rank / Math.max(prefs.subjectRank.length - 1, 1)));
    }
  }

  // Graded work preference
  if (prefs.gradedFirst && assignment.itemType === "assignment" && !assignment.likelyUngraded) {
    bonus += 15;
  }

  // Assessment type preference: boost tests/quizzes if preferred
  if (prefs.assessmentPriority) {
    const t = (assignment.title || "").toLowerCase();
    const ap = prefs.assessmentPriority;
    if (ap === "tests" && /\b(test|exam|midterm|final|quiz)\b/.test(t)) bonus += 18;
    if (ap === "essays" && /\b(essay|paper|report|write|writing)\b/.test(t)) bonus += 18;
    if (ap === "projects" && /\b(project|presentation|capstone|design)\b/.test(t)) bonus += 18;
  }

  // Cramming style: due-soon gets extra urgency boost
  if (prefs.workStyle === "crammer") {
    if (assignment.dueDate) {
      const days = (new Date(assignment.dueDate) - new Date()) / 86_400_000;
      if (days >= 0 && days < 2) bonus += 12;
    }
  }
  // Planner style: far-future assignments get a small boost to stay visible
  if (prefs.workStyle === "planner") {
    if (assignment.dueDate) {
      const days = (new Date(assignment.dueDate) - new Date()) / 86_400_000;
      if (days >= 3 && days <= 10) bonus += 8;
    }
  }

  // Focus Task always/never overrides
  if (prefs.focusAlways && assignment.course) {
    const course = (assignment.course || "").toLowerCase();
    if (prefs.focusAlways.some(s => course.includes(s.toLowerCase()))) bonus += 50;
  }
  if (prefs.focusNever && assignment.course) {
    const course = (assignment.course || "").toLowerCase();
    if (prefs.focusNever.some(s => course.includes(s.toLowerCase()))) bonus -= 999;
  }

  // Heavy workload classes penalty/boost
  if (prefs.heavyClasses && assignment.course) {
    const course = (assignment.course || "").toLowerCase();
    if (prefs.heavyClasses.some(c => course.includes(c.toLowerCase()))) bonus += 10;
  }

  // Late penalty: if user marks a class they're failing/behind in
  if (prefs.behindClasses && assignment.course) {
    const course = (assignment.course || "").toLowerCase();
    if (prefs.behindClasses.some(c => course.includes(c.toLowerCase()))) bonus += 14;
  }

  return base + bonus;
}

const KNOWN_SUBJECTS = [

  "english","language arts","literature","writing","reading","composition","grammar","humanities",

];

// Words that should never be a subject name — quick rejection list
const NON_SUBJECT_WORDS = new Set([
  "monday","tuesday","wednesday","thursday","friday","saturday","sunday",
  "today","tomorrow","yesterday","week","weekend","night","morning","evening",
  "january","february","march","april","may","june","july","august",
  "september","october","november","december",
  "here","there","this","that","link","below","above","see","read",

  "absent","present","class","period","block","room","homework","hw",
  "january","february","if","you","were","the","and","for","from",
]);

function extractSubjectFromTitle(title) {
  if (!title) return null;

  // Pattern 1: "[Science 08 - Goldner]" bracket at end of title
  // e.g. "Scaling the Solar System - Final Video [Science 08 - Goldner]"
  const bracketMatch = title.match(/\[([^\]]+)\]\s*$/);
  if (bracketMatch) {
    const inside = bracketMatch[1]; // "Science 08 - Goldner"
    // Take the part before the first " - " inside the bracket (that's the subject)
    const subjectPart = inside.split(" - ")[0].trim();
    const result = tryExtractSubject(subjectPart);
    if (result) return result;
  }

  // Pattern 2: "Assignment - Subject ## - Teacher"
  const segments = title.split(" - ");
  if (segments.length < 2) return null;
  // Try last segment, then second-to-last
  const toTry = [segments[segments.length - 1], segments[segments.length - 2]].filter(Boolean);
  for (const seg of toTry) {
    const result = tryExtractSubject(seg.trim());
    if (result) return result;
  }
  return null;
}

function tryExtractSubject(seg) {
  // Strip teacher name patterns
  let stripped = seg
    .replace(/\b(Dr|Mr|Mrs|Ms|Prof)\.?\s+[A-Z][a-zA-Z'-]+$/, "")
    .replace(/\b[A-Z][a-z]+\s+[A-Z][a-z'-]+$/, "")
    .trim();
  // Strip lone trailing capitalized word (last name) only if something else remains
  if (/\s/.test(stripped)) {
    stripped = stripped.replace(/\s+[A-Z][a-z'-]{2,}$/, "").trim();
  }
  // Strip grade/level: "08", "10", "II", "AP", "IB", "Honors"
  stripped = stripped.replace(/\s+(AP|IB|Honors|H|\d{1,4}|[IVX]{1,6})$/i, "").trim();

  const lower = stripped.toLowerCase().replace(/[^a-z\s]/g, " ").replace(/\s+/g, " ").trim();

  // Reject if empty, too short, too long, or contains non-subject words
  if (!lower || lower.length < 3) return null;
  const words = lower.split(" ");
  if (words.length > 4) return null;
  if (words.some(w => NON_SUBJECT_WORDS.has(w))) return null;

  // Match against known subjects
  for (const subject of KNOWN_SUBJECTS) {
    if (lower === subject || lower.startsWith(subject + " ") || lower.endsWith(" " + subject)) {
      return toTitleCase(subject);
    }
  }
  for (const subject of KNOWN_SUBJECTS) {
    if (lower.includes(subject)) return toTitleCase(subject);
  }
  return null;
}

function toTitleCase(s) {
  return s.split(" ").map(w => w[0].toUpperCase() + w.slice(1)).join(" ");
}

function extractSubjectsFromAssignments(assignments) {
  const found = new Map();

  for (const a of assignments) {
    const title = a.title || "";

    // Look for [...] at the end of the title
    // e.g. "Scaling the Solar System - Final Video [Science 08 - Goldner]"
    const bracketMatch = title.match(/\[([^\]]+)\]\s*$/);
    if (!bracketMatch) continue;

    const inside = bracketMatch[1]; // "Science 08 - Goldner"
    // Take only the part before the first " - " (subject + optional grade number)
    const subjectRaw = inside.split(" - ")[0].trim(); // "Science 08"

    // Strip trailing grade number (08, 10, 11, etc.)
    const subjectClean = subjectRaw.replace(/\s+\d+$/, "").trim(); // "Science"

    if (!subjectClean || subjectClean.length < 2) continue;
    if (/^\d+$/.test(subjectClean)) continue; // pure number

    found.set(subjectClean, (found.get(subjectClean) || 0) + 1);
  }

  // Frequency filter does the work: real subjects appear across many assignments,
  // teacher names or one-offs only appear once. Require 2+ occurrences.
  return [...found.entries()]
    .filter(([, count]) => count >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([s]) => s);
}

// ── Sort Survey Modal (step-by-step) ─────────────────────
function SortSurveyModal({ assignments, existingPrefs, onSave, onClose }) {
  const subjects = React.useMemo(() => extractSubjectsFromAssignments(assignments), [assignments]);

  // Always start from freshly extracted subjects.
  // If existingPrefs has an ordering, apply that order to the fresh list
  // (but never show old prefs subjects that don't exist in fresh list)
  const getInitialRank = () => {
    if (!existingPrefs?.subjectRank?.length || !subjects.length) return [...subjects];
    const oldOrder = existingPrefs.subjectRank;
    const inBoth   = oldOrder.filter(s => subjects.includes(s));
    const newOnly  = subjects.filter(s => !oldOrder.includes(s));
    return [...inBoth, ...newOnly];
  };

  const [step, setStep] = React.useState(0);

  // All answers
  const [subjectRank, setSubjectRank] = React.useState(() => getInitialRank());

  // Resync subjectRank whenever subjects list changes (e.g. after assignments load)
  React.useEffect(() => {
    if (subjects.length > 0) setSubjectRank(getInitialRank());
  }, [subjects.join(",")]);
  const [gradedFirst,         setGradedFirst]         = React.useState(existingPrefs?.gradedFirst ?? true);
  const [assessmentPriority,  setAssessmentPriority]  = React.useState(existingPrefs?.assessmentPriority || "tests");
  const [workStyle,           setWorkStyle]           = React.useState(existingPrefs?.workStyle || "balanced");
  const [heavyClasses,        setHeavyClasses]        = React.useState(existingPrefs?.heavyClasses || []);
  const [behindClasses,       setBehindClasses]       = React.useState(existingPrefs?.behindClasses || []);
  const [dueTimePrefer,       setDueTimePrefer]       = React.useState(existingPrefs?.dueTimePrefer || "anytime");
  const [focusAlways,         setFocusAlways]         = React.useState(existingPrefs?.focusAlways || []);
  const [focusNever,          setFocusNever]          = React.useState(existingPrefs?.focusNever || []);

  // drag state for Q1
  const dragIdx = React.useRef(null);
  const [dragOver, setDragOver] = React.useState(null);
  const onDragStart = (i) => { dragIdx.current = i; };
  const onDragEnter = (i) => setDragOver(i);
  const onDragEnd   = () => {
    if (dragIdx.current !== null && dragOver !== null && dragIdx.current !== dragOver) {
      const arr = [...subjectRank];
      const [moved] = arr.splice(dragIdx.current, 1);
      arr.splice(dragOver, 0, moved);
      setSubjectRank(arr);
    }
    dragIdx.current = null; setDragOver(null);
  };
  // touch drag
  const touchItem = React.useRef(null);
  const onTouchStart = (i) => { touchItem.current = i; };
  const onTouchMove  = (e) => {
    if (touchItem.current === null) return;
    e.preventDefault();
    const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    const item = el?.closest("[data-rank-idx]");
    if (item) setDragOver(Number(item.dataset.rankIdx));
  };
  const onTouchEnd = () => {
    if (touchItem.current !== null && dragOver !== null && touchItem.current !== dragOver) {
      const arr = [...subjectRank];
      const [moved] = arr.splice(touchItem.current, 1);
      arr.splice(dragOver, 0, moved);
      setSubjectRank(arr);
    }
    touchItem.current = null; setDragOver(null);
  };

  const toggleMulti = (val, arr, setArr) =>
    setArr(arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);

  // Build steps — skip subject steps if no subjects found
  const steps = [
    ...(subjects.length > 0 ? [{
      key: "rank",
      title: "Rank your subjects",
      sub: "Drag to reorder — most important at top",
      content: () => (
        <div className="hw-rank-list" onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
          style={{ touchAction:"none" }}>
          {subjectRank.map((s, i) => (
            <div key={s} data-rank-idx={i}
              className={`hw-rank-item ${dragOver === i ? "drag-over-item" : ""}`}
              draggable
              onDragStart={() => onDragStart(i)}
              onDragEnter={() => onDragEnter(i)}
              onDragEnd={onDragEnd}
              onDragOver={e => e.preventDefault()}
              onTouchStart={() => onTouchStart(i)}>
              <span className="hw-rank-handle">⠿</span>
              <span className="hw-rank-num">{i + 1}</span>
              <span className="hw-rank-name">{s}</span>
            </div>
          ))}
        </div>
      ),
    }] : []),
    {
      key: "graded",
      title: "Prioritize graded work?",
      sub: "Graded assignments get bumped up the list",
      content: () => (
        <div className="hw-chip-row" style={{ flexDirection:"column" }}>
          {[["yes","✦  Yes — graded first"],["no","○  Show everything equally"]].map(([v, label]) => (
            <button key={v} className={`hw-chip ${(gradedFirst?"yes":"no")===v?"selected":""}`}
              style={{ textAlign:"left", borderRadius:12, padding:"14px 18px", fontSize:15 }}
              onClick={() => setGradedFirst(v==="yes")}>
              {label}
            </button>
          ))}
        </div>
      ),
    },
    {
      key: "assessment",
      title: "What stresses you most?",
      sub: "That type of assignment gets an extra priority boost",
      content: () => (
        <div className="hw-chip-row" style={{ flexDirection:"column" }}>
          {[["tests","📝  Tests & Quizzes"],["essays","✍️  Essays & Papers"],["projects","🗂  Projects & Presentations"],["none","—  No preference"]].map(([v, label]) => (
            <button key={v} className={`hw-chip ${assessmentPriority===v?"selected":""}`}
              style={{ textAlign:"left", borderRadius:12, padding:"14px 18px", fontSize:15 }}
              onClick={() => setAssessmentPriority(v)}>
              {label}
            </button>
          ))}
        </div>
      ),
    },
    {
      key: "style",
      title: "What's your work style?",
      sub: "Changes how urgency is weighted",
      content: () => (
        <div className="hw-chip-row" style={{ flexDirection:"column" }}>
          {[["crammer","⚡  Crammer — best under pressure"],["balanced","⚖️  Balanced"],["planner","📅  Planner — I like to start early"]].map(([v, label]) => (
            <button key={v} className={`hw-chip ${workStyle===v?"selected":""}`}
              style={{ textAlign:"left", borderRadius:12, padding:"14px 18px", fontSize:15 }}
              onClick={() => setWorkStyle(v)}>
              {label}
            </button>
          ))}
        </div>
      ),
    },
    ...(subjects.length > 0 ? [{
      key: "heavy",
      title: "Heaviest workload classes?",
      sub: "Those assignments get an extra bump",
      content: () => (
        <div className="hw-chip-row">
          {subjectRank.map(s => (
            <button key={s} className={`hw-toggle-chip ${heavyClasses.includes(s)?"selected":""}`}
              onClick={() => toggleMulti(s, heavyClasses, setHeavyClasses)}>
              {s}
            </button>
          ))}
          <button className={`hw-toggle-chip ${heavyClasses.length===0?"selected":""}`}
            onClick={() => setHeavyClasses([])}>None</button>
        </div>
      ),
    }, {
      key: "behind",
      title: "Behind in any classes?",
      sub: "Those get the most urgency",
      content: () => (
        <div className="hw-chip-row">
          {subjectRank.map(s => (
            <button key={s} className={`hw-toggle-chip ${behindClasses.includes(s)?"selected":""}`}
              onClick={() => toggleMulti(s, behindClasses, setBehindClasses)}>
              {s}
            </button>
          ))}
          <button className={`hw-toggle-chip ${behindClasses.length===0?"selected":""}`}
            onClick={() => setBehindClasses([])}>None</button>
        </div>

    {
      key: "focusnever",

        <div className="hw-chip-row">

        </div>

    },
    {
      key: "focusalways",
      title: "Always prioritise in Focus Task?",
      sub: "These get a big boost — will almost always be your top pick when due soon",
      content: () => (
        <div className="hw-chip-row">
          {subjectRank.map(s => (
            <button key={s} className={`hw-toggle-chip ${focusAlways.includes(s)?"selected":""}`}
              onClick={() => toggleMulti(s, focusAlways, setFocusAlways)}
              style={{ opacity: focusNever.includes(s) ? 0.3 : 1, pointerEvents: focusNever.includes(s) ? "none" : "all" }}>
              {s}

          ))}
          <button className={`hw-toggle-chip ${focusAlways.length===0?"selected":""}`}
            onClick={() => setFocusAlways([])}>None</button>

    {
      key: "duetime",
      title: "When do you usually submit?",
      sub: "Affects how same-day deadlines are ranked",
      content: () => (
        <div className="hw-chip-row" style={{ flexDirection:"column" }}>

  const total    = steps.length;
  const current  = steps[step];
  const progress = ((step + 1) / total) * 100;
  const isLast   = step === total - 1;

  const handleNext = () => {
    if (isLast) {
      onSave({ subjectRank, gradedFirst, assessmentPriority, workStyle, heavyClasses, behindClasses, dueTimePrefer, focusAlways, focusNever });

              fontSize:20, cursor:"pointer", padding:"2px 4px", fontFamily:"var(--mono)" }}>×</button>

          <div style={{ fontSize:22, fontWeight:900, fontFamily:"var(--heading)",
            color:"var(--text)", marginBottom:6, lineHeight:1.2 }}>

          <div style={{ fontSize:13, color:"var(--text3)", fontFamily:"var(--mono)",
            fontWeight:700, marginBottom:22, letterSpacing:0.3 }}>

          <div style={{ minHeight:120 }}>

          </div>

          {/* Navigation */}
          <div style={{ display:"flex", gap:10, marginTop:26 }}>
            {step > 0 && (
              <button onClick={() => setStep(s => s - 1)}
                style={{ flex:1, padding:"14px", borderRadius:12, border:"1.5px solid var(--border)",
                  background:"var(--bg2)", color:"var(--text2)", fontFamily:"var(--font)",

                background:"var(--coral)", color:"var(--btn-text)", fontFamily:"var(--font)",

        </div>

    </div>
  );
}

// ── Homework Categories ──────────────────────────────────
const HW_CATS = [
  { id:"assignment", label:"Assignments",  color:"var(--coral)",  dot:"#ff5f57" },
  { id:"project",    label:"Projects",     color:"var(--purple)", dot:"#c77dff" },
  { id:"test",       label:"Tests",        color:"#ffd166",       dot:"#ffd166" },
];

function autoCategory(a) {
  const t = (a.title || "").toLowerCase();
  // Tests/quizzes — explicit exam keywords only
  if (/\b(test|quiz|exam|midterm|final exam|final test|unit test|assessment)\b/.test(t)) return "test";
  // Projects — long-form multi-stage work
  if (/\b(project|presentation|capstone|research paper|portfolio|lab report)\b/.test(t)) return "project";
  // Long due date is a strong project signal
  if (a.dueDate) {
    const days = (new Date(a.dueDate) - new Date()) / 86_400_000;
    if (days > 14) return "project";
  }
  // Everything else → assignment (the main bucket)
  return "assignment";
}

function getDueDisplay(dueDate) {
  if (!dueDate) return { label:"No due date", cls:"nodate" };
  const now = new Date(), due = new Date(dueDate);
  const days = (due - now) / 86_400_000;
  if (days < 0)  return { label:"Overdue",      cls:"urgent" };
  if (days < 1)  return { label:"Due today",    cls:"urgent" };
  if (days < 2)  return { label:"Due tomorrow", cls:"soon"   };
  if (days < 5)  return { label:`${Math.ceil(days)}d left`,  cls:"soon" };
  return { label: due.toLocaleDateString("en-US",{month:"short",day:"numeric"}), cls:"ok" };
}

function urgencyColor(dueDate, completed, catDot) {
  if (completed) return "var(--green)";
  if (!dueDate)  return "var(--border)";
  const days = (new Date(dueDate) - new Date()) / 86_400_000;
  if (days < 0) return "var(--red)";
  if (days < 2) return "var(--red)";
  if (days < 5) return "#ff9500";
  return catDot;
}

// Module-level drag tracking — shared across all HwPanel instances
// React state is async so we use a plain variable for drag/drop coordination
let _draggedAssignmentId = null;
let _draggedFromCatId    = null;

function HwPanel({ cat, items, onCheck, onMove, onReorder, fadingIds, isDropTarget, onDragOverPanel, onDropPanel }) {
  const [open, setOpen]             = useState(true);
  const [moveTarget, setMoveTarget] = useState(null);
  const dragIdx  = useRef(null);
  const [dragOver, setDragOver]     = useState(null);
  const touchItem    = useRef(null);
  const touchOverIdx = useRef(null);

  const startDrag = (i, id) => {
    dragIdx.current = { i, id };
    _draggedAssignmentId = id;
    _draggedFromCatId    = cat.id;
  };
  const enterDrag = (i)     => setDragOver(i);
  const endDrag = () => {
    if (dragIdx.current !== null && dragOver !== null && dragIdx.current.i !== dragOver)
      onReorder(cat.id, dragIdx.current.i, dragOver);
    dragIdx.current = null; setDragOver(null);
    _draggedAssignmentId = null; _draggedFromCatId = null;
  };
  const startTouch = (i) => { touchItem.current = i; touchOverIdx.current = i; };
  const moveTouch  = (e) => {
    if (touchItem.current === null) return;
    const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    const card = el?.closest("[data-hw-idx]");
    if (card) { touchOverIdx.current = Number(card.dataset.hwIdx); setDragOver(Number(card.dataset.hwIdx)); }
  };
  const endTouch = () => {
    if (touchItem.current !== null && touchOverIdx.current !== null && touchItem.current !== touchOverIdx.current)
      onReorder(cat.id, touchItem.current, touchOverIdx.current);
    touchItem.current = null; touchOverIdx.current = null; setDragOver(null);
  };

  const others = HW_CATS.filter(c => c.id !== cat.id);

  return (
    <div className={`hw-panel ${isDropTarget?"drop-active":""}`}
      onDragOver={e => {
        e.preventDefault();
        if (_draggedFromCatId && _draggedFromCatId !== cat.id) onDragOverPanel && onDragOverPanel(cat.id);
      }}
      onDrop={e => {
        e.preventDefault();
        if (_draggedAssignmentId && _draggedFromCatId !== cat.id) {
          onMove(_draggedAssignmentId, cat.id);
          _draggedAssignmentId = null; _draggedFromCatId = null;
        }
        onDropPanel && onDropPanel(cat.id);
      }}>

      <div className="hw-panel-header" onClick={() => setOpen(o => !o)}>
        <div className="hw-panel-dot" style={{ background:cat.dot }} />
        <div className="hw-panel-title" style={{ color:cat.color }}>{cat.label}</div>
        <div className="hw-panel-count">{items.length}</div>
        <div className={`hw-panel-chev ${open?"open":""}`}>▶</div>
      </div>

      {open && (
        <div className="hw-panel-body" onTouchMove={moveTouch} onTouchEnd={endTouch}
          style={{ touchAction:"pan-y" }}>
          {items.length === 0 && (
            <div style={{ padding:"8px 4px 4px", fontSize:13, color:"var(--text3)", fontFamily:"var(--mono)", fontStyle:"italic" }}>empty</div>
          )}
          {items.map((a, i) => {
            const due    = getDueDisplay(a.dueDate);
            const stripe = urgencyColor(a.dueDate, a.completed, cat.dot);
            const fading = fadingIds.has(a.id);
            return (
              <div key={a.id} data-hw-idx={i}
                className={`hw-card ${fading?"fading":""}`}
                style={{ opacity: dragOver===i && dragIdx.current?.i!==i ? 0.35 : 1,
                  background: dragOver===i ? "var(--bg2)" : "transparent" }}
                draggable
                onDragStart={() => startDrag(i, a.id)}
                onDragEnter={() => enterDrag(i)}
                onDragEnd={endDrag}
                onDragOver={e => e.preventDefault()}
                onTouchStart={() => startTouch(i)}>
                <div className="hw-card-stripe" style={{ background:stripe }} />
                <button className={`hw-card-check ${a.completed?"done":""}`}
                  onClick={() => onCheck(a.id)}>{a.completed?"✓":""}</button>
                <div className="hw-card-body">
                  <div className={`hw-card-title ${a.completed?"done":""}`}>{a.title}</div>
                  <div className={`hw-card-due ${due.cls}`}>{due.label}</div>
                </div>
                <button className="hw-card-move"
                  onPointerDown={e => e.stopPropagation()}
                  onClick={e => { e.stopPropagation(); setMoveTarget(a.id); }}>⠿</button>
              </div>
            );
          })}
        </div>
      )}

      {moveTarget && ReactDOM.createPortal(
        <>
          <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:498 }}
            onClick={() => setMoveTarget(null)} />
          <div className="hw-move-sheet" style={{ zIndex:499 }}
            onClick={e => e.stopPropagation()}>
            <div style={{ width:34,height:3,background:"var(--bg3)",borderRadius:99,margin:"0 auto 14px" }} />
            <div style={{ fontSize:13,fontWeight:900,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:1,textTransform:"uppercase",marginBottom:2 }}>Move to</div>
            {others.map(c => (
              <div key={c.id} className="hw-move-row"
                onPointerDown={e => { e.stopPropagation(); onMove(moveTarget, c.id); setMoveTarget(null); }}>
                <div className="hw-move-dot" style={{ background:c.dot }} />
                <div className="hw-move-label">{c.label}</div>
              </div>
            ))}
            <div className="hw-move-row"
              onPointerDown={e => { e.stopPropagation(); setMoveTarget(null); }}>
              <div className="hw-move-dot" style={{ background:"var(--border)" }} />
              <div className="hw-move-label" style={{ color:"var(--text3)" }}>Cancel</div>
            </div>
          </div>
        </>,
        document.body
      )}
    </div>
  );
}

// ── AI triage: filter out noise from Canvas feed ─────────
async function aiTriageAssignments(assignments) {
  if (!assignments.length) return assignments;
  try {
    const list = assignments.map((a, i) => `${i}: ${a.title}${a.course ? ` [${a.course}]` : ""}${a.dueDate ? ` due:${a.dueDate.slice(0,10)}` : ""}`).join("\n");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are filtering a student's Canvas LMS calendar feed. Return ONLY a JSON array of index numbers to KEEP — real assignments/homework/quizzes/tests/projects that a student needs to act on. Remove: generic calendar events, school holidays, advisory periods, club meetings, athletic events, "no school" days, office hours, info sessions, surveys, attendance checks, sign-ups, or anything a student doesn't need to do work for.\n\nAssignments:\n${list}\n\nRespond with ONLY a JSON array like [0,2,5]. No explanation.`
        }]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text || "").trim();
    const clean = text.replace(/```json|```/g, "").trim();
    const indices = JSON.parse(clean);
    if (!Array.isArray(indices)) return assignments;
    return assignments.filter((_, i) => indices.includes(i));
  } catch(e) {
    console.warn("AI triage failed, keeping all:", e);
    return assignments;
  }
}

// ── Pattern matching: check learned rules before AI ───────
function normalizeTitle(title) {
  // Strip trailing day/date patterns to get the base pattern
  // "Target Task - Monday" → "target task"
  // "Reading Response 3" → "reading response"
  return (title || "")
    .toLowerCase()
    .replace(/[-–]\s*(monday|tuesday|wednesday|thursday|friday|saturday|sunday)/gi, "")
    .replace(/\s+\d+$/, "")        // trailing numbers
    .replace(/\s*\[.*?\]\s*$/, "") // trailing [bracket] e.g. [Science 08 - Goldner]
    .trim();
}

function matchPattern(title, rules) {
  // rules: { [normalizedPattern]: { cat, count } | categoryId (legacy) }
  const norm = normalizeTitle(title);
  if (!norm) return null;
  const resolve = (val) => {
    if (!val) return null;
    if (typeof val === "string") return val; // legacy
    return val.count >= 2 ? val.cat : null;  // learned: only if confirmed 2+ times
  };
  if (resolve(rules[norm])) return resolve(rules[norm]);
  for (const [pat, val] of Object.entries(rules)) {
    if (pat.length >= 4 && (norm.includes(pat) || pat.includes(norm))) {
      const r = resolve(val);
      if (r) return r;
    }
  }
  return null;
}

async function aiCategorizeAssignments(assignments) {
  // Only categorize truly uncategorized ones (no pattern match, no manual)
  if (!assignments.length) return {};
  try {
    const list = assignments.map((a, i) =>
      `${i}: ${a.title}${a.dueDate ? ` (due ${new Date(a.dueDate).toLocaleDateString("en-US",{month:"short",day:"numeric"})})` : ""}`
    ).join("\n");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 500,
        messages: [{ role:"user", content:
          `Categorize these student assignments into exactly one of: daily, assignment, project, test.\n` +
          `daily = recurring short homework due same/next day\n` +
          `assignment = single medium-weight assignment due in a few days\n` +
          `project = long-term multi-stage work\n` +
          `test = in-class test or quiz to study for\n\n` +
          `${list}\n\n` +
          `Respond ONLY with JSON: {"0":"daily","1":"assignment",...}. No explanation.`
        }]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text || "").trim().replace(/```json|```/g,"").trim();
    const result = JSON.parse(text);
    // Map index → category
    const out = {};
    assignments.forEach((a, i) => { if (result[String(i)]) out[a.id] = result[String(i)]; });
    return out;
  } catch(e) {
    console.warn("AI categorize failed:", e);
    return {};
  }
}

// ── HomeworkView ─────────────────────────────────────────
function HomeworkView({ state, dispatch, showToast }) {
  const [syncing, setSyncing]         = useState(false);
  const [expandedId, setExpandedId]   = useState(null);
  const [fadingIds, setFadingIds]       = useState(new Set());
  const [showSurvey, setShowSurvey]     = useState(false);
  const [dropTarget, setDropTarget]     = useState(null);
  const [draggedId, setDraggedId]       = useState(null);
  const [categorizingIds, setCategorizingIds] = useState(new Set());

  const hw       = state.homework || { assignments: [], uploads: [] };
  const feedUrl  = state.cfg?.icalFeedUrl || "";
  const lastSync = state.cfg?.icalLastSync;

  // Category map: { [assignmentId]: categoryId }
  // Stored in cfg.hwCategories — never touched by sync
  const catMap = state.cfg?.hwCategories || {};

  // Category order map: { [categoryId]: [id, id, ...] } for manual reordering
  const catOrder = state.cfg?.hwCatOrder || {};

  const setCatMap = (newMap) =>
    dispatch({ type:"UPD_CFG", cfg:{ hwCategories: newMap } });
  const setCatOrder = (newOrder) =>
    dispatch({ type:"UPD_CFG", cfg:{ hwCatOrder: newOrder } });

  // Pattern rules: { [normalizedPattern]: categoryId } — learned from manual moves
  const catRules = state.cfg?.hwCatRules || {};

  // An assignment is "uncategorized" if it has no manual cat and no pattern/AI match
  const getCategory = (a) => {
    if (catMap[a.id]) return catMap[a.id]; // manual override wins
    const patMatch = matchPattern(a.title, catRules);
    if (patMatch) return patMatch;
    // Smart default: auto-place using inferCategory so nothing goes to inbox
    return autoCategory(a);
  };

  const handleMove = (id, toCatId) => {
    let freshState = {};
    try { freshState = JSON.parse(localStorage.getItem("dos_v2") || "{}"); } catch(e) {}
    const freshCatMap   = freshState.cfg?.hwCategories || {};
    const freshCatRules = freshState.cfg?.hwCatRules   || {};

    // Save manual category
    const newMap = { ...freshCatMap, [id]: toCatId };
    dispatch({ type:"UPD_CFG", cfg:{ hwCategories: newMap } });

    // Learn pattern from this title (track count for confidence)
    const assignment = hw.assignments.find(a => a.id === id);
    if (assignment) {
      const norm = normalizeTitle(assignment.title);
      if (norm && norm.length >= 4) {
        const existing = freshCatRules[norm];
        const prevCount = (existing && typeof existing === "object") ? existing.count : (existing ? 1 : 0);
        const newRules = { ...freshCatRules, [norm]: { cat: toCatId, count: prevCount + 1 } };
        dispatch({ type:"UPD_CFG", cfg:{ hwCatRules: newRules } });
      }
    }
    showToast(`→ ${HW_CATS.find(c=>c.id===toCatId)?.label}`);
  };
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const prefs = state.cfg?.hwSortPrefs || null;
  const displayList = hw.assignments
    .filter(a => { if (!a.dueDate) return true; return new Date(a.dueDate) >= weekAgo; })
    .sort((a, b) => calcPriorityScoreWithPrefs(b, prefs) - calcPriorityScoreWithPrefs(a, prefs));

  // Inbox = no manual category, no pattern match, no AI yet
  const inboxItems = displayList.filter(a => getCategory(a) === null);

  // Build per-category lists — always sorted by due date ascending
  const getCatItems = (catId) => {
    const items = hw.assignments
      .filter(a => !a.completed)
      .filter(a => { if (!a.dueDate) return true; return new Date(a.dueDate) >= weekAgo; })
      .filter(a => getCategory(a) === catId);
    return items.slice().sort((a, b) => {
      if (!a.dueDate && !b.dueDate) return 0;
      if (!a.dueDate) return 1;
      if (!b.dueDate) return -1;
      return new Date(a.dueDate) - new Date(b.dueDate);
    });
  };

  const handleReorder = (catId, fromIdx, toIdx) => {
    const items = getCatItems(catId);
    const ids = items.map(a => a.id);
    const [moved] = ids.splice(fromIdx, 1);
    ids.splice(toIdx, 0, moved);
    let freshCatOrder = {};
    try { freshCatOrder = JSON.parse(localStorage.getItem("dos_v2") || "{}").cfg?.hwCatOrder || {}; } catch(e) {}
    setCatOrder({ ...freshCatOrder, [catId]: ids });
  };

  const doSync = async () => {
    if (!feedUrl || syncing) return;
    setSyncing(true);
    try {
      const parsed  = await fetchIcalAssignments(feedUrl);
      const triaged = await aiTriageAssignments(parsed.filter(a => a.title));
      const enriched = triaged.map(a => ({
        ...a, estimatedDifficulty: inferDifficulty(a.title || ""),
      }));

      // Read FRESH state from localStorage to avoid stale closure
      let freshState = {};
      let freshHw = { assignments: [], uploads: [] };
      try {
        const raw = localStorage.getItem("dos_v2");
        if (raw) { freshState = JSON.parse(raw); freshHw = freshState.homework || freshHw; }
      } catch(e) {}

      // Nuclear dedup: collapse any existing duplicates by exact title+date key
      const deduped = [];
      const seenKeys = new Set();
      for (const a of (freshHw.assignments || [])) {
        const key = (a.title || "").toLowerCase().trim() + "|" + (a.dueDate || "");
        if (!seenKeys.has(key)) { seenKeys.add(key); deduped.push(a); }
      }

      const completedTitles = new Set(
        deduped.filter(a => a.completed).map(a => (a.title || "").toLowerCase().trim())
      );
      const incoming = enriched.filter(a =>
        !completedTitles.has((a.title || "").toLowerCase().trim())
      );

      const uploadId = `ical_${Date.now()}`;
      const existingPending = deduped.filter(a => !a.completed);
      const { finalList, newCount, updatedCount } = mergeAssignments(existingPending, incoming, uploadId);

      // Final safety dedup pass on merged result
      const finalDeduped = [];
      const finalSeen = new Set();
      for (const a of finalList) {
        const key = (a.title || "").toLowerCase().trim() + "|" + (a.dueDate || "");
        if (!finalSeen.has(key)) { finalSeen.add(key); finalDeduped.push(a); }
      }

      const rescored = finalDeduped.map(a => ({ ...a, priorityScore: calcPriorityScore(a) }));
      const upload = { id:uploadId, uploadedAt:new Date().toISOString(), assignmentCount:parsed.length, newCount, updatedCount, source:"ical" };
      dispatch({ type:"UPD_HOMEWORK", homework:{ assignments:rescored, uploads:[...(freshHw.uploads||[]), upload] } });
      dispatch({ type:"UPD_CFG", cfg:{ icalLastSync: new Date().toISOString() } });

      // Auto-categorize new assignments via learned patterns then AI
      const freshCatMap   = freshState?.cfg?.hwCategories || {};
      const freshCatRules = freshState?.cfg?.hwCatRules   || {};

      // Find assignments that have no manual category and no pattern match
      const needsCat = rescored.filter(a =>
        !freshCatMap[a.id] && !matchPattern(a.title, freshCatRules)
      );

      if (needsCat.length > 0) {
        // Apply pattern rules first
        const patternMatched = {};
        needsCat.forEach(a => {
          const m = matchPattern(a.title, freshCatRules);
          if (m) patternMatched[a.id] = m;
        });

        // Send remaining to AI
        const stillNeedsCat = needsCat.filter(a => !patternMatched[a.id]);
        const aiCats = stillNeedsCat.length > 0 ? await aiCategorizeAssignments(stillNeedsCat) : {};

        const combined = { ...freshCatMap, ...patternMatched, ...aiCats };
        if (Object.keys(combined).length > Object.keys(freshCatMap).length) {
          dispatch({ type:"UPD_CFG", cfg:{ hwCategories: combined } });
        }
      }

      showToast(`✓ ${newCount} new · ${updatedCount} updated`);
    } catch (err) {
      console.error(err);
      const msg = String(err && (err.message || err.name || err)) || "Unknown error";
      showToast("Sync failed: " + msg.slice(0, 80));
    }
    setSyncing(false);
  };

  useEffect(() => {
    if (!feedUrl || syncing) return;
    const dayAgo = Date.now() - 24 * 60 * 60 * 1000;
    if (!lastSync || new Date(lastSync).getTime() < dayAgo) {
      doSync();
    }
  }, [feedUrl, lastSync]);

  const toggleComplete = (id) => {
    dispatch({ type:"UPD_HOMEWORK", homework:{
      ...hw,
      assignments: hw.assignments.filter(a => a.id !== id)
    }});
  };

  const setDiffOverride = (id, val) => {
    const updated = hw.assignments.map(a => {
      if (a.id !== id) return a;
      const patched = { ...a, difficultyOverride:val, updatedAt:new Date().toISOString() };
      return { ...patched, priorityScore: calcPriorityScore(patched) };
    });
    dispatch({ type:"UPD_HOMEWORK", homework:{ ...hw, assignments:updated } });
  };

  const deleteAssignment = (id) => {
    const updated = hw.assignments.filter(a => a.id !== id);
    dispatch({ type:"UPD_HOMEWORK", homework:{ ...hw, assignments:updated } });
    showToast("Removed");
  };

  const saveSurvey = (prefs) => {
    dispatch({ type:"UPD_CFG", cfg:{ hwSortPrefs: prefs } });
    setShowSurvey(false);
    showToast("✓ Sort preferences saved");
  };

  const pendingCount = hw.assignments.filter(a=>!a.completed).length;
  const overdueCount = hw.assignments.filter(a=>!a.completed && a.dueDate && new Date(a.dueDate) < new Date()).length;

  if (!feedUrl) {
    return (
      <div>
        <div style={{ background:"var(--bg1)", border:"1px solid var(--border)", borderRadius:16, padding:"24px 20px", marginBottom:20 }}>
          <div style={{ fontSize:32, marginBottom:10 }}>📅</div>
          <div style={{ fontSize:22, fontWeight:800, fontFamily:"var(--heading)", marginBottom:8 }}>Connect Canvas</div>
          <div style={{ fontSize:17, color:"var(--text2)", lineHeight:1.7, marginBottom:18 }}>
            Paste your Canvas iCal feed URL in Settings to auto-sync assignments every time you open the app.
          </div>
          <div style={{ background:"var(--bg2)", borderRadius:12, padding:"14px 16px", marginBottom:18, border:"1px solid var(--border)" }}>
            <div style={{ fontSize:13, fontWeight:800, color:"var(--text3)", fontFamily:"var(--mono)", letterSpacing:1, textTransform:"uppercase", marginBottom:10 }}>How to find it</div>
            {["1. Open Canvas in a browser","2. Click Calendar in the left sidebar","3. Scroll to the bottom of the page","4. Click \"Calendar Feed\" to copy the URL","5. Paste it in Settings → Canvas Feed"].map((s,i) => (
              <div key={i} style={{ fontSize:16, color:"var(--text2)", padding:"5px 0", borderBottom: i<4?"1px solid var(--border)":"none" }}>{s}</div>
            ))}
          </div>
        </div>
        <div className="empty">
          <div style={{ fontSize:44, marginBottom:12 }}>◑</div>
          <div className="empty-msg">No assignments yet</div>
          <div className="empty-sub">Connect Canvas in Settings to auto-import.</div>
          <div className="empty-tagline">Stay ahead, not behind.</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {showSurvey && ReactDOM.createPortal(
        <SortSurveyModal
          assignments={hw.assignments}
          existingPrefs={state.cfg?.hwSortPrefs}
          onSave={saveSurvey}
          onClose={() => setShowSurvey(false)} />,
        document.body
      )}

      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"10px 14px", background:"var(--bg1)", borderRadius:12,
        border:"1px solid var(--border)", marginBottom:16, gap:10 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight:800, color: syncing?"var(--coral)":"var(--text2)", fontFamily:"var(--mono)" }}>
            {syncing ? "Syncing…" : lastSync ? `Synced ${new Date(lastSync).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}` : "Not yet synced"}
          </div>
          {pendingCount > 0 && !syncing && (
            <div style={{ fontSize:12, color:"var(--text3)", fontFamily:"var(--mono)", marginTop:1 }}>
              {pendingCount} pending{overdueCount > 0 ? ` · ${overdueCount} overdue` : ""}
            </div>
          )}
        </div>
        {/* Sort prefs button — only show after first sync */}
        {lastSync && (
          <button onClick={() => setShowSurvey(true)}
            style={{ flexShrink:0, padding:"12px 16px", borderRadius:12,
              border:`1.5px solid ${state.cfg?.hwSortPrefs ? "var(--purple)" : "var(--border)"}`,
              background: state.cfg?.hwSortPrefs ? "rgba(199,125,255,0.1)" : "var(--bg2)",
              color: state.cfg?.hwSortPrefs ? "var(--purple)" : "var(--text3)",
              fontFamily:"var(--mono)", fontSize:15, fontWeight:800, cursor:"pointer" }}>
            {state.cfg?.hwSortPrefs ? "⚙ Sorted" : "⚙ Sort"}
          </button>
        )}
        <button onClick={doSync} disabled={syncing}
          style={{ flexShrink:0, padding:"12px 18px", borderRadius:12,
            border:`1.5px solid ${syncing?"var(--border)":"var(--coral)"}`,
            background: syncing?"var(--bg2)":"var(--coralg)",
            color: syncing?"var(--text3)":"var(--coral)",
            fontFamily:"var(--mono)", fontSize:15, fontWeight:800, cursor:syncing?"default":"pointer",
            display:"flex", alignItems:"center", gap:6 }}>
          {syncing
            ? <><div style={{ width:11,height:11,borderRadius:"50%",border:"2px solid var(--text3)",borderTopColor:"transparent",animation:"hwSpin 0.7s linear infinite" }} />Syncing</>
            : "↺ Sync"}
        </button>
      </div>

      {hw.assignments.length === 0 && !syncing && (
        <div className="empty">
          <div style={{ fontSize:44, marginBottom:12 }}>◻</div>
          <div className="empty-msg">All clear</div>
          <div className="empty-sub">No pending assignments</div>
          <div className="empty-tagline">Stay ahead, not behind.</div>
        </div>
      )}

      {/* Inbox — uncategorized assignments */}
      {inboxItems.length > 0 && (
        <div className="hw-inbox">
          <div className="hw-inbox-header">
            <div className="hw-inbox-title">Inbox</div>
            <div className="hw-inbox-count">{inboxItems.length}</div>
          </div>
          {inboxItems.map(a => {
            const due = getDueDisplay(a.dueDate);
            return (
              <div key={a.id} className="hw-inbox-card">
                <div className="hw-inbox-title-text">{a.title}</div>
                <div className={`hw-inbox-due ${due.cls}`}>{due.label}</div>
                <div className="hw-inbox-cats">
                  {HW_CATS.map(cat => (
                    <button key={cat.id} className="hw-inbox-cat-btn"
                      style={{ background:`${cat.dot}18`, borderColor:cat.dot, color:cat.dot }}
                      onPointerDown={e => { e.stopPropagation(); handleMove(a.id, cat.id); }}>
                      {cat.label}
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {hw.assignments.length > 0 && (() => {
        // assignment cat goes left full-height; daily/project/test stack on right
        const [left, ...right] = HW_CATS; // assignment=left, daily+project+test=right
        return (
          <div className="hw-board">
            {/* Left column: Assignments */}
            <div className="hw-col-left">
              <HwPanel
                cat={left}
                items={getCatItems(left.id)}
                onCheck={toggleComplete}
                onMove={handleMove}
                onReorder={handleReorder}
                fadingIds={fadingIds}
                isDropTarget={dropTarget===left.id}
                onDragOverPanel={setDropTarget}
                onDropPanel={(catId) => { if(draggedId) { handleMove(draggedId, catId); setDraggedId(null); setDropTarget(null); } }}
              />
            </div>
            {/* Right column: Daily, Projects, Tests */}
            <div className="hw-col-right">
              {right.map(cat => (
                <HwPanel
                  key={cat.id}
                  cat={cat}
                  items={getCatItems(cat.id)}
                  onCheck={toggleComplete}
                  onMove={handleMove}
                  onReorder={handleReorder}
                  fadingIds={fadingIds}
                  isDropTarget={dropTarget===cat.id}
                  onDragOverPanel={setDropTarget}
                  onDropPanel={(catId) => { if(draggedId) { handleMove(draggedId, catId); setDraggedId(null); setDropTarget(null); } }}
                />
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}



// ── NavBar ────────────────────────────────────────────────
const NAV_ITEMS = [
  { id:"home",     icon:"⌂",  label:"Home"     },
  { id:"tasks",    icon:"◻",  label:"Tasks"    },
  { id:"homework", icon:"◑",  label:"Homework" },
  { id:"calendar", icon:"◈",  label:"Calendar" },
  { id:"settings", icon:"○",  label:"Settings" },
];

function NavBar({ tab, setTab, navHintShown, onHintShown }) {
  const [open, setOpen]         = useState(false);
  const [showHint, setShowHint] = useState(!navHintShown);
  const triggerRef = useRef(null);

  useEffect(() => {
    if (showHint) {
      const t = setTimeout(() => { setShowHint(false); onHintShown(); }, 4200);
      return () => clearTimeout(t);
    }
  }, []);

  const toggle = () => { setOpen(o => !o); if (showHint) { setShowHint(false); onHintShown(); } };

  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight - 46;
  const arcStart = -170;
  const arcEnd   = -10;
  const n = NAV_ITEMS.length;
  const angles = Array.from({ length: n }, (_, i) =>
    arcStart + (arcEnd - arcStart) * (i / (n - 1))
  );
  const radius = Math.min(175, window.innerWidth * 0.46);

  return (
    <>
      {open && <div className="nav-overlay visible" onClick={() => setOpen(false)} />}
      {showHint && !open && (
        <div className="nav-tooltip">Tap ☰ to navigate</div>
      )}
      {NAV_ITEMS.map((item, i) => {
        const rad  = angles[i] * Math.PI / 180;
        const tx   = Math.cos(rad) * radius;
        const ty   = Math.sin(rad) * radius;
        return (
          <div key={item.id}
            className={`nav-radial-item ${open?"visible":""}`}
            style={{ left:cx, top:cy, "--tx":`translate(calc(${tx}px - 50%), calc(${ty}px - 50%))` }}
            onClick={() => { setTab(item.id); setOpen(false); }}>
            <div className={`nav-radial-dot ${tab===item.id?"active":""}`}>{item.icon}</div>
            <div className={`nav-radial-label ${tab===item.id?"active":""}`}>{item.label}</div>
          </div>
        );
      })}
      <div className="bottom-nav">
        <button ref={triggerRef} className={`nav-trigger ${open?"open":""} ${showHint?"pulse":""}`} onClick={toggle}>
          <div className="nav-trigger-icon"><span/><span/><span/></div>
        </button>
      </div>
    </>
  );
}

// ── Spin wheels ──────────────────────────────────────────
const RAINBOW_COLORS = [
  "#ff5f57","#ff9500","#ffcc00","#34c759","#00c7be","#0a84ff","#bf5af2","#ff375f",
  "#ff6b35","#ffd60a","#30d158","#64d2ff","#5e5ce6","#ff453a","#ff9f0a","#ffe234",
];
const PUNISH_COLORS = ["#cc0000","#8b1a2a"];

function SpinWheel({ items, onResult, colorMode = "dark" }) {
  const canvasRef = useRef(null);
  const [spinning, setSpinning] = useState(false);
  const angleRef  = useRef(0);
  const SIZE = 500;

  const getSegColor = (i) => {
    if (colorMode === "rainbow") return RAINBOW_COLORS[i % RAINBOW_COLORS.length];
    if (colorMode === "punishment") return PUNISH_COLORS[i % 2];
    return i % 2 === 0 ? "#1a1a1a" : "#252525";
  };
  const getTextColor = (i) => {
    if (colorMode === "punishment") return i % 2 === 0 ? "#ffffff" : "#8b0000";
    if (colorMode === "rainbow") return "#722f37";
    return "#ffffff";
  };

  const draw = (angle) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const cx = SIZE/2, cy = SIZE/2, r = cx - 6;
    const n = items.length, seg = (2*Math.PI)/n;
    ctx.clearRect(0,0,SIZE,SIZE);
    ctx.save();
    ctx.shadowBlur = 32;
    ctx.shadowColor = colorMode==="punishment"?"rgba(200,0,0,0.5)":colorMode==="rainbow"?"rgba(255,200,0,0.4)":"rgba(255,95,87,0.3)";
    ctx.beginPath(); ctx.arc(cx,cy,r+3,0,2*Math.PI);
    ctx.strokeStyle = colorMode==="punishment"?"#cc0000":colorMode==="rainbow"?"#ffd60a":"#333";
    ctx.lineWidth = 6; ctx.stroke(); ctx.restore();
    items.forEach((item,i) => {
      const start = angle+i*seg-Math.PI/2, end = start+seg;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
      ctx.fillStyle = getSegColor(i); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end);
      ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(start+seg/2);
      const label = item.length>22?item.slice(0,21)+"…":item;
      const basePx = Math.max(11,Math.min(20,(seg/(2*Math.PI))*n*18-label.length*0.4));
      ctx.font = `bold ${basePx}px 'DM Mono',monospace`;
      ctx.fillStyle = getTextColor(i);
      ctx.textAlign = "right"; ctx.textBaseline = "middle";
      ctx.shadowBlur = 3; ctx.shadowColor = "rgba(0,0,0,0.8)";
      ctx.fillText(label, r-16, 0); ctx.restore();
    });
    ctx.beginPath(); ctx.arc(cx,cy,22,0,2*Math.PI);
    ctx.fillStyle = "#111"; ctx.fill();
    ctx.strokeStyle = colorMode==="punishment"?"#cc0000":colorMode==="rainbow"?"#ffd60a":"#ff5f57";
    ctx.lineWidth = 3; ctx.stroke();
    const ptx = cx, pty = cy-r-2;
    ctx.beginPath(); ctx.moveTo(ptx,pty+28); ctx.lineTo(ptx-14,pty); ctx.lineTo(ptx+14,pty); ctx.closePath();
    ctx.fillStyle = colorMode==="punishment"?"#cc0000":colorMode==="rainbow"?"#ffd60a":"#ff5f57";
    ctx.shadowBlur = 12; ctx.shadowColor = colorMode==="punishment"?"#cc0000":"#ff5f57";
    ctx.fill(); ctx.shadowBlur = 0;
  };

  useEffect(() => { draw(angleRef.current); }, [items.length, colorMode]);

  const spin = () => {
    if (spinning) return;
    setSpinning(true);
    const n = items.length, seg = (2*Math.PI)/n;
    const target = Math.random()*2*Math.PI + 8*Math.PI, dur = 5000, t0 = performance.now(), a0 = angleRef.current;
    const animate = (now) => {
      const t = Math.min((now-t0)/dur,1), ease = 1-Math.pow(1-t,4), cur = a0+target*ease;
      angleRef.current = cur; draw(cur);
      if (t < 1) { requestAnimationFrame(animate); return; }
      setSpinning(false);
      const norm = ((cur%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const idx = Math.floor(((2*Math.PI-norm)%(2*Math.PI))/seg)%n;
      onResult(items[idx]);
    };
    requestAnimationFrame(animate);
  };

  const btnBg = colorMode==="punishment"?"#cc0000":colorMode==="rainbow"?"#ffd60a":"#ff5f57";
  const btnColor = colorMode==="rainbow"?"#000":"#fff";
  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:24 }}>
      <canvas ref={canvasRef} width={SIZE} height={SIZE}
        style={{ width:"min(85vw,480px)",height:"min(85vw,480px)",borderRadius:"50%",cursor:"pointer" }}
        onClick={spin} />
      <button onClick={spin} disabled={spinning}
        style={{ background:spinning?"var(--bg3)":btnBg,color:spinning?"var(--text3)":btnColor,
          border:"none",borderRadius:16,padding:"18px 64px",fontSize:26,fontWeight:800,
          fontFamily:"var(--heading)",cursor:spinning?"default":"pointer",transition:"all 0.2s",
          boxShadow:spinning?"none":`0 0 32px ${btnBg}88` }}>
        {spinning?"Spinning…":"Spin"}
      </button>
    </div>
  );
}

function DailyTasksModal({ tasks, onDone }) {

  if (tasks.length === 0) { onDone(null); return null; }
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.97)",zIndex:1000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:28,padding:24 }}>
      <div style={{ fontFamily:"var(--heading)",fontStyle:"italic",fontSize:32,fontWeight:900,color:"var(--coral)",textAlign:"center",lineHeight:1.2 }}>Today's<br/>bonus task</div>

// ── Splash Greeting ────────────────────────────────────────
function SplashGreeting({ userName, userIdentity, onDone, onSaveName }) {
  const [displayed, setDisplayed] = React.useState("");
  const [fadeOut, setFadeOut]     = React.useState(false);
  const [askName, setAskName]     = React.useState(!userName);
  const [inputName, setInputName] = React.useState("");
  const [inputIds, setInputIds]   = React.useState([]);
  const [phase, setPhase]         = React.useState(userName ? "greet" : "ask"); // ask | greet

  const identityGreets = {
    student:      ["Time to build something.", "Knowledge compounds daily.", "Show up. Level up."],
    athlete:      ["Train your mind too.", "Discipline is the skill.", "Every rep counts."],
    creator:      ["Make something today.", "Consistency is your craft.", "Ship it."],
    professional: ["Lead with intention.", "Another day to execute.", "Results speak."],
    parent:       ["You set the example.", "One day at a time.", "Showing up matters."],
    other:        ["Another day to grow.", "Consistency wins.", "You're building something."],
  };

  const fullText = React.useMemo(() => {
    const fullName = userName || inputName;
    const firstName = fullName ? fullName.trim().split(" ")[0] : "";
    const id = userIdentity || (inputIds.length ? inputIds[0] : "other");
    const hour = new Date().getHours();
    const timeGreet = hour < 5 ? "Up late" : hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : hour < 21 ? "Good evening" : "Good night";
    const pool = identityGreets[id] || identityGreets.other;
    const tagline = pool[Math.floor(Math.random() * pool.length)];
    return firstName ? `${timeGreet}, ${firstName}. ${tagline}` : `${timeGreet}. ${tagline}`;
  }, [phase]); // only recompute when we transition to greet phase

  React.useEffect(() => {
    if (phase !== "greet") return;
    let i = 0;
    setDisplayed("");
    const interval = setInterval(() => {
      i++;
      setDisplayed(fullText.slice(0, i));
      if (i >= fullText.length) clearInterval(interval);
    }, 38);
    return () => clearInterval(interval);
  }, [phase, fullText]);

  React.useEffect(() => {
    if (phase !== "greet") return;
    const t1 = setTimeout(() => setFadeOut(true), 4400);
    const t2 = setTimeout(() => onDone && onDone(), 5500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [phase]);

  const handleSaveName = () => {
    if (!inputName.trim()) return;
    onSaveName && onSaveName(inputName.trim(), inputIds.length ? inputIds.join(",") : "other");
    setPhase("greet");
  };

  if (phase === "ask") return (
    <div style={{
      position:"fixed", inset:0, zIndex:9999,
      background:"#1a1a1a",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      padding:"0 40px",
    }}>
      <div style={{ width:"100%", maxWidth:320 }}>
        <div style={{ fontFamily:"var(--heading)", fontSize:38, fontWeight:900, fontStyle:"italic", color:"#fff", marginBottom:8, lineHeight:1 }}>Tempo</div>
        <div style={{ fontFamily:"var(--mono)", fontSize:13, color:"var(--coral)", letterSpacing:3, textTransform:"uppercase", marginBottom:32 }}>What should we call you?</div>
        <input
          autoFocus
          value={inputName}
          onChange={e => setInputName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && inputIds.length && handleSaveName()}
          placeholder="Your name"
          style={{
            width:"100%", boxSizing:"border-box",
            background:"transparent", border:"none", borderBottom:"2px solid var(--coral)",
            color:"var(--text)", fontFamily:"var(--heading)", fontSize:28, fontWeight:700, fontStyle:"italic",
            padding:"8px 0", marginBottom:32, outline:"none",
          }}
        />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:28 }}>
          {[
            {id:"student",label:"Student",emoji:"📚"},
            {id:"athlete",label:"Athlete",emoji:"🏋️"},
            {id:"creator",label:"Creator",emoji:"🎨"},
            {id:"professional",label:"Professional",emoji:"💼"},
            {id:"parent",label:"Parent",emoji:"🏠"},
            {id:"other",label:"Other",emoji:"✦"},
          ].map(({ id, label, emoji }) => (
            <div key={id} onClick={() => setInputIds(ids => ids.includes(id) ? ids.filter(x=>x!==id) : [...ids,id])} style={{
              padding:"11px 12px", borderRadius:10, cursor:"pointer",
              border: inputIds.includes(id) ? "2px solid var(--coral)" : "1.5px solid #333",
              background: inputIds.includes(id) ? "rgba(255,95,87,0.08)" : "transparent",
              display:"flex", alignItems:"center", gap:8,
              transition:"border-color 0.15s",
            }}>
              <span style={{fontSize:18}}>{emoji}</span>
              <span style={{fontFamily:"var(--font)", fontSize:14, fontWeight:700, color: inputIds.includes(id) ? "var(--coral)" : "#888"}}>{label}</span>
            </div>
          ))}
        </div>
        <button
          onClick={handleSaveName}
          disabled={!inputName.trim() || !inputIds.length}
          style={{
            width:"100%", padding:"16px", borderRadius:12, border:"none",
            background: inputName.trim() && inputIds.length ? "var(--coral)" : "#333",
            color: inputName.trim() && inputIds.length ? "#000" : "#555",
            fontFamily:"var(--font)", fontSize:16, fontWeight:800, cursor: inputName.trim() && inputIds.length ? "pointer" : "default",
            transition:"background 0.2s",
          }}>
          {!inputName.trim() ? "Enter your name" : !inputIds.length ? "Pick one" : `Let's go, ${inputName.trim()} →`}
        </button>
      </div>
    </div>
  );

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 9999,
      background: "#1a1a1a",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "0 40px",
      opacity: fadeOut ? 0 : 1,
      transition: "opacity 0.9s ease",
      pointerEvents: "all",
    }}>
      <div style={{
        maxWidth: 340,
        fontFamily: "var(--heading)",
        fontSize: "clamp(28px, 7vw, 40px)",
        fontWeight: 800,
        fontStyle: "italic",
        color: "#fff",
        lineHeight: 1.25,
        textAlign: "left",
      }}>
        {displayed}
        <span style={{
          display: "inline-block",
          width: 3, height: "0.85em",
          background: "var(--coral)",
          marginLeft: 4,
          verticalAlign: "text-bottom",
          animation: "blink 0.8s step-end infinite",
        }} />
      </div>
    </div>
  );
}

    <div className="ob-screen">
      <div className="ob-inner">
        <Progress />
        <div style={{ fontFamily:"var(--heading)", fontSize:32, fontWeight:900, fontStyle:"italic",
          color:"var(--text)", marginBottom:6, lineHeight:1.1 }}>
          One habit to start.
        </div>
        <div style={{ fontSize:15, color:"var(--text3)", marginBottom:8, lineHeight:1.5 }}>
          Research shows one habit built well beats ten built poorly. Pick what matters most right now — you can add more later.
        </div>
        <div style={{ fontSize:12, fontFamily:"var(--mono)", color:"var(--coral)", fontWeight:800,
          letterSpacing:1, textTransform:"uppercase", marginBottom:20 }}>
          Suggested for you
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:20 }}>
          {suggestions.map((s) => {
            const isSel = anchorHabit?.name === s.name;
            return (
              <div key={s.name}
                onClick={() => { setAnchorHabit(s); setCustomHabit(""); }}
                style={{
                  padding:"16px 18px", borderRadius:14, cursor:"pointer",
                  border: isSel ? "2px solid var(--coral)" : "1.5px solid var(--border)",
                  background: isSel ? "var(--coralg)" : "var(--bg1)",
                  display:"flex", alignItems:"center", gap:14,
                  transition:"border-color 0.15s, background 0.15s",
                }}>
                <span style={{ fontSize:26, flexShrink:0 }}>{s.sym}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:800, fontSize:16, color: isSel ? "var(--coral)" : "var(--text)" }}>{s.name}</div>
                  <div style={{ fontSize:12, color:"var(--text3)", fontFamily:"var(--mono)", marginTop:2 }}>
                    {s.days.length === 7 ? "Every day" : s.days.length === 5 ? "Weekdays" : "Weekends"} · {s.category}
                  </div>
                </div>
                {isSel && <div style={{ color:"var(--coral)", fontWeight:900, fontSize:18 }}>✓</div>}
              </div>
            );
          })}
        </div>

        <div style={{ fontSize:12, fontFamily:"var(--mono)", fontWeight:800, color:"var(--text3)",
          letterSpacing:1.5, textTransform:"uppercase", marginBottom:10 }}>Or type your own</div>
        <div style={{ display:"flex", gap:8, marginBottom:28 }}>
          <input className="ob-custom-input"
            style={{ marginBottom:0, flex:1 }}
            value={customHabit}
            onChange={e => { setCustomHabit(e.target.value); setAnchorHabit(null); }}
            placeholder="e.g. Practice guitar"
          />
        </div>

        <button className="ob-btn-primary"
          disabled={!anchorHabit && !customHabit.trim()}
          onClick={() => setStep("when")}>
          {!anchorHabit && !customHabit.trim() ? "Pick or type a habit" : "Set the when →"}
        </button>
        <button className="ob-btn-ghost" onClick={() => setStep("identity")}>← Back</button>
      </div>
    </div>
  );

  // ── WHEN ──
  if (step === "when") {
    const habitName = anchorHabit?.name || customHabit.trim();
    return (
      <div className="ob-screen">
        <div className="ob-inner">
          <Progress />
          <div style={{ fontFamily:"var(--heading)", fontSize:32, fontWeight:900, fontStyle:"italic",
            color:"var(--text)", marginBottom:6, lineHeight:1.1 }}>
            When will you do it?
          </div>
          <div style={{ fontSize:15, color:"var(--text3)", marginBottom:32, lineHeight:1.5 }}>
            People who plan <em>when</em> they'll do a habit are 2x more likely to follow through. Pick a time that's realistic for <strong style={{ color:"var(--text)" }}>{habitName}</strong>.
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:36 }}>
            {[
              { id:"morning",   emoji:"🌅", label:"Morning",   sub:"Before the day gets away from you" },
              { id:"afternoon", emoji:"☀️",  label:"Afternoon", sub:"Midday momentum, use your energy" },
              { id:"evening",   emoji:"🌙", label:"Evening",   sub:"Wind down and reflect" },
            ].map(({ id, emoji, label, sub }) => (
              <div key={id}
                onClick={() => setWhenTime(id)}
                style={{
                  padding:"18px 20px", borderRadius:14, cursor:"pointer",
                  border: whenTime === id ? "2px solid var(--coral)" : "1.5px solid var(--border)",
                  background: whenTime === id ? "var(--coralg)" : "var(--bg1)",
                  display:"flex", alignItems:"center", gap:16,
                  transition:"border-color 0.15s, background 0.15s",
                }}>
                <span style={{ fontSize:28, flexShrink:0 }}>{emoji}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:800, fontSize:17, color: whenTime === id ? "var(--coral)" : "var(--text)" }}>{label}</div>
                  <div style={{ fontSize:13, color:"var(--text3)", marginTop:2 }}>{sub}</div>
                </div>
                {whenTime === id && <div style={{ color:"var(--coral)", fontWeight:900, fontSize:18 }}>✓</div>}
              </div>
            ))}
          </div>

          <button className="ob-btn-primary"
            disabled={!whenTime}
            onClick={handleFinish}>
            {whenTime ? `Start Day 1 →` : "Pick a time"}
          </button>
          <button className="ob-btn-ghost" onClick={() => setStep("habit")}>← Back</button>
        </div>
      </div>
    );
  }

  return null;
}
